function EmployeesPage({ user }) {
  const violations = DB.get("violations",[]);
  const warnings = reconcileWarningLetters({ persist:false }).warnings;
  const allUsers = DB.get("users",[]);
  const users = employeeComplianceRows(allUsers, violations, warnings);

  useEffect(() => {
    syncComplianceScores(allUsers, violations);
  }, []);

  const scoreColor = (s) => s > 85 ? "var(--green)" : s > 65 ? "#D97706" : "var(--red)";
  const scoreBg = (s) => s > 85 ? "var(--green-bg)" : s > 65 ? "var(--amber-bg)" : "var(--red-bg)";
  const orgAvg = Math.round(users.reduce((a,b)=>a+b.complianceScore,0)/Math.max(users.length,1));

  return (
    <div>
      <PageHeader title="Employee Compliance Scores" sub="Scores start at 100  Minor 2  Moderate 5  Major 15  Critical 40"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <KpiCard label="Org Avg Score" value={orgAvg} color="var(--green)" sub="/100"/>
        <KpiCard label="At-Risk (< 60)" value={users.filter(u=>u.complianceScore<60).length} color="var(--red)"/>
        <KpiCard label="Repeat Offenders" value={users.filter(u=>u.violations>1).length} color="var(--amber)"/>
        <KpiCard label="Perfect Score" value={users.filter(u=>u.complianceScore===100).length} color="var(--blue)" sub="(100/100)"/>
      </div>

      <Card>
        <CardHeader title="Employee Compliance Leaderboard" subtitle="Sorted by compliance score (lowest first)"/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["#","Employee","Dept","Designation","Violations","Active Warnings","Compliance Score","Risk Level"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {users.length===0 && <tr><td colSpan={8}><EmptyState icon="inbox" title="No live employee compliance data" sub="Employees will appear after users or cases are synced from the database"/></td></tr>}
              {[...users].sort((a,b)=>a.complianceScore-b.complianceScore).map((emp,i)=>{
                const empViol = emp.cases || violations.filter(v=>findCaseEmployee(v, allUsers)?.id===emp.id || v.empId===emp.id);
                const empWarnCount = emp.warningCount ?? warnings.filter(w=>w.empId===emp.id && (!w.caseId || violations.some(v=>v.id===w.caseId))).length;
                return (
                  <tr key={emp.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{padding:"10px 12px",fontSize:12,fontFamily:"var(--mono)",color:i<3?"var(--red)":"var(--text3)",fontWeight:i<3?700:400,display:"flex",alignItems:"center",gap:4}}>{i<3?<Icon name="star" size={14} color="#D97706"/>:null}{i+1}</td>
                    <td style={{padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar name={emp.name}/><div><div style={{fontSize:13,fontWeight:500}}>{emp.name}</div><div style={{fontSize:10,color:"var(--text3)"}}>{emp.empCode}</div></div></div></td>
                    <td style={{padding:"10px 12px",fontSize:12,color:"var(--text3)"}}>{emp.dept}</td>
                    <td style={{padding:"10px 12px",fontSize:12}}>{emp.designation}</td>
                    <td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontWeight:600,color:empViol.length>3?"var(--red)":empViol.length>1?"var(--amber)":"var(--green)"}}>{empViol.length}</td>
                    <td style={{padding:"10px 12px"}}>{empWarnCount>0?<span style={{fontSize:12,fontWeight:700,color:"var(--red)"}}>{empWarnCount} warning(s)</span>:<span style={{fontSize:12,color:"var(--green)"}}>None</span>}</td>
                    <td style={{padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:70,height:6,background:"var(--line)",borderRadius:3,overflow:"hidden"}}><div className="progress-fill" style={{width:`${emp.complianceScore}%`,background:scoreColor(emp.complianceScore)}}/></div>
                        <span style={{fontSize:13,fontFamily:"var(--mono)",fontWeight:700,color:scoreColor(emp.complianceScore)}}>{emp.complianceScore}</span>
                      </div>
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10,background:scoreBg(emp.complianceScore),color:scoreColor(emp.complianceScore)}}>
                        {emp.complianceScore>85?"Compliant":emp.complianceScore>65?"Monitored":emp.complianceScore>50?"At-Risk":"Critical Risk"}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// MASTER DATA PAGE
// ============================================================
function MasterDataPage({ user, toast }) {
  const [tab, setTab] = useState("Departments");
  const [depts, setDepts]   = useState(()=>DB.get("masterDepts") || DEPARTMENTS.map((d,i)=>({id:"d"+i,name:d,active:true})));
  const [cats, setCats]     = useState(()=>DB.get("masterCats")  || VIOLATION_CATEGORIES.map((c,i)=>({id:"c"+i,name:c,active:true})));
  const [rcs, setRcs]       = useState(()=>DB.get("masterRCs")   || ROOT_CAUSE_CATEGORIES.map((r,i)=>({id:"r"+i,name:r,active:true})));
  const [desigs, setDesigs] = useState(()=>DB.get("masterDesigs")|| DESIGNATIONS.map((d,i)=>({id:"dg"+i,name:d,active:true})));

  const [newItem, setNewItem]   = useState("");
  const [editId,  setEditId]    = useState(null);   // id of item being edited inline
  const [editVal, setEditVal]   = useState("");      // current edit text
  const [delConfirm, setDelConfirm] = useState(null); // id pending delete confirm

  if (user.role !== "Master Admin") return <EmptyState icon="lock" title="Access Restricted" sub="Master Admin only"/>;

  const configs = {
    "Departments":           { data:depts,  set:(v)=>{ setDepts(v);  DB.set("masterDepts",v);  } },
    "Violation Categories":  { data:cats,   set:(v)=>{ setCats(v);   DB.set("masterCats",v);   } },
    "Root Cause Categories": { data:rcs,    set:(v)=>{ setRcs(v);    DB.set("masterRCs",v);    } },
    "Designations":          { data:desigs, set:(v)=>{ setDesigs(v); DB.set("masterDesigs",v); } },
  };
  const cfg = configs[tab];

  // Cancel any edit / delete when switching tabs
  const switchTab = (t) => { setTab(t); setEditId(null); setEditVal(""); setDelConfirm(null); setNewItem(""); };

  const addItem = () => {
    const name = newItem.trim();
    if (!name) { toast("Enter a name","error"); return; }
    if (cfg.data.some(d=>d.name.toLowerCase()===name.toLowerCase())) { toast("Already exists","error"); return; }
    cfg.set([...cfg.data, {id:"n"+Date.now(), name, active:true}]);
    setNewItem(""); toast(`Added: ${name}`,"success");
  };

  const startEdit = (item) => { setEditId(item.id); setEditVal(item.name); setDelConfirm(null); };

  const saveEdit = () => {
    const name = editVal.trim();
    if (!name) { toast("Name cannot be empty","error"); return; }
    cfg.set(cfg.data.map(d=>d.id===editId?{...d,name}:d));
    setEditId(null); setEditVal(""); toast("Entry updated","success");
  };

  const cancelEdit = () => { setEditId(null); setEditVal(""); };

  const askDelete = (id) => { setDelConfirm(id); setEditId(null); };

  const confirmDelete = (id) => {
    cfg.set(cfg.data.filter(d=>d.id!==id));
    setDelConfirm(null); toast("Entry deleted","success");
  };

  const toggleActive = (id) => {
    cfg.set(cfg.data.map(d=>d.id===id?{...d,active:!d.active}:d));
  };

  return (
    <div>
      <PageHeader title="Master Data Management" sub="Configure all system dropdowns, categories, and reference data"/>
      <Tabs tabs={Object.keys(configs)} active={tab} onChange={switchTab}/>

      <Card>
        <CardHeader
          title={tab}
          subtitle={`${cfg.data.filter(d=>d.active).length} active  ${cfg.data.length} total`}
          actions={
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Input value={newItem} onChange={setNewItem}
                placeholder={`Add new ${tab.replace(/s$/,"").toLowerCase()}`}
                style={{width:220}}
                onKeyDown={e=>e.key==="Enter"&&addItem()}
              />
              <Btn variant="primary" size="sm" onClick={addItem}>+ Add</Btn>
            </div>
          }
        />
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["#","Name","Status","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 14px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {cfg.data.length===0 && (
                <tr><td colSpan={4}><EmptyState icon="inbox" title="No entries yet" sub="Add your first entry above"/></td></tr>
              )}
              {cfg.data.map((item,i)=>(
                <tr key={item.id} style={{borderBottom:"1px solid var(--line)",background:delConfirm===item.id?"var(--red-bg)":"transparent"}}
                  onMouseEnter={e=>{if(delConfirm!==item.id)e.currentTarget.style.background="var(--bg)"}}
                  onMouseLeave={e=>{if(delConfirm!==item.id)e.currentTarget.style.background="transparent"}}
                >
                  {/* # */}
                  <td style={{padding:"10px 14px",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",width:40}}>{String(i+1).padStart(2,"0")}</td>

                  {/* Name  inline edit */}
                  <td style={{padding:"8px 14px",fontSize:13,fontWeight:500,opacity:item.active?1:.5}}>
                    {editId===item.id ? (
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <Input value={editVal} onChange={setEditVal} style={{maxWidth:280}}
                          onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")cancelEdit();}}
                        onFocus={e=>e.target.select()}
                        />
                        <Btn size="sm" variant="primary" onClick={saveEdit}>Save</Btn>
                        <Btn size="sm" ghost onClick={cancelEdit}>Cancel</Btn>
                      </div>
                    ) : (
                      <span>{item.name}</span>
                    )}
                  </td>

                  {/* Status */}
                  <td style={{padding:"10px 14px",width:100}}>
                    {delConfirm===item.id ? (
                      <span style={{fontSize:11,color:"var(--red)",fontWeight:600}}> Delete?</span>
                    ) : (
                      <span
                        onClick={()=>toggleActive(item.id)}
                        title="Click to toggle active/inactive"
                        style={{fontSize:11,fontWeight:500,color:item.active?"var(--green)":"var(--text3)",cursor:"pointer",userSelect:"none"}}
                      >{item.active?" Active":" Inactive"}</span>
                    )}
                  </td>

                  {/* Actions */}
                  <td style={{padding:"8px 14px",width:200}}>
                    {delConfirm===item.id ? (
                      <div style={{display:"flex",gap:6}}>
                        <Btn size="sm" variant="danger" onClick={()=>confirmDelete(item.id)}>Yes, Delete</Btn>
                        <Btn size="sm" ghost onClick={()=>setDelConfirm(null)}>Cancel</Btn>
                      </div>
                    ) : editId===item.id ? null : (
                      <div style={{display:"flex",gap:6}}>
                        <Btn size="sm" onClick={()=>startEdit(item)} icon={<Icon name="edit" size={12}/>}>Edit</Btn>
                        <Btn size="sm" ghost onClick={()=>toggleActive(item.id)}>{item.active?"Deactivate":"Activate"}</Btn>
                        <Btn size="sm" variant="danger" onClick={()=>askDelete(item.id)}> Delete</Btn>
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"10px 14px",borderTop:"1px solid var(--line)",fontSize:11,color:"var(--text3)",display:"flex",gap:16}}>
          <span> Click <strong>Edit</strong> to rename  Click status to toggle active  <strong>Delete</strong> removes permanently</span>
        </div>
      </Card>
    </div>
  );
}

// AUDIT TRAIL PAGE

function AuditTrailPage({ user }) {
  const [logs, setLogs] = useState(DB.get("auditLogs",[]).sort((a,b)=>b.ts-a.ts));
  const [search, setSearch] = useState("");
  const [page, setPageNum] = useState(1);
  const PER = 12;

  const filtered = logs.filter(l => {
    if (!search) return true;
    const q = search.toLowerCase();
    return l.user.toLowerCase().includes(q) || l.action.toLowerCase().includes(q) || l.entity.toLowerCase().includes(q) || l.detail.toLowerCase().includes(q);
  });

  const exportAudit = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["Timestamp","User","Role","Action","Entity","Detail","IP"],
      ...filtered.map(l=>[new Date(l.ts).toLocaleString("en-IN"),l.user,l.role,l.action,l.entity,l.detail,l.ip])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Audit Trail");
    XLSX.writeFile(wb, `PVMS_AuditTrail_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const ACTION_COLORS = { LOGIN:"var(--blue)", CASE_CREATED:"var(--green)", STATUS_CHANGED:"var(--amber)", CASE_APPROVED:"var(--green)", CONFIG_CHANGED:"var(--purple)", USER_CREATED:"var(--cyan)", USER_MODIFIED:"var(--cyan)", LETTER_GENERATED:"var(--purple)", CAPA_UPDATED:"var(--amber)", CASE_REVIEWED:"var(--blue)" };

  return (
    <div>
      <PageHeader title="Audit Trail" sub="Complete immutable action history  No hard deletes  ISO-compliant"
        actions={<Btn size="sm" onClick={exportAudit}> Export Log</Btn>}
      />

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <SearchBar value={search} onChange={v=>{setSearch(v);setPageNum(1)}} placeholder="Search user, action, entity"/>
        <span style={{fontSize:12,color:"var(--text3)",alignSelf:"center"}}>{filtered.length} log entries</span>
      </div>

      <Card>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:800}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["Timestamp","User","Role","Action","Entity","Detail","IP"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.slice((page-1)*PER, page*PER).map(l=>(
                <tr key={l.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{new Date(l.ts).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"})}</td>
                  <td style={{padding:"9px 12px",fontSize:12.5,fontWeight:500}}>{l.user}</td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:10,background:"var(--bg2)",color:"var(--text3)",padding:"2px 7px",borderRadius:4,border:"1px solid var(--line)",whiteSpace:"nowrap"}}>{l.role}</span></td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:600,color:ACTION_COLORS[l.action]||"var(--text3)"}}>{l.action}</span></td>
                  <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{l.entity}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:"var(--text2)"}}>{l.detail}</td>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:10.5,color:"var(--text3)"}}>{l.ip}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <Pagination total={filtered.length} page={page} perPage={PER} onChange={setPageNum}/>
      </Card>
    </div>
  );
}

  const [sending, setSending] = useState(false);

    const merged = getEmailTemplates();

    }

    userName:"Amit Sharma",
    violationId:"VMS-2026-0007",
    department:"PWS Floor",
    category:"Process Non-Adherence",
    severity:"Major",
    priority:"Major",
    status:"Open",
    incidentDate:"03 Jun 2026",
    dueDate:"07 Jun 2026",
    closureDate:"10 Jun 2026",
    assignedHOD:"Mr. Ankit Chittora",
    assignedInvestigator:"Mr. Mukesh Menaria",
    assignedUser:"Amit Sharma",
    capaActionType:"Corrective",
    capaActionDescription:"Repair leakage points and verify waterproofing integrity.",
    capaOwner:"Mr. Amit Sharma",
    capaDueDate:"12 Jun 2026",
    pendingDays:"2",
    summaryMonth:"June 2026",
    openCount:"12",
    pendingCount:"4",
    overdueCount:"1",
    closedCount:"18",
    email:"amit.sharma@example.com",
    temporaryPassword:"PVMS-A7K9Q2LM",
    resetRequestedBy:"Master Admin",
    resetTime:"03 Jun 2026, 10:45 am",
    resetLink:`${getPortalUrl()}?resetToken=sample-token&email=amit.sharma%40example.com`,

    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
  const bodyPreviewHtml = interpolate(current.body)
    .split(/\n{2,}/)
    .map(block => `<p style="margin:0 0 12px;line-height:1.65;color:#374151">${escapePreview(block).replace(/\n/g, "<br>")}</p>`)

  const updateTemplate = (key, value) => {

    setSelected("caseRegistered");

  const sendTest = async () => {

        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ to:testEmail, template:current })
      });
      if (!res.ok) throw new Error("send failed");
      toast("Test email sent", "success");
    } catch (err) {
      toast("Test email failed. Check Vercel email environment variables.", "error");
    } finally {
      setSending(false);
    }
  };

  const automationRules = [
    { event:"New case registered", template:"New Case Registered", to:"Employee", cc:"HOD, Management" },
    { event:"Case closed", template:"Case Closure Notice", to:"Employee", cc:"HOD, Management" },
    { event:"New user created", template:"New User Welcome", to:"User", cc:"Admin copy" },
    { event:"Password reset", template:"Password Reset", to:"User", cc:"Admin copy" },
    { event:"Investigation due reminder", template:"Investigation Due Date Reminder", to:"Owner", cc:"Escalation chain" },
    { event:"Investigation overdue escalation", template:"Escalation Reminder", to:"Manager", cc:"Management" },
    { event:"CAPA target overdue escalation", template:"CAPA Target Due Date Missed", to:"CAPA owner", cc:"HOD, Management" },
  ];

  return (
    <div>
      <PageHeader title="Email Integration" sub="Event templates, SMTP test, and automation readiness"
        actions={<Btn size="sm" onClick={resetTemplates}>Reset Templates</Btn>}
      />
      <div style={{display:"grid",gridTemplateColumns:"280px minmax(0,1fr)",gap:16}}>
        <Card>
          <CardHeader title="Templates" subtitle={`${templates.length} active templates`}/>
          <div style={{padding:10,display:"flex",flexDirection:"column",gap:6}}>
            {templates.map(t => (
              <button key={t.id} onClick={()=>setSelected(t.id)}
                style={{textAlign:"left",padding:"10px 11px",border:"1px solid var(--line)",borderRadius:"var(--r)",background:selected===t.id?"var(--blue-l)":"var(--bg3)",color:selected===t.id?"var(--blue)":"var(--text2)",fontWeight:selected===t.id?600:500,display:"flex",justifyContent:"space-between",gap:10,alignItems:"center"}}
              >
                <span>{t.name}</span>
                {["caseRegistered","caseClosed"].includes(t.id) && <span style={{fontSize:10,textTransform:"uppercase",letterSpacing:".04em",color:selected===t.id?"var(--blue)":"var(--green)"}}>Auto</span>}
              </button>
            ))}
          </div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"minmax(0,1.25fr) minmax(320px,.75fr)",gap:16}}>
          <div>
            <Card style={{marginBottom:16}}>
              <CardHeader title={current.name} subtitle="Subject and body"/>
              <div style={{padding:16,display:"grid",gap:12}}>
                <FormGroup label="Subject">
                  <Input value={current.subject} onChange={v=>updateTemplate("subject",v)}/>
                </FormGroup>
                <FormGroup label="Variables">
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {EMAIL_TEMPLATE_VARIABLES.map(v=>(
                      <button key={v} onClick={()=>insertVariable(v)}
                        style={{border:"1px solid var(--line)",background:"var(--bg)",color:"var(--text3)",borderRadius:"var(--r)",padding:"3px 7px",fontSize:11,fontFamily:"var(--mono)",cursor:"pointer"}}
                      >{`{{${v}}}`}</button>
                    ))}
                  </div>
                </FormGroup>
                <FormGroup label="Email Body">
                  <Textarea value={current.body} onChange={v=>updateTemplate("body",v)} rows={13}/>
                </FormGroup>
              </div>
            </Card>
            <Card>
              <CardHeader title="Send Test Email" subtitle="SMTP uses EMAIL_USER and EMAIL_PASS"/>
              <div style={{padding:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <Input type="email" value={testEmail} onChange={setTestEmail} placeholder="recipient@company.com" style={{maxWidth:320}}/>
                <Btn variant="primary" onClick={sendTest} loading={sending}>Send Test</Btn>
              </div>
            </Card>
          </div>
          <div>
            <Card style={{marginBottom:16,overflow:"hidden"}}>
              <CardHeader title="Live Preview" subtitle={interpolate(current.subject)}/>
              <div style={{background:"#F3F4F6",padding:14}}>
                <div style={{maxWidth:520,margin:"0 auto",background:"#FFFFFF",border:"1px solid var(--line)",borderRadius:"var(--r2)",overflow:"hidden",boxShadow:"var(--sh)"}}>
                  <div style={{background:"#111827",color:"#FFFFFF",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div style={{fontWeight:700,letterSpacing:".02em"}}>ONEPWS PVMS</div>
                    <div style={{fontSize:11,color:"#FCA5A5",textTransform:"uppercase",letterSpacing:".08em"}}>Automated Mail</div>
                  </div>
                  <div style={{padding:18}}>
                    <div style={{fontSize:15,fontWeight:700,color:"#111827",marginBottom:12}}>{interpolate(current.subject)}</div>
                    <div dangerouslySetInnerHTML={{__html:bodyPreviewHtml}}/>
                  </div>
                  <div style={{background:"#F9FAFB",borderTop:"1px solid var(--line)",padding:"10px 16px",fontSize:11,color:"var(--text3)"}}>
                    PVMS Automation System | ONEPWS Pvt. Ltd.
                  </div>
                </div>
              </div>
            </Card>
            <Card>
              <CardHeader title="Automation Rules"/>
              <div style={{padding:0}}>
                {automationRules.map((rule,i)=>(
                  <div key={rule.event} style={{padding:"11px 14px",borderBottom:i<automationRules.length-1?"1px solid var(--line)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"center",marginBottom:5}}>
                      <div style={{fontSize:12.5,fontWeight:600,color:"var(--text)"}}>{rule.event}</div>
                      <span style={{fontSize:10,fontWeight:700,color:"var(--green)",background:"var(--green-bg)",border:"1px solid var(--green-bd)",borderRadius:10,padding:"1px 7px"}}>Active</span>
                    </div>
                    <div style={{fontSize:11,color:"var(--text3)"}}>Template: {rule.template}</div>
                    <div style={{fontSize:11,color:"var(--text3)"}}>To: {rule.to} | CC: {rule.cc}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      </div>
    </div>
  );
}

function UsersPage({ user, toast }) {
  const [users, setUsers]     = useState(()=>DB.get("users",[]));
  const [showForm, setShowForm] = useState(false);
  const [editUser, setEditUser] = useState(null);   // user object being edited
  const [delUser,  setDelUser]  = useState(null);   // user id pending delete
  const [form, setForm]         = useState({ name:"", email:"", empCode:"", dept:"", role:"User/Employee", designation:"", active:true });
  const [search, setSearch]     = useState("");
  const [saving, setSaving]     = useState(false);
  const [invitingUserId, setInvitingUserId] = useState(null);

  // Permission matrix  stored in DB so Master Admin can edit
  const DEFAULT_MATRIX = [
    { module:"Dashboard Analytics",        perms:["Full","Full","Dept only","Read only","Read only"] },
    { module:"Register Violation",         perms:["","","","",""] },
    { module:"Approve / Reject Cases",     perms:["","","","",""] },
    { module:"Investigation & CAPA",       perms:["","","","Assigned",""] },
    { module:"Warning Letters",            perms:["","View","","","Own only"] },
    { module:"Reports & MIS Export",       perms:["","","Dept only","",""] },
    { module:"Bulk Data Export",           perms:["","","","",""] },
    { module:"User Management",            perms:["","","","",""] },
    { module:"Master Data Config",         perms:["","","","",""] },
    { module:"Audit Trail",                perms:["","Read","Read","",""] },
    { module:"Employee Compliance",        perms:["","","Dept only","",""] },
  ];
  const [matrix, setMatrix] = useState(()=>DB.get("permMatrix") || DEFAULT_MATRIX);
  const [editMatrix, setEditMatrix] = useState(false);
  const [matrixDraft, setMatrixDraft] = useState(null);
  const [newModule, setNewModule] = useState("");

  if (user.role !== "Master Admin") return <EmptyState icon="lock" title="Access Restricted" sub="Master Admin only"/>;

  const filtered = users.filter(u => !search || [u.name,u.email,u.role,u.dept].some(x=>(x||"").toLowerCase().includes(search.toLowerCase())));
  const roleCounts = ROLES.reduce((a,r)=>{a[r]=users.filter(u=>u.role===r).length;return a},{});

  const openAdd = () => {
    setEditUser(null);
    setForm({ name:"", email:"", empCode:"", dept:"", role:"User/Employee", designation:"", active:true });
    setShowForm(true);
    setDelUser(null);
  };

  const openEdit = (u) => {
    setEditUser(u);
    setForm({ name:u.name, email:u.email, empCode:u.empCode||"", dept:u.dept||"", role:u.role, designation:u.designation||"", active:u.active!==false });
    setShowForm(true);
    setDelUser(null);
  };

  const saveUser = () => {
    if (!form.name || !form.email) { toast("Name and email required","error"); return; }
    setSaving(true);
    setTimeout(async ()=>{
      try {
        const arr = DB.get("users",[]);
        const normalizedEmail = form.email.trim().toLowerCase();
        const cleanForm = { ...form, name:form.name.trim(), email:normalizedEmail };
        const duplicate = arr.some(x => (x.email || "").toLowerCase() === normalizedEmail && (!editUser || x.id !== editUser.id));
        if (duplicate) { toast("Email already exists","error"); return; }
        let createdUser = null;
        let initialPassword = "";
        if (editUser) {
          const idx = arr.findIndex(x=>x.id===editUser.id);
          if (idx<0) { toast("User record not found","error"); return; }
          arr[idx] = {...arr[idx],...cleanForm, updatedAt:Date.now()};
        } else {
          initialPassword = generatePortalPassword();
          createdUser = {id:"u"+Date.now(),...cleanForm,password:initialPassword,mustChangePassword:true,passwordUpdatedAt:Date.now(),complianceScore:100,violations:0,createdAt:Date.now()};
          arr.push(createdUser);
        }
        const syncedUsers = syncComplianceScores(arr, DB.get("violations",[]), true);
        setUsers([...syncedUsers]);
        setShowForm(false); setEditUser(null);
        setForm({name:"",email:"",empCode:"",dept:"",role:"User/Employee",designation:"",active:true});
        if (createdUser) {
          toast(`User ${createdUser.name} created. Click Invite to send the login email.`,"success");
        } else {
          toast(`User ${form.name} updated`,"success");
        }
      } catch (err) {
        toast(err.message || "Unable to save user","error");
      } finally {
        setSaving(false);
      }
    },400);
  };

  const confirmDelete = (uid) => {
    if (uid==="u1") { toast("Cannot delete system administrator","error"); return; }
    const arr = DB.get("users",[]).filter(u=>u.id!==uid);
    const syncedUsers = syncComplianceScores(arr, DB.get("violations",[]), true);
    setUsers([...syncedUsers]); setDelUser(null);
    toast("User deleted","success");
  };

  const toggleActive = (uid) => {
    const arr = DB.get("users",[]).map(u=>u.id===uid?{...u,active:!u.active}:u);
    const syncedUsers = syncComplianceScores(arr, DB.get("violations",[]), true);
    setUsers([...syncedUsers]);
    toast("User status updated","success");
  };

  const sendInviteEmail = async (targetUser) => {
    if (!targetUser?.email) { toast("User email missing", "error"); return; }
    setInvitingUserId(targetUser.id);
    try {
      const current = DB.get("users", []);
      const idx = current.findIndex(u => u.id === targetUser.id);
      const invitePassword = targetUser.password || targetUser.temporaryPassword || targetUser.tempPassword || generatePortalPassword();
      const inviteUser = { ...(idx >= 0 ? current[idx] : targetUser), password:invitePassword, mustChangePassword:true };
      await requestUserInviteEmail(inviteUser, user.name || "Master Admin", invitePassword);
      if (idx >= 0) {
        const updated = current.map((u,i) => i === idx ? { ...u, password:invitePassword, mustChangePassword:true, inviteSentAt:Date.now(), inviteSentBy:user.name || "Master Admin" } : u);
        const syncedUsers = syncComplianceScores(updated, DB.get("violations",[]), true);
        setUsers([...syncedUsers]);
      }
      toast(`Invite email sent to ${targetUser.email}`, "success");
    } catch (err) {
      toast(err.message || "Invite email failed", "error");
    } finally {
      setInvitingUserId(null);
    }
  };

  //  Matrix editing 
  const startMatrixEdit = () => { setMatrixDraft(JSON.parse(JSON.stringify(matrix))); setEditMatrix(true); };
  const saveMatrix = () => { setMatrix(matrixDraft); DB.set("permMatrix",matrixDraft); setEditMatrix(false); toast("Permission matrix saved","success"); };
  const cancelMatrixEdit = () => { setEditMatrix(false); setMatrixDraft(null); };
  const resetMatrix = () => { setMatrixDraft(JSON.parse(JSON.stringify(DEFAULT_MATRIX))); toast("Reset to defaults  click Save to apply","info"); };

  const updatePerm = (rowIdx, colIdx, val) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d[rowIdx].perms[colIdx] = val;
    setMatrixDraft(d);
  };
  const updateModule = (rowIdx, val) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d[rowIdx].module = val;
    setMatrixDraft(d);
  };
  const deleteRow = (rowIdx) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d.splice(rowIdx,1);
    setMatrixDraft(d);
  };
  const addRow = () => {
    if (!newModule.trim()) { toast("Enter a module name","error"); return; }
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d.push({module:newModule.trim(), perms:["","","","",""]});
    setMatrixDraft(d); setNewModule(""); toast("Row added","success");
  };

  const downloadEmployeeTemplate = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["SPOCName","EmailID","DepartmentName","ReportingToName","ReportingToEmail","HODBUHEmail","ManagementEmail","Status"]];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Employee Import");
    XLSX.writeFile(wb, "PVMS_Employee_Import_Template.xlsx");
  };

  const importEmployees = async (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type:"array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });
      const current = DB.get("users", []);
      let added = 0, updated = 0;
      rows.forEach((row, index) => {
        const email = String(row.EmailID || "").trim().toLowerCase();
        const name = String(row.SPOCName || "").trim();
        if (!email || !name) return;
        const existingIndex = current.findIndex(u => (u.email || "").toLowerCase() === email);
        const existingUser = existingIndex >= 0 ? current[existingIndex] : null;
        const initialPassword = existingUser ? existingUser.password : generatePortalPassword();
        const record = {
          name,
          email,
          dept: String(row.DepartmentName || "").trim(),
          designation: existingUser ? (existingUser.designation || "Employee") : "Employee",
          role: existingUser ? (existingUser.role || "User/Employee") : "User/Employee",
          active: String(row.Status || "Active").toLowerCase() !== "inactive",
          reportingToName: String(row.ReportingToName || "").trim(),
          reportingToEmail: String(row.ReportingToEmail || "").trim(),
          hodBuhEmail: String(row.HODBUHEmail || "").trim(),
          managementEmail: String(row.ManagementEmail || "").trim(),
          empCode: existingUser ? existingUser.empCode : `EMP-${String(Date.now() + index).slice(-6)}`,
          password: initialPassword,
          mustChangePassword: existingUser ? !!existingUser.mustChangePassword : true,
          passwordUpdatedAt: existingUser ? existingUser.passwordUpdatedAt : Date.now(),
          complianceScore: existingUser ? existingUser.complianceScore : 100,
          violations: existingUser ? existingUser.violations : 0,
        };
        if (existingIndex >= 0) {
          current[existingIndex] = { ...current[existingIndex], ...record };
          updated++;
        } else {
          const newUser = { id:"u" + Date.now() + index, ...record };
          current.push(newUser);
          added++;
        }
      });
      const syncedUsers = syncComplianceScores(current, DB.get("violations",[]), true);
      setUsers([...syncedUsers]);
      toast(`Employee import complete: ${added} added, ${updated} updated. Use Invite to send login emails.`, "success");
    } catch (err) {
      toast("Unable to import employee file", "error");
    } finally {
      event.target.value = "";
    }
  };

  const ROLE_COLORS = {"Master Admin":["var(--red-bg)","var(--red)"],"Management":["var(--purple-bg)","var(--purple)"],"HOD":["var(--blue-l)","var(--blue)"],"Process Dept Rep":["var(--amber-bg)","var(--amber)"],"User/Employee":["var(--green-bg)","var(--green)"]};
  const PERM_OPTIONS = ["—","Full","Read","Read only","Dept only","Assigned","View","Own only","Partial"];

  return (
    <div>
      <PageHeader title="User Management" sub="Role-based access control  Manage accounts  Configure permissions"
        actions={<Btn variant="primary" size="sm" onClick={openAdd}>+ Add User</Btn>}
      />

      {/* KPI row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
        {ROLES.map((r,i)=>{
          const cols=["var(--red)","var(--purple)","var(--blue)","var(--amber)","var(--green)"];
          return <KpiCard key={r} label={r} value={roleCounts[r]||0} color={cols[i]}/>;
        })}
      </div>

      {/* Add / Edit Form */}
      {showForm && (
        <Card style={{marginBottom:16}}>
          <CardHeader title={editUser?"Edit User":"Add New User"} actions={<Btn size="sm" ghost onClick={()=>{setShowForm(false);setEditUser(null);}}> Cancel</Btn>}/>
          <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <FormGroup label="Full Name" required><Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Full name"/></FormGroup>
            <FormGroup label="Email" required><Input type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="email@company.com"/></FormGroup>
            <FormGroup label="Employee Code"><Input value={form.empCode} onChange={v=>setForm(f=>({...f,empCode:v}))} placeholder="EMP-0000"/></FormGroup>
            <FormGroup label="Department"><Select value={form.dept} onChange={v=>setForm(f=>({...f,dept:v}))} options={activeMasterOptions("masterDepts", DEPARTMENTS)} placeholder="Select dept"/></FormGroup>
            <FormGroup label="Designation"><Select value={form.designation} onChange={v=>setForm(f=>({...f,designation:v}))} options={optionsWithCurrent(activeMasterOptions("masterDesigs", DESIGNATIONS), form.designation)} placeholder="Select designation"/></FormGroup>
            <FormGroup label="Role"><Select value={form.role} onChange={v=>setForm(f=>({...f,role:v}))} options={ROLES}/></FormGroup>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={form.active} onChange={e=>setForm(f=>({...f,active:e.target.checked}))} style={{width:14,height:14}}/>
                Active account
              </label>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <Btn onClick={()=>{setShowForm(false);setEditUser(null);}}>Cancel</Btn>
              <Btn variant="primary" onClick={saveUser} loading={saving}>{editUser?"Save Changes":"Create User"}</Btn>
            </div>
          </div>
        </Card>
      )}

      <Card style={{marginBottom:16}}>
        <CardHeader
          title="Bulk Import Employee Database"
          subtitle="Accepted columns: SPOCName, EmailID, DepartmentName, ReportingToName, ReportingToEmail, HODBUHEmail, ManagementEmail, Status"
          actions={<Btn size="sm" onClick={downloadEmployeeTemplate}>Download Template</Btn>}
        />
        <div style={{padding:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <input type="file" accept=".xlsx,.xls,.csv" onChange={importEmployees}
            style={{border:"1px solid var(--line)",borderRadius:"var(--r)",padding:"7px 10px",background:"var(--bg3)",fontSize:12,color:"var(--text2)"}}
          />
          <span style={{fontSize:12,color:"var(--text3)"}}>Existing employees are updated by EmailID. New employees are created as User/Employee accounts.</span>
        </div>
      </Card>

      {/* User Table */}
      <Card style={{marginBottom:16}}>
        <CardHeader title="All Users" actions={<SearchBar value={search} onChange={setSearch} placeholder="Search users"/>}/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["User","Emp Code","Department","Role","Designation","Status","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(u=>{
                const rc = ROLE_COLORS[u.role]||["var(--bg2)","var(--text3)"];
                const isDel = delUser===u.id;
                return (

                    <td style={{padding:"9px 12px"}}><span style={{fontSize:11,color:u.active!==false?"var(--green)":"var(--text3)"}}>{u.active!==false?" Active":" Inactive"}</span></td>
                    <td style={{padding:"9px 12px"}}>
                      {isDel ? (
                        <div style={{display:"flex",gap:5,alignItems:"center"}}>
                          <span style={{fontSize:11,color:"var(--red)",fontWeight:600}}>Delete?</span>
                          <Btn size="sm" variant="danger" onClick={()=>confirmDelete(u.id)}>Yes</Btn>
                          <Btn size="sm" ghost onClick={()=>setDelUser(null)}>No</Btn>
                        </div>

                        <div style={{display:"flex",gap:4,flexWrap:"nowrap"}}>
                          <Btn size="sm" onClick={()=>openEdit(u)} icon={<Icon name="edit" size={12}/>}>Edit</Btn>

                          {u.id!=="u1" && <Btn size="sm" ghost onClick={()=>sendInviteEmail(u)} loading={invitingUserId===u.id} icon={<Icon name="mail" size={12}/>}>Invite</Btn>}

                        </div>

                );
              })}

function generateWarningPDF(violation, issuedBy, toast, letterType="Warning Letter Level-1", options={}) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { toast("PDF library not loaded","error"); return; }
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, ml=22, mr=188, lw=mr-ml;

  // Header
  doc.setFillColor(13,13,13);
  doc.rect(0,0,W,30,"F");
  doc.setFillColor(227,30,36); doc.rect(0,30,W,1,"F");
  // Add white logo for dark header (fallback to regular logo or text)
  const wlLogo = LOGO_WHITE_B64 || LOGO_B64;
  try { if(wlLogo) doc.addImage(wlLogo, pdfImageFormat(wlLogo), ml,6,48,14); else throw new Error("no logo"); } catch(e) {
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text("ONEPWS", ml, 14);
  }
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7.5);
  doc.text(ISO_CERTS, mr, 12, {align:"right"});
  doc.setFontSize(7);
  doc.text("Confidential | HR Document | Not for External Distribution", mr, 20, {align:"right"});

  // Ref line
  const refNo = "HR/WL/"+new Date().getFullYear()+"/"+violation.id.split("-").pop();
  doc.setTextColor(50,50,50);
  doc.setFontSize(8.5);
  doc.setFont("helvetica","normal");
  doc.text(`Ref No: ${refNo}`, ml, 35);
  doc.text(`Date: ${new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"})}`, mr, 35, {align:"right"});

  // Title
  doc.setFont("helvetica","bold");
  doc.setFontSize(13);
  doc.setTextColor(13,27,42);
  const title = letterType.toUpperCase();
  doc.text(title, W/2, 45, {align:"center"});
  doc.setLineWidth(.5);
  doc.setDrawColor(13,27,42);
  const tw = doc.getTextWidth(title);
  doc.line(W/2-tw/2, 47, W/2+tw/2, 47);

  // Employee details box
  doc.setFillColor(244,247,251);
  doc.roundedRect(ml, 52, lw, 38, 2,2,"F");
  doc.setDrawColor(200,212,230);
  doc.setLineWidth(.3);
  doc.roundedRect(ml, 52, lw, 38, 2,2,"S");

  doc.setFont("helvetica","bold");
  doc.setFontSize(8.5);
  doc.setTextColor(13,27,42);
  const fields = [
    ["To", violation.empName || ""],
    ["Employee Code", violation.empCode || ""],
    ["Designation", violation.designation || ""],
    ["Department", violation.dept || ""],
    ["Date of Violation", violation.date || ""],
    ["Case Reference No.", violation.id],
  ];
  const colW = lw/2;
  fields.forEach((f,i)=>{
    const col = i%2; const row = Math.floor(i/2);
    const x = ml+6+col*colW;
    const y = 59+row*12;
    doc.setFont("helvetica","bold");
    doc.setTextColor(80,80,80);
    doc.text(f[0]+":", x, y);
    doc.setFont("helvetica","normal");
    doc.setTextColor(13,27,42);
    doc.text(f[1], x+30, y);
  });

  let y = 97;

  // Body
  const para = (text, indent=0) => {
    doc.setFont("helvetica","normal");
    doc.setFontSize(9.5);
    doc.setTextColor(40,40,40);
    const lines = doc.splitTextToSize(text, lw-indent);
    doc.text(lines, ml+indent, y);
    y += lines.length * 5 + 4;
  };
  const heading = (text) => {
    doc.setFont("helvetica","bold");
    doc.setFontSize(9.5);
    doc.setTextColor(13,27,42);
    doc.text(text, ml, y);
    y += 6;
  };

  heading("Subject: Notice of Process Compliance Violation");
  y += 2;
  para(`Dear ${violation.empName || "Employee"},`);
  para(`This ${letterType} is being formally issued to you following a thorough investigation of a process compliance violation reported on ${violation.date}. The investigation conducted by the designated investigator and approved by the HOD has confirmed that you were found in non-compliance with the established process standards and SOPs applicable to your role.`);

  heading("Nature of Violation:");
  para(`Category: ${violation.category}`, 4);
  para(`SOP / Policy Violated: ${violation.sopViolated||"Company Process Standards"}`, 4);
  para(`Severity Classification: ${violation.severity}`, 4);
  para(`Description: ${violation.description}`, 4);

  heading("Impact & Risk:");
  para(`This violation has been assessed with a risk score of ${violation.riskScore||""}/10 and is categorized as ${violation.severity} severity under the Process Violation Management System (PVMS) governed under ISO 9001:2015, ISO 45001:2018, and applicable quality and safety management standards.`);

  if (violation.repeatViolation) {
    doc.setFillColor(254,232,232);
    doc.roundedRect(ml, y, lw, 12, 1,1,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    doc.setTextColor(185,28,28);
    doc.text("  REPEAT VIOLATION: This is a repeat occurrence. Stricter disciplinary action will apply.", ml+4, y+7.5);
    y += 16;
  }

  heading("Expected Corrective Behaviour:");
  para(`You are hereby formally directed to immediately comply with all applicable SOPs, work instructions, and company policies relevant to your role and department. Any recurrence of similar behaviour may attract more stringent disciplinary action as per the Company's Disciplinary Policy Matrix, including but not limited to suspension, increment hold, or termination of employment.`);

  para(`You are required to submit your written acknowledgement and response to this letter within three (3) working days to your HOD and the HR Department.`);

  // Signatures
  y = Math.max(y, 230);
  doc.setLineWidth(.3);
  doc.setDrawColor(180,180,180);
  const sigW = lw/3;
  ["HOD / Department Head","HR Manager / HR BP","Management (Noted)"].forEach((s,i)=>{
    const x = ml + i*sigW;
    doc.line(x+4, y+14, x+sigW-4, y+14);
    doc.setFont("helvetica","normal");
    doc.setFontSize(7.5);
    doc.setTextColor(100,100,100);
    const name = i===0?(violation.assignedHOD||"HOD"):i===1?((issuedBy||{}).name||"HR Manager"):"GM Operations";
    doc.text(name, x+sigW/2, y+18, {align:"center"});
    doc.text(s, x+sigW/2, y+22, {align:"center"});
  });

  // Footer
  doc.setFillColor(0,0,0);
  doc.rect(0,287,W,10,"F");
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  doc.setTextColor(255,255,255);
  doc.text(`${COMPANY_NAME} | PVMS v${APP_VERSION} | Generated: ${new Date().toLocaleString("en-IN")} | ${refNo}`, W/2, 293, {align:"center"});

  const filename = `WarningLetter_${violation.empName?.replace(/\s+/g,"_")}_${violation.id}.pdf`;
  const dataUrl = doc.output("datauristring");
  if (options.download !== false) doc.save(filename);
  if(toast && options.toast !== false) toast("Warning letter PDF downloaded","success");
  return { filename, dataUrl };
}

function warningAuditEntry(violation) {
  return [...(violation?.auditLog || [])].reverse().find(entry =>
    /warning letter/i.test(String(entry.action || "")) &&
    /(issued|generated|attached)/i.test(String(entry.action || ""))
  );
}

function warningLetterTypeFromCase(violation) {
  const action = warningAuditEntry(violation)?.action || "";
  const match = action.match(/Warning letter issued \((.+)\)/i);
  return match?.[1] || "Warning Letter Level-1";
}

function isoDateFromTimestamp(value) {
  const date = new Date(value || Date.now());
  return Number.isNaN(date.getTime()) ? new Date().toISOString().slice(0,10) : date.toISOString().slice(0,10);
}

function warningRecordForStorage(warning) {
  if (!warning || typeof warning !== "object") return warning;
  const { attachmentDataUrl, previewDataUrl, ...stored } = warning;
  return stored;
}

function warningEvidenceForStorage(evidence) {
  if (!evidence || typeof evidence !== "object") return evidence;
  if (evidence.source !== "warning-letter" && !evidence.warningId) return evidence;
  const { attachmentDataUrl, ...stored } = evidence;
  return { ...stored, url:"" };
}

function caseWithStoredWarningEvidence(violation) {
  if (!violation?.evidence?.length) return violation;
  const evidence = violation.evidence.map(warningEvidenceForStorage);
  return JSON.stringify(evidence) === JSON.stringify(violation.evidence) ? violation : { ...violation, evidence };
}

function warningFromCase(violation, warningId) {
  if (!violation) return null;
  const warningAudit = warningAuditEntry(violation);
  const createdAt = warningAudit?.at || violation.updatedAt || Date.now();
  const id = warningId || violation.warningLetterId || `WL-${createdAt}`;
  return {
    id,
    caseId:violation.id,
    empId:violation.empId,
    empName:violation.empName,
    empCode:violation.empCode,
    dept:violation.dept,
    designation:violation.designation,
    violationDate:violation.date,
    letterDate:isoDateFromTimestamp(createdAt),
    letterType:warningLetterTypeFromCase(violation),
    severity:violation.severity,
    sopViolated:violation.sopViolated,
    category:violation.category,
    description:violation.description,
    disciplinaryAction:getDisciplinaryMatrix()[normalizeSeverity(violation.severity)]?.[0] || "Formal Warning",
    corrective:"Strict adherence to all applicable SOPs and company policies.",
    issuedBy:"HOD + HR Manager",
    status:"Issued",
    createdAt
  };
}

function caseWarningRecords(violation, warnings = DB.get("warnings", [])) {
  if (!violation) return [];
  const existing = (warnings || []).filter(w => w.caseId === violation.id).map(warningRecordForStorage);
  const warningIds = new Set(existing.map(w => w.id).filter(Boolean));
  const inferredIds = [
    violation.warningLetterId,
    ...(violation.evidence || []).map(ev => ev.warningId)
  ].filter(Boolean);
  const shouldInfer = violation.warningIssued || inferredIds.length > 0;
  const inferred = [];
  inferredIds.forEach(id => {
    if (!warningIds.has(id)) {
      const warning = warningFromCase(violation, id);
      if (warning) {
        inferred.push(warning);
        warningIds.add(id);
      }
    }
  });
  if (shouldInfer && !existing.length && !inferred.length) {
    const warning = warningFromCase(violation);
    if (warning) inferred.push(warning);
  }
  return [...existing, ...inferred];
}

function mergedWarningRecords(warnings = DB.get("warnings", []), violations = DB.get("violations", [])) {
  const byId = new Map();
  const push = (warning) => {
    const stored = warningRecordForStorage(warning);
    if (!stored?.id) return;
    byId.set(stored.id, { ...(byId.get(stored.id) || {}), ...stored });
  };
  (warnings || []).forEach(push);
  (violations || []).forEach(violation => caseWarningRecords(violation, warnings).forEach(push));
  return [...byId.values()].sort((a,b)=>(b.createdAt || 0) - (a.createdAt || 0));
}

function reconcileWarningLetters(options = {}) {
  const { persist = true } = options;
  const violations = DB.get("violations", []);
  const currentWarnings = DB.get("warnings", []);
  const warnings = mergedWarningRecords(currentWarnings, violations);
  const storedViolations = violations.map(caseWithStoredWarningEvidence);
  if (persist && JSON.stringify(currentWarnings) !== JSON.stringify(warnings)) {
    DB.set("warnings", warnings);
  }
  if (persist && JSON.stringify(violations) !== JSON.stringify(storedViolations)) {
    DB.set("violations", storedViolations);
  }
  return { warnings, violations:storedViolations };
}

function warningIdsForCase(violation, warnings = DB.get("warnings", [])) {
  return new Set(caseWarningRecords(violation, warnings).map(w => w.id).filter(Boolean));
}

function statusBeforeWarningLetter(violation) {
  if (violation?.statusBeforeWarningLetter) return caseStatusValue(violation.statusBeforeWarningLetter);
  let status = "Open";
  for (const entry of (violation?.auditLog || [])) {
    const action = String(entry.action || "");
    if (/warning letter/i.test(action) && /(issued|generated|attached)/i.test(action)) return status;
    const statusMatch = action.match(/Status (?:changed|rolled back) to (.+)$/i);
    if (statusMatch) status = caseStatusValue(statusMatch[1]);
  }
  return status;
}

function warningToEvidenceAttachment(warning) {
  return {
    id:`att-${warning.id}`,
    name:warning.attachmentName || `${warning.id}.pdf`,
    url:"",
    type:"document",
    fileType:"document",
    source:"warning-letter",
    warningId:warning.id,
    caseId:warning.caseId,
    createdAt:warning.createdAt || Date.now()
  };
}

function upsertWarningAttachmentOnCase(warning, byName="System") {
  if (!warning?.caseId) return;
  const storedWarning = warningRecordForStorage(warning);
  const violations = DB.get("violations", []);
  const idx = violations.findIndex(v => v.id === storedWarning.caseId);
  if (idx < 0) return;
  const existingEvidence = violations[idx].evidence || [];
  const withoutOld = existingEvidence.filter(ev => ev.warningId !== storedWarning.id);
  const auditLog = violations[idx].auditLog || [];
  const alreadyLogged = auditLog.some(entry => String(entry.action || "").includes(storedWarning.id));
  violations[idx] = {
    ...violations[idx],
    warningIssued:true,
    warningLetterId:storedWarning.id,
    evidence:[...withoutOld, warningToEvidenceAttachment(storedWarning)],
    auditLog:alreadyLogged ? auditLog : [...auditLog, { action:`Warning letter attached (${storedWarning.id})`, by:byName, at:Date.now() }]
  };
  DB.set("violations", violations.map(caseWithStoredWarningEvidence));
}

function prepareWarningPreview(warning, allViolations, user, toast) {
  if (!warning) return null;
  let next = warning;
  if (!next.attachmentDataUrl) {
    const violation = allViolations.find(v => v.id === next.caseId);
    if (!violation) { toast("Linked case not found for this warning letter", "error"); return null; }
    const attachment = generateWarningPDF(violation, user, toast, next.letterType, { download:false, toast:false });
    if (!attachment) return null;
    next = { ...next, attachmentName:attachment.filename, attachmentDataUrl:attachment.dataUrl };
  }
  const warnings = DB.get("warnings", []);
  const stored = warningRecordForStorage(next);
  DB.set("warnings", warnings.some(w => w.id === next.id)
    ? warnings.map(w => w.id === next.id ? stored : warningRecordForStorage(w))
    : [...warnings.map(warningRecordForStorage), stored]
  );
  upsertWarningAttachmentOnCase(stored, user?.name || "System");
  return next;
}

function issueWarningLetter(violation, issuedBy, toast, letterType="Warning Letter Level-1", issuer="HOD + HR Manager", options={}) {
  const attachment = generateWarningPDF(violation, issuedBy, toast, letterType, { download: options.download !== false, toast:false });
  if (!attachment) return null;
  const warnings = DB.get("warnings", []);
  const createdAt = Date.now();
  const newW = {
    id:"WL-"+createdAt,
    caseId:violation.id,
    empId:violation.empId,
    empName:violation.empName,
    empCode:violation.empCode,
    dept:violation.dept,
    designation:violation.designation,
    violationDate:violation.date,
    letterDate:new Date().toISOString().slice(0,10),
    letterType,
    severity:violation.severity,
    sopViolated:violation.sopViolated,
    category:violation.category,
    description:violation.description,
    disciplinaryAction:getDisciplinaryMatrix()[normalizeSeverity(violation.severity)]?.[0]||"Formal Warning",
    corrective:"Strict adherence to all applicable SOPs and company policies.",
    issuedBy:issuer,
    status:"Issued",
    attachmentName:attachment.filename,
    createdAt
  };
  const previewWarning = { ...newW, attachmentDataUrl:attachment.dataUrl };
  DB.set("warnings", [...warnings.map(warningRecordForStorage), newW]);

  const violations = DB.get("violations", []);
  const idx = violations.findIndex(v => v.id === violation.id);
  if (idx >= 0) {
    const existingEvidence = violations[idx].evidence || [];
    const withoutOld = existingEvidence.filter(ev => ev.warningId !== newW.id);
    violations[idx] = {
      ...violations[idx],
      warningIssued:true,
      warningLetterId:newW.id,
      statusBeforeWarningLetter:violations[idx].statusBeforeWarningLetter || violations[idx].status || "Open",
      evidence:[...withoutOld, warningToEvidenceAttachment(newW)],
      auditLog:[...(violations[idx].auditLog || []), { action:`Warning letter issued (${letterType})`, by:issuedBy?.name || "System", at:Date.now() }]
    };
    DB.set("violations", violations.map(caseWithStoredWarningEvidence));
  }
  if (toast) toast("Warning letter generated, saved, and attached","success");
  return previewWarning;
}

function revokeWarningLettersForCase(violation, user) {
  const allWarnings = DB.get("warnings", []);
  const warningIds = warningIdsForCase(violation, allWarnings);
  const revokedWarnings = caseWarningRecords(violation, allWarnings);
  DB.set("warnings", allWarnings.filter(w => w.caseId !== violation.id && !warningIds.has(w.id)).map(warningRecordForStorage));

  const vs = DB.get("violations", []);
  const idx = vs.findIndex(v => v.id === violation.id);
  if (idx < 0) return { revokedWarnings, rollbackStatus:"Open", violations:vs };

  const rollbackStatus = statusBeforeWarningLetter(vs[idx]);
  const cleanedEvidence = (vs[idx].evidence || []).filter(ev =>
    ev.source !== "warning-letter" && !(ev.warningId && warningIds.has(ev.warningId))
  );
  const auditLog = vs[idx].auditLog || [];
  vs[idx] = {
    ...vs[idx],
    evidence:cleanedEvidence,
    warningIssued:false,
    warningLetterId:null,
    statusBeforeWarningLetter:null,
    status:rollbackStatus,
    updatedBy:user?.name || "System",
    updatedAt:Date.now(),
    auditLog:[
      ...auditLog,
      { action:`Warning letter(s) revoked (${revokedWarnings.map(w => w.id).join(", ") || "none"})`, by:user?.name || "System", at:Date.now() },
      { action:`Status rolled back to ${caseStatusLabel(rollbackStatus)}`, by:user?.name || "System", at:Date.now() }
    ]
  };
  DB.set("violations", vs.map(caseWithStoredWarningEvidence));
  syncComplianceScores(DB.get("users", []), vs);
  return { revokedWarnings, rollbackStatus, violations:vs };
}

function deleteWarningLettersForCase(violation, user, warningId = null) {
  const allWarnings = DB.get("warnings", []);
  const targetWarnings = caseWarningRecords(violation, allWarnings).filter(w => !warningId || w.id === warningId);
  const targetIds = new Set(targetWarnings.map(w => w.id).filter(Boolean));
  DB.set("warnings", allWarnings.filter(w => !targetIds.has(w.id)).map(warningRecordForStorage));

  const vs = DB.get("violations", []);
  const idx = vs.findIndex(v => v.id === violation.id);
  if (idx < 0) return { deletedWarnings:targetWarnings, violations:vs };

  const remainingWarnings = allWarnings.filter(w => w.caseId === violation.id && !targetIds.has(w.id));
  const remainingWarningIds = new Set(remainingWarnings.map(w => w.id).filter(Boolean));
  const cleanedEvidence = (vs[idx].evidence || []).filter(ev => {
    if (ev.warningId) return !targetIds.has(ev.warningId);
    if (ev.source === "warning-letter") return !!warningId;
    return true;
  });
  const latestRemaining = remainingWarnings.sort((a,b)=>(b.createdAt || 0) - (a.createdAt || 0))[0];
  const stillHasWarning = remainingWarnings.length > 0 || cleanedEvidence.some(ev => ev.source === "warning-letter" || (ev.warningId && remainingWarningIds.has(ev.warningId)));
  vs[idx] = {
    ...vs[idx],
    evidence:cleanedEvidence,
    warningIssued:stillHasWarning,
    warningLetterId:stillHasWarning ? (latestRemaining?.id || vs[idx].warningLetterId) : null,
    statusBeforeWarningLetter:stillHasWarning ? vs[idx].statusBeforeWarningLetter : null,
    updatedBy:user?.name || "System",
    updatedAt:Date.now(),
    auditLog:[
      ...(vs[idx].auditLog || []),
      { action:`Warning letter(s) deleted (${targetWarnings.map(w => w.id).join(", ") || "none"})`, by:user?.name || "System", at:Date.now() }
    ]
  };
  DB.set("violations", vs.map(caseWithStoredWarningEvidence));
  syncComplianceScores(DB.get("users", []), vs);
  return { deletedWarnings:targetWarnings, violations:vs };
}

function exportDashboardPDF(violations, users) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) return;
  const doc = new jsPDF();
  const W=210, ml=14, mr=196;

  // Professional header with logo only (no duplicate text)
  doc.setFillColor(13,13,13);
  doc.rect(0,0,W,28,"F");
  // Red accent line
  doc.setFillColor(227,30,36);
  doc.rect(0,28,W,1.2,"F");
  const dbLogo = LOGO_WHITE_B64 || LOGO_B64;
  try { if(dbLogo) doc.addImage(dbLogo, pdfImageFormat(dbLogo), ml, 5, 50, 13); else throw new Error("no logo"); } catch(e) {
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text("ONEPWS", ml, 14);
  }
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(9.5);
  doc.text("Process Violation Management System - Dashboard Report", mr, 12, {align:"right"});
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  doc.text(`${ISO_CERTS} | Generated ${new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"})}`, mr, 19, {align:"right"});

  let y = 37;
  const kpis = [
    ["Total Violations", violations.length],
    ["Open Cases", violations.filter(v=>!["Closed","Rejected"].includes(caseStatusValue(v.status))).length],
    ["Closed Cases", violations.filter(v=>caseStatusValue(v.status)==="Closed").length],
    ["Overdue Investigation", violations.filter(v=>v.dueDate&&new Date(v.dueDate)<new Date()&&!["Closed","Rejected"].includes(caseStatusValue(v.status))).length],
    ["Critical (Active)", violations.filter(v=>normalizeSeverity(v.severity)==="Critical"&&caseStatusValue(v.status)!=="Closed").length],
    ["CAPA Pending", violations.filter(v=>caseStatusValue(v.status)==="CAPA Pending").length],
    ["Repeat Violations", violations.filter(v=>v.repeatViolation).length],
  ];
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(13,27,42);
  doc.text("Key Performance Indicators", ml, y); y+=8;
  const cardW = 43, cardH = 20;
  kpis.forEach(([k,v], i)=>{
    const x = ml + (i % 4) * 46;
    const cy = y + Math.floor(i / 4) * 24;
    doc.setDrawColor(220,225,235); doc.setFillColor(248,250,252);
    doc.roundedRect(x, cy, cardW, cardH, 2.5, 2.5, "FD");
    // Top accent line on card
    doc.setFillColor(227,30,36); doc.rect(x, cy, cardW, 1.5, "F");
    doc.setFont("helvetica","normal"); doc.setFontSize(6.5); doc.setTextColor(100,110,125);
    doc.text(k, x+3, cy+7.5);
    doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(13,27,42);
    doc.text(String(v), x+3, cy+15.5);
  });
  y += Math.ceil(kpis.length / 4) * 24 + 6;

  const drawSection = (title, headers, rows, widths) => {
    if (y > 250) { doc.addPage(); y = 18; }
    doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(13,27,42);
    doc.text(title, ml, y); y += 2;
    doc.setDrawColor(227,30,36); doc.setLineWidth(0.5); doc.line(ml, y, ml+30, y); y += 5;
    doc.setFillColor(13,27,42); doc.rect(ml, y, mr-ml, 7, "F");
    let x = ml + 2;
    headers.forEach((h,i)=>{ doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(255,255,255); doc.text(h, x, y+5); x += widths[i]; });
    y += 8;
    rows.forEach((row, idx)=>{
      if (y > 280) { doc.addPage(); y = 18; }
      if (idx % 2 === 0) { doc.setFillColor(248,250,252); doc.rect(ml, y-1, mr-ml, 7, "F"); }
      doc.setDrawColor(235,240,245); doc.setLineWidth(0.1); doc.line(ml, y+6, mr, y+6);
      let cx = ml + 2;
      row.forEach((cell,i)=>{
        const text = doc.splitTextToSize(String(cell ?? ""), widths[i]-2)[0] || "";
        doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(45,55,70);
        doc.text(text, cx, y+4);
        cx += widths[i];
      });
      y += 7;
    });
    y += 6;
  };

  const deptRows = DEPARTMENTS.map(d=>{
    const vs = violations.filter(v=>v.dept===d);
    return [d, vs.length, vs.filter(v=>!["Closed","Rejected"].includes(caseStatusValue(v.status))).length, vs.filter(v=>caseStatusValue(v.status)==="Closed").length];
  });
  drawSection("Department Summary", ["Department","Total","Open","Closed"], deptRows, [92,28,28,28]);

  const sevRows = ["Minor","Moderate","Major","Critical"].map(s=>[s, violations.filter(v=>normalizeSeverity(v.severity)===s).length]);
  drawSection("Severity Summary", ["Severity","Count"], sevRows, [92,28]);

  const recentRows = violations.slice(-15).reverse().map(v=>[v.id, v.date, v.empName || "", v.severity, v.status]);
  drawSection("Recent Violation Register", ["Case ID","Date","Employee","Severity","Status"], recentRows, [36,24,56,28,34]);

  // Professional footer
  doc.setFillColor(13,13,13);
  doc.rect(0,287,W,10,"F");
  doc.setFillColor(227,30,36); doc.rect(0,287,W,0.8,"F");
  doc.setFont("helvetica","normal");
  doc.setFontSize(6.5);
  doc.setTextColor(180,185,195);
  doc.text(`PVMS v${APP_VERSION} | Confidential | Generated ${new Date().toLocaleString("en-IN")}`, W/2, 293, {align:"center"});
  doc.save(`PVMS_Dashboard_${new Date().toISOString().slice(0,10)}.pdf`);
}

function MediaLibraryPage({ user, toast }) {
  const [tab, setTab] = useState("all");
  const [items, setItems] = useState([]);
  const [storage, setStorage] = useState({ totalSize: 0, count: 0 });
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [sort, setSort] = useState("latest");
  const [folder, setFolder] = useState("");
  const [folders, setFolders] = useState([]);
  const [selected, setSelected] = useState([]);
  const [preview, setPreview] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState([]);
  const [showUpload, setShowUpload] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [renameId, setRenameId] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const fileRef = useRef(null);

  const loadMedia = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams({ sort, limit: "48" });
      if (typeFilter !== "all") params.set("type", typeFilter);
      if (search) params.set("search", search);
      if (folder) params.set("folder", folder);
      if (tab === "favorites") params.set("favorites", "true");
      const data = await mediaApi("?" + params.toString());
      setItems(data.items || []);
      setStorage(data.storage || { totalSize: 0, count: 0 });
      const f = await mediaApi("/folders");
      setFolders(f.folders || []);
    } catch (e) {
      toast(e.message || "Failed to load media", "error");
    } finally {
      setLoading(false);
    }
  }, [sort, typeFilter, search, folder, tab, toast]);

  useEffect(() => { loadMedia(); }, [loadMedia]);

  const toggleSelect = (id) => {
    const sid = String(id);
    setSelected(s => s.includes(sid) ? s.filter(x => x !== sid) : [...s, sid]);
  };

  const uploadFiles = async (fileList) => {
    if (!fileList?.length) return;
    setUploading(true);
    const progress = Array.from(fileList).map(f => ({ name: f.name, pct: 0, status: "uploading" }));
    setUploadProgress(progress);

    const fd = new FormData();
    Array.from(fileList).forEach(f => fd.append("files", f));
    fd.append("uploadedBy", user.name || user.email || "system");
    if (folder) fd.append("folder", folder);
    fd.append("tags", JSON.stringify(["pvms", tab === "favorites" ? "favorite" : "library"]));

    try {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/media/upload");
      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          setUploadProgress(p => p.map(x => ({ ...x, pct })));
        }
      };
      const result = await new Promise((resolve, reject) => {
        xhr.onload = () => {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch { reject(new Error("Invalid response")); }
        };
        xhr.onerror = () => reject(new Error("Upload failed"));
        xhr.send(fd);
      });
      setUploadProgress(p => p.map(x => ({ ...x, pct: 100, status: "done" })));
      const n = result.count || 0;
      const errN = (result.errors || []).length;
      toast(errN ? `Uploaded ${n}, ${errN} failed` : `Uploaded ${n} file(s)`, n ? "success" : "warning");
      setShowUpload(false);
      loadMedia();
    } catch (e) {
      toast(e.message || "Upload failed", "error");
      setUploadProgress(p => p.map(x => ({ ...x, status: "error" })));
    } finally {
      setUploading(false);
      setTimeout(() => setUploadProgress([]), 2000);
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    uploadFiles(e.dataTransfer.files);
  };

  const deleteSelected = async (permanent = false) => {
    if (!selected.length) return;
    if (!window.confirm(`Delete ${selected.length} item(s)?`)) return;
    try {
      await mediaApi("/bulk", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids: selected, action: permanent ? "permanent" : "trash" }),
      });
      toast("Deleted successfully", "success");
      setSelected([]);
      loadMedia();
    } catch (e) { toast(e.message, "error"); }
  };

  const toggleFavorite = async (item) => {
    try {
      await mediaApi("/" + item._id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ isFavorite: !item.isFavorite }),
      });
      loadMedia();
    } catch (e) { toast(e.message, "error"); }
  };

  const saveRename = async () => {
    if (!renameId || !renameVal.trim()) return;
    try {
      await mediaApi("/" + renameId, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fileName: renameVal.trim() }),
      });
      toast("Renamed", "success");
      setRenameId(null);
      loadMedia();
    } catch (e) { toast(e.message, "error"); }
  };

  const copyUrl = (url) => {
    navigator.clipboard.writeText(url).then(() => toast("URL copied", "success")).catch(() => toast("Copy failed", "error"));
  };

  const fileIcon = (type) => type === "video" ? "video" : type === "image" ? "image" : "file";

  return (
    <div>
      <PageHeader
        title="Media Library"
        sub={`Cloudinary CDN  ${formatBytes(storage.totalSize)} used  ${storage.count || 0} files`}
        actions={
          <>
            <Btn size="sm" icon={<Icon name="upload" size={14}/>} onClick={() => fileRef.current?.click()} disabled={uploading}>
              {uploading ? "Uploading..." : "Upload"}
            </Btn>
            {selected.length > 0 && (
              <>
                <Btn size="sm" variant="danger" icon={<Icon name="trash" size={14}/>} onClick={() => deleteSelected(false)}>Delete ({selected.length})</Btn>
              </>
            )}
          </>
        }
      />

      <input ref={fileRef} type="file" multiple accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" style={{display:"none"}}
        onChange={e => { uploadFiles(e.target.files); e.target.value = ""; }}/>

      {uploadProgress.length > 0 && (
        <Card style={{marginBottom:14}}>
          <div style={{padding:14}}>
            {uploadProgress.map((u, i) => (
              <div key={i} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span>{u.name}</span><span>{u.pct}%</span>
                </div>
                <div className="upload-progress"><div className="upload-progress-bar" style={{width:u.pct+"%"}}/></div>
              </div>
            ))}
          </div>
        </Card>
      )}

      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16}}>
        <Card>
          <div style={{padding:12}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",marginBottom:8}}>Folders</div>
            <div onClick={() => setFolder("")} style={{padding:"6px 8px",borderRadius:"var(--r)",cursor:"pointer",fontSize:12,background:!folder?"var(--blue-l)":"transparent",color:!folder?"var(--blue)":"var(--text2)",display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <Icon name="folder" size={14}/> All Media
            </div>
            {folders.map(f => (
              <div key={f.name} onClick={() => setFolder(f.name)} style={{padding:"6px 8px",borderRadius:"var(--r)",cursor:"pointer",fontSize:12,background:folder===f.name?"var(--blue-l)":"transparent",color:folder===f.name?"var(--blue)":"var(--text2)",display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                <Icon name="folder" size={14}/> {f.name} <span style={{marginLeft:"auto",fontSize:10,color:"var(--text3)"}}>{f.count}</span>
              </div>
            ))}
            <div style={{marginTop:12,fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",marginBottom:8}}>Views</div>
            {[{k:"all",l:"All Files"},{k:"favorites",l:"Favorites"}].map(v => (
              <div key={v.k} onClick={() => { setTab(v.k); setFolder(""); }} style={{padding:"6px 8px",borderRadius:"var(--r)",cursor:"pointer",fontSize:12,background:tab===v.k?"var(--blue-l)":"transparent",color:tab===v.k?"var(--blue)":"var(--text2)",display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                {v.k === "favorites" ? <Icon name="star" size={14}/> : <Icon name="image" size={14}/>} {v.l}
