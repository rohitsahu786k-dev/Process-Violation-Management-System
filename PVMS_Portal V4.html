// EMPLOYEE COMPLIANCE PAGE
// ============================================================
function EmployeesPage({ user }) {
  const [users] = useState(DB.get("users",[]).filter(u=>u.role==="User/Employee"||u.role==="Process Dept Rep"));
  const violations = DB.get("violations",[]);
  const warnings = DB.get("warnings",[]);

  const scoreColor = (s) => s > 85 ? "var(--green)" : s > 65 ? "#D97706" : "var(--red)";
  const scoreBg = (s) => s > 85 ? "var(--green-bg)" : s > 65 ? "var(--amber-bg)" : "var(--red-bg)";
  const orgAvg = Math.round(users.reduce((a,b)=>a+b.complianceScore,0)/Math.max(users.length,1));

  return (
    <div>
      <PageHeader title="Employee Compliance Scores" sub="Scores start at 100  Minor 2  Moderate 5  Major 15  Critical 40"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <KpiCard label="Org Avg Score" value={orgAvg} color="var(--green)" sub="/100"/>
        <KpiCard label="At-Risk (< 60)" value={users.filter(u=>u.complianceScore<60).length} color="var(--red)"/>
        <KpiCard label="Repeat Offenders" value={users.filter(u=>u.violations>1).length} color="var(--amber)"/>
        <KpiCard label="Perfect Score" value={users.filter(u=>u.complianceScore===100).length} color="var(--blue)" sub="(100/100)"/>
      </div>

      <Card>
        <CardHeader title="Employee Compliance Leaderboard" subtitle="Sorted by compliance score (lowest first)"/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["#","Employee","Dept","Designation","Violations","Active Warnings","Compliance Score","Risk Level"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...users].sort((a,b)=>a.complianceScore-b.complianceScore).map((emp,i)=>{
                const empViol = violations.filter(v=>v.empId===emp.id);
                const empWarn = warnings.filter(w=>w.empId===emp.id);
                return (
                  <tr key={emp.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{padding:"10px 12px",fontSize:12,fontFamily:"var(--mono)",color:i<3?"var(--red)":"var(--text3)",fontWeight:i<3?700:400}}>{i<3?"":i+1}</td>
                    <td style={{padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><Avatar name={emp.name}/><div><div style={{fontSize:13,fontWeight:500}}>{emp.name}</div><div style={{fontSize:10,color:"var(--text3)"}}>{emp.empCode}</div></div></div></td>
                    <td style={{padding:"10px 12px",fontSize:12,color:"var(--text3)"}}>{emp.dept}</td>
                    <td style={{padding:"10px 12px",fontSize:12}}>{emp.designation}</td>
                    <td style={{padding:"10px 12px",fontFamily:"var(--mono)",fontWeight:600,color:empViol.length>3?"var(--red)":empViol.length>1?"var(--amber)":"var(--green)"}}>{empViol.length}</td>
                    <td style={{padding:"10px 12px"}}>{empWarn.length>0?<span style={{fontSize:12,fontWeight:700,color:"var(--red)"}}>{empWarn.length} warning(s)</span>:<span style={{fontSize:12,color:"var(--green)"}}>None</span>}</td>
                    <td style={{padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:70,height:6,background:"var(--line)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${emp.complianceScore}%`,background:scoreColor(emp.complianceScore)}}/></div>
                        <span style={{fontSize:13,fontFamily:"var(--mono)",fontWeight:700,color:scoreColor(emp.complianceScore)}}>{emp.complianceScore}</span>
                      </div>
                    </td>
                    <td style={{padding:"10px 12px"}}>
                      <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10,background:scoreBg(emp.complianceScore),color:scoreColor(emp.complianceScore)}}>
                        {emp.complianceScore>85?"Compliant":emp.complianceScore>65?"Monitored":emp.complianceScore>50?"At-Risk":"Critical Risk"}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// MASTER DATA PAGE
// ============================================================
function MasterDataPage({ user, toast }) {
  const [tab, setTab] = useState("Departments");
  const [depts, setDepts]   = useState(()=>DB.get("masterDepts") || DEPARTMENTS.map((d,i)=>({id:"d"+i,name:d,active:true})));
  const [cats, setCats]     = useState(()=>DB.get("masterCats")  || VIOLATION_CATEGORIES.map((c,i)=>({id:"c"+i,name:c,active:true})));
  const [rcs, setRcs]       = useState(()=>DB.get("masterRCs")   || ROOT_CAUSE_CATEGORIES.map((r,i)=>({id:"r"+i,name:r,active:true})));
  const [desigs, setDesigs] = useState(()=>DB.get("masterDesigs")|| DESIGNATIONS.map((d,i)=>({id:"dg"+i,name:d,active:true})));

  const [newItem, setNewItem]   = useState("");
  const [editId,  setEditId]    = useState(null);   // id of item being edited inline
  const [editVal, setEditVal]   = useState("");      // current edit text
  const [delConfirm, setDelConfirm] = useState(null); // id pending delete confirm

  if (user.role !== "Master Admin") return <EmptyState icon="" title="Access Restricted" sub="Master Admin only"/>;

  const configs = {
    "Departments":           { data:depts,  set:(v)=>{ setDepts(v);  DB.set("masterDepts",v);  } },
    "Violation Categories":  { data:cats,   set:(v)=>{ setCats(v);   DB.set("masterCats",v);   } },
    "Root Cause Categories": { data:rcs,    set:(v)=>{ setRcs(v);    DB.set("masterRCs",v);    } },
    "Designations":          { data:desigs, set:(v)=>{ setDesigs(v); DB.set("masterDesigs",v); } },
  };
  const cfg = configs[tab];

  // Cancel any edit / delete when switching tabs
  const switchTab = (t) => { setTab(t); setEditId(null); setEditVal(""); setDelConfirm(null); setNewItem(""); };

  const addItem = () => {
    const name = newItem.trim();
    if (!name) { toast("Enter a name","error"); return; }
    if (cfg.data.some(d=>d.name.toLowerCase()===name.toLowerCase())) { toast("Already exists","error"); return; }
    cfg.set([...cfg.data, {id:"n"+Date.now(), name, active:true}]);
    setNewItem(""); toast(`Added: ${name}`,"success");
  };

  const startEdit = (item) => { setEditId(item.id); setEditVal(item.name); setDelConfirm(null); };

  const saveEdit = () => {
    const name = editVal.trim();
    if (!name) { toast("Name cannot be empty","error"); return; }
    cfg.set(cfg.data.map(d=>d.id===editId?{...d,name}:d));
    setEditId(null); setEditVal(""); toast("Entry updated","success");
  };

  const cancelEdit = () => { setEditId(null); setEditVal(""); };

  const askDelete = (id) => { setDelConfirm(id); setEditId(null); };

  const confirmDelete = (id) => {
    cfg.set(cfg.data.filter(d=>d.id!==id));
    setDelConfirm(null); toast("Entry deleted","success");
  };

  const toggleActive = (id) => {
    cfg.set(cfg.data.map(d=>d.id===id?{...d,active:!d.active}:d));
  };

  return (
    <div>
      <PageHeader title="Master Data Management" sub="Configure all system dropdowns, categories, and reference data"/>
      <Tabs tabs={Object.keys(configs)} active={tab} onChange={switchTab}/>

      <Card>
        <CardHeader
          title={tab}
          subtitle={`${cfg.data.filter(d=>d.active).length} active  ${cfg.data.length} total`}
          actions={
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Input value={newItem} onChange={setNewItem}
                placeholder={`Add new ${tab.replace(/s$/,"").toLowerCase()}`}
                style={{width:220}}
                onKeyDown={e=>e.key==="Enter"&&addItem()}
              />
              <Btn variant="primary" size="sm" onClick={addItem}>+ Add</Btn>
            </div>
          }
        />
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["#","Name","Status","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 14px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {cfg.data.length===0 && (
                <tr><td colSpan={4}><EmptyState icon="" title="No entries yet" sub="Add your first entry above"/></td></tr>
              )}
              {cfg.data.map((item,i)=>(
                <tr key={item.id} style={{borderBottom:"1px solid var(--line)",background:delConfirm===item.id?"var(--red-bg)":"transparent"}}
                  onMouseEnter={e=>{if(delConfirm!==item.id)e.currentTarget.style.background="var(--bg)"}}
                  onMouseLeave={e=>{if(delConfirm!==item.id)e.currentTarget.style.background="transparent"}}
                >
                  {/* # */}
                  <td style={{padding:"10px 14px",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",width:40}}>{String(i+1).padStart(2,"0")}</td>

                  {/* Name  inline edit */}
                  <td style={{padding:"8px 14px",fontSize:13,fontWeight:500,opacity:item.active?1:.5}}>
                    {editId===item.id ? (
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <Input value={editVal} onChange={setEditVal} style={{maxWidth:280}}
                          onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")cancelEdit();}}
                        onFocus={e=>e.target.select()}
                        />
                        <Btn size="sm" variant="primary" onClick={saveEdit}>Save</Btn>
                        <Btn size="sm" ghost onClick={cancelEdit}></Btn>
                      </div>
                    ) : (
                      <span>{item.name}</span>
                    )}
                  </td>

                  {/* Status */}
                  <td style={{padding:"10px 14px",width:100}}>
                    {delConfirm===item.id ? (
                      <span style={{fontSize:11,color:"var(--red)",fontWeight:600}}> Delete?</span>
                    ) : (
                      <span
                        onClick={()=>toggleActive(item.id)}
                        title="Click to toggle active/inactive"
                        style={{fontSize:11,fontWeight:500,color:item.active?"var(--green)":"var(--text3)",cursor:"pointer",userSelect:"none"}}
                      >{item.active?" Active":" Inactive"}</span>
                    )}
                  </td>

                  {/* Actions */}
                  <td style={{padding:"8px 14px",width:200}}>
                    {delConfirm===item.id ? (
                      <div style={{display:"flex",gap:6}}>
                        <Btn size="sm" variant="danger" onClick={()=>confirmDelete(item.id)}>Yes, Delete</Btn>
                        <Btn size="sm" ghost onClick={()=>setDelConfirm(null)}>Cancel</Btn>
                      </div>
                    ) : editId===item.id ? null : (
                      <div style={{display:"flex",gap:6}}>
                        <Btn size="sm" onClick={()=>startEdit(item)}> Edit</Btn>
                        <Btn size="sm" ghost onClick={()=>toggleActive(item.id)}>{item.active?"Deactivate":"Activate"}</Btn>
                        <Btn size="sm" variant="danger" onClick={()=>askDelete(item.id)}> Delete</Btn>
                      </div>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{padding:"10px 14px",borderTop:"1px solid var(--line)",fontSize:11,color:"var(--text3)",display:"flex",gap:16}}>
          <span> Click <strong>Edit</strong> to rename  Click status to toggle active  <strong>Delete</strong> removes permanently</span>
        </div>
      </Card>
    </div>
  );
}

// AUDIT TRAIL PAGE
// ============================================================
function AuditTrailPage({ user }) {
  const [logs, setLogs] = useState(DB.get("auditLogs",[]).sort((a,b)=>b.ts-a.ts));
  const [search, setSearch] = useState("");
  const [page, setPageNum] = useState(1);
  const PER = 12;

  const filtered = logs.filter(l => {
    if (!search) return true;
    const q = search.toLowerCase();
    return l.user.toLowerCase().includes(q) || l.action.toLowerCase().includes(q) || l.entity.toLowerCase().includes(q) || l.detail.toLowerCase().includes(q);
  });

  const exportAudit = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["Timestamp","User","Role","Action","Entity","Detail","IP"],
      ...filtered.map(l=>[new Date(l.ts).toLocaleString("en-IN"),l.user,l.role,l.action,l.entity,l.detail,l.ip])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Audit Trail");
    XLSX.writeFile(wb, `PVMS_AuditTrail_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const ACTION_COLORS = { LOGIN:"var(--blue)", CASE_CREATED:"var(--green)", STATUS_CHANGED:"var(--amber)", CASE_APPROVED:"var(--green)", CONFIG_CHANGED:"var(--purple)", USER_CREATED:"var(--cyan)", USER_MODIFIED:"var(--cyan)", LETTER_GENERATED:"var(--purple)", CAPA_UPDATED:"var(--amber)", CASE_REVIEWED:"var(--blue)" };

  return (
    <div>
      <PageHeader title="Audit Trail" sub="Complete immutable action history  No hard deletes  ISO-compliant"
        actions={<Btn size="sm" onClick={exportAudit}> Export Log</Btn>}
      />

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <SearchBar value={search} onChange={v=>{setSearch(v);setPageNum(1)}} placeholder="Search user, action, entity"/>
        <span style={{fontSize:12,color:"var(--text3)",alignSelf:"center"}}>{filtered.length} log entries</span>
      </div>

      <Card>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:800}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["Timestamp","User","Role","Action","Entity","Detail","IP"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.slice((page-1)*PER, page*PER).map(l=>(
                <tr key={l.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{new Date(l.ts).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"})}</td>
                  <td style={{padding:"9px 12px",fontSize:12.5,fontWeight:500}}>{l.user}</td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:10,background:"var(--bg2)",color:"var(--text3)",padding:"2px 7px",borderRadius:4,border:"1px solid var(--line)",whiteSpace:"nowrap"}}>{l.role}</span></td>
                  <td style={{padding:"9px 12px"}}><span style={{fontSize:11,fontFamily:"var(--mono)",fontWeight:600,color:ACTION_COLORS[l.action]||"var(--text3)"}}>{l.action}</span></td>
                  <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{l.entity}</td>
                  <td style={{padding:"9px 12px",fontSize:12,color:"var(--text2)"}}>{l.detail}</td>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:10.5,color:"var(--text3)"}}>{l.ip}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <Pagination total={filtered.length} page={page} perPage={PER} onChange={setPageNum}/>
      </Card>
    </div>
  );
}

function EmailIntegrationPage({ user, toast }) {
  const defaultTemplates = [
    {
      id:"due",
      name:"Due Date Reminder",
      subject:"PVMS Reminder: {{violationId}} is due on {{dueDate}}",
      body:"Dear {{userName}},\n\nThis is an automated reminder for the pending violation assigned to you.\n\nViolation ID: {{violationId}}\nPriority: {{priority}}\nDue Date: {{dueDate}}\nStatus: {{status}}\n\nPlease take the required action before the deadline.\n\nRegards,\nPVMS Automation System\nONEPWS Pvt. Ltd."
    },
    {
      id:"escalation",
      name:"Escalation Reminder",
      subject:"PVMS Escalation: {{violationId}} is overdue",
      body:"Dear Manager,\n\nThe following violation has crossed its due date and remains unresolved.\n\nViolation ID: {{violationId}}\nAssigned User: {{assignedUser}}\nDue Date: {{dueDate}}\nPending Since: {{pendingDays}} days\n\nPlease review and take necessary action.\n\nRegards,\nPVMS Automation Engine"
    },
    {
      id:"summary",
      name:"Daily Summary",
      subject:"PVMS Daily Summary - {{summaryDate}}",
      body:"Dear {{userName}},\n\nDaily PVMS summary:\n\nOpen Violations: {{openCount}}\nPending Approvals: {{pendingCount}}\nOverdue Actions: {{overdueCount}}\nClosed Today: {{closedCount}}\n\nRegards,\nPVMS Automation System"
    }
  ];
  const [templates, setTemplates] = useState(()=>DB.get("emailTemplates") || defaultTemplates);
  const [selected, setSelected] = useState(templates[0]?.id || "due");
  const [testEmail, setTestEmail] = useState("");
  const [sending, setSending] = useState(false);

  if (user.role !== "Master Admin") return <EmptyState icon="" title="Access Restricted" sub="Master Admin only"/>;

  const current = templates.find(t => t.id === selected) || templates[0];
  const updateTemplate = (key, value) => {
    const next = templates.map(t => t.id === current.id ? { ...t, [key]: value } : t);
    setTemplates(next);
    DB.set("emailTemplates", next);
  };
  const resetTemplates = () => {
    setTemplates(defaultTemplates);
    setSelected("due");
    DB.set("emailTemplates", defaultTemplates);
    toast("Email templates reset", "success");
  };
  const sendTest = async () => {
    if (!testEmail) { toast("Enter a test email address", "error"); return; }
    setSending(true);
    try {
      const res = await fetch("/api/email/test", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ to:testEmail, template:current })
      });
      if (!res.ok) throw new Error("send failed");
      toast("Test email sent", "success");
    } catch (err) {
      toast("Test email failed. Check Vercel email environment variables.", "error");
    } finally {
      setSending(false);
    }
  };

  return (
    <div>
      <PageHeader title="Email Integration" sub="Reminder templates, SMTP test, and automation readiness"
        actions={<Btn size="sm" onClick={resetTemplates}>Reset Templates</Btn>}
      />
      <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16}}>
        <Card>
          <CardHeader title="Templates"/>
          <div style={{padding:10,display:"flex",flexDirection:"column",gap:6}}>
            {templates.map(t => (
              <button key={t.id} onClick={()=>setSelected(t.id)}
                style={{textAlign:"left",padding:"9px 10px",border:"1px solid var(--line)",borderRadius:"var(--r)",background:selected===t.id?"var(--blue-l)":"var(--bg3)",color:selected===t.id?"var(--blue)":"var(--text2)",fontWeight:selected===t.id?600:500}}
              >{t.name}</button>
            ))}
          </div>
        </Card>
        <div>
          <Card style={{marginBottom:16}}>
            <CardHeader title={current.name} subtitle="Use variables such as {{userName}}, {{violationId}}, {{dueDate}}, {{priority}}, {{status}}"/>
            <div style={{padding:16,display:"grid",gap:12}}>
              <FormGroup label="Subject">
                <Input value={current.subject} onChange={v=>updateTemplate("subject",v)}/>
              </FormGroup>
              <FormGroup label="Email Body">
                <Textarea value={current.body} onChange={v=>updateTemplate("body",v)} rows={12}/>
              </FormGroup>
            </div>
          </Card>
          <Card>
            <CardHeader title="Send Test Email" subtitle="Server-side SMTP uses EMAIL_USER and EMAIL_PASS in Vercel"/>
            <div style={{padding:16,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <Input type="email" value={testEmail} onChange={setTestEmail} placeholder="recipient@company.com" style={{maxWidth:320}}/>
              <Btn variant="primary" onClick={sendTest} loading={sending}>Send Test</Btn>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

function UsersPage({ user, toast }) {
  const [users, setUsers]     = useState(()=>DB.get("users",[]));
  const [showForm, setShowForm] = useState(false);
  const [editUser, setEditUser] = useState(null);   // user object being edited
  const [delUser,  setDelUser]  = useState(null);   // user id pending delete
  const [form, setForm]         = useState({ name:"", email:"", empCode:"", dept:"", role:"User/Employee", designation:"", active:true });
  const [search, setSearch]     = useState("");
  const [saving, setSaving]     = useState(false);

  // Permission matrix  stored in DB so Master Admin can edit
  const DEFAULT_MATRIX = [
    { module:"Dashboard Analytics",        perms:["Full","Full","Dept only","Read only","Read only"] },
    { module:"Register Violation",         perms:["","","","",""] },
    { module:"Approve / Reject Cases",     perms:["","","","",""] },
    { module:"Investigation & CAPA",       perms:["","","","Assigned",""] },
    { module:"Warning Letters",            perms:["","View","","","Own only"] },
    { module:"Reports & MIS Export",       perms:["","","Dept only","",""] },
    { module:"Bulk Data Export",           perms:["","","","",""] },
    { module:"User Management",            perms:["","","","",""] },
    { module:"Master Data Config",         perms:["","","","",""] },
    { module:"Audit Trail",                perms:["","Read","Read","",""] },
    { module:"Employee Compliance",        perms:["","","Dept only","",""] },
  ];
  const [matrix, setMatrix] = useState(()=>DB.get("permMatrix") || DEFAULT_MATRIX);
  const [editMatrix, setEditMatrix] = useState(false);
  const [matrixDraft, setMatrixDraft] = useState(null);
  const [newModule, setNewModule] = useState("");

  if (user.role !== "Master Admin") return <EmptyState icon="" title="Access Restricted" sub="Master Admin only"/>;

  const filtered = users.filter(u => !search || [u.name,u.email,u.role,u.dept].some(x=>(x||"").toLowerCase().includes(search.toLowerCase())));
  const roleCounts = ROLES.reduce((a,r)=>{a[r]=users.filter(u=>u.role===r).length;return a},{});

  const openAdd = () => {
    setEditUser(null);
    setForm({ name:"", email:"", empCode:"", dept:"", role:"User/Employee", designation:"", active:true });
    setShowForm(true);
    setDelUser(null);
  };

  const openEdit = (u) => {
    setEditUser(u);
    setForm({ name:u.name, email:u.email, empCode:u.empCode||"", dept:u.dept||"", role:u.role, designation:u.designation||"", active:u.active!==false });
    setShowForm(true);
    setDelUser(null);
  };

  const saveUser = () => {
    if (!form.name || !form.email) { toast("Name and email required","error"); return; }
    setSaving(true);
    setTimeout(()=>{
      const arr = DB.get("users",[]);
      if (editUser) {
        const idx = arr.findIndex(x=>x.id===editUser.id);
        if (idx>=0) arr[idx] = {...arr[idx],...form};
        toast(`User ${form.name} updated`,"success");
      } else {
        if (arr.some(x=>x.email.toLowerCase()===form.email.toLowerCase())) { toast("Email already exists","error"); setSaving(false); return; }
        arr.push({id:"u"+Date.now(),...form,complianceScore:100,violations:0});
        toast(`User ${form.name} created`,"success");
      }
      DB.set("users",arr); setUsers([...arr]);
      setShowForm(false); setEditUser(null);
      setForm({name:"",email:"",empCode:"",dept:"",role:"User/Employee",designation:"",active:true});
      setSaving(false);
    },400);
  };

  const confirmDelete = (uid) => {
    if (uid==="u1") { toast("Cannot delete system administrator","error"); return; }
    const arr = DB.get("users",[]).filter(u=>u.id!==uid);
    DB.set("users",arr); setUsers([...arr]); setDelUser(null);
    toast("User deleted","success");
  };

  const toggleActive = (uid) => {
    const arr = DB.get("users",[]).map(u=>u.id===uid?{...u,active:!u.active}:u);
    DB.set("users",arr); setUsers([...arr]);
    toast("User status updated","success");
  };

  //  Matrix editing 
  const startMatrixEdit = () => { setMatrixDraft(JSON.parse(JSON.stringify(matrix))); setEditMatrix(true); };
  const saveMatrix = () => { setMatrix(matrixDraft); DB.set("permMatrix",matrixDraft); setEditMatrix(false); toast("Permission matrix saved","success"); };
  const cancelMatrixEdit = () => { setEditMatrix(false); setMatrixDraft(null); };
  const resetMatrix = () => { setMatrixDraft(JSON.parse(JSON.stringify(DEFAULT_MATRIX))); toast("Reset to defaults  click Save to apply","info"); };

  const updatePerm = (rowIdx, colIdx, val) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d[rowIdx].perms[colIdx] = val;
    setMatrixDraft(d);
  };
  const updateModule = (rowIdx, val) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d[rowIdx].module = val;
    setMatrixDraft(d);
  };
  const deleteRow = (rowIdx) => {
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d.splice(rowIdx,1);
    setMatrixDraft(d);
  };
  const addRow = () => {
    if (!newModule.trim()) { toast("Enter a module name","error"); return; }
    const d = JSON.parse(JSON.stringify(matrixDraft));
    d.push({module:newModule.trim(), perms:["","","","",""]});
    setMatrixDraft(d); setNewModule(""); toast("Row added","success");
  };

  const downloadEmployeeTemplate = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["SPOCName","EmailID","DepartmentName","ReportingToName","ReportingToEmail","HODBUHEmail","ManagementEmail","Status"]];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Employee Import");
    XLSX.writeFile(wb, "PVMS_Employee_Import_Template.xlsx");
  };

  const importEmployees = async (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type:"array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval:"" });
      const current = DB.get("users", []);
      let added = 0, updated = 0;
      rows.forEach((row, index) => {
        const email = String(row.EmailID || "").trim().toLowerCase();
        const name = String(row.SPOCName || "").trim();
        if (!email || !name) return;
        const existingIndex = current.findIndex(u => (u.email || "").toLowerCase() === email);
        const record = {
          name,
          email,
          dept: String(row.DepartmentName || "").trim(),
          designation: "Employee",
          role: "User/Employee",
          active: String(row.Status || "Active").toLowerCase() !== "inactive",
          reportingToName: String(row.ReportingToName || "").trim(),
          reportingToEmail: String(row.ReportingToEmail || "").trim(),
          hodBuhEmail: String(row.HODBUHEmail || "").trim(),
          managementEmail: String(row.ManagementEmail || "").trim(),
          empCode: existingIndex >= 0 ? current[existingIndex].empCode : `EMP-${String(Date.now() + index).slice(-6)}`,
          complianceScore: existingIndex >= 0 ? current[existingIndex].complianceScore : 100,
          violations: existingIndex >= 0 ? current[existingIndex].violations : 0,
        };
        if (existingIndex >= 0) {
          current[existingIndex] = { ...current[existingIndex], ...record };
          updated++;
        } else {
          current.push({ id:"u" + Date.now() + index, ...record });
          added++;
        }
      });
      DB.set("users", current);
      setUsers([...current]);
      toast(`Employee import complete: ${added} added, ${updated} updated`, "success");
    } catch (err) {
      toast("Unable to import employee file", "error");
    } finally {
      event.target.value = "";
    }
  };

  const ROLE_COLORS = {"Master Admin":["var(--red-bg)","var(--red)"],"Management":["var(--purple-bg)","var(--purple)"],"HOD":["var(--blue-l)","var(--blue)"],"Process Dept Rep":["var(--amber-bg)","var(--amber)"],"User/Employee":["var(--green-bg)","var(--green)"]};
  const PERM_OPTIONS = ["","","Full","Read","Read only","Dept only","Assigned","View","Own only","Partial"];

  return (
    <div>
      <PageHeader title="User Management" sub="Role-based access control  Manage accounts  Configure permissions"
        actions={<Btn variant="primary" size="sm" onClick={openAdd}>+ Add User</Btn>}
      />

      {/* KPI row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
        {ROLES.map((r,i)=>{
          const cols=["var(--red)","var(--purple)","var(--blue)","var(--amber)","var(--green)"];
          return <KpiCard key={r} label={r} value={roleCounts[r]||0} color={cols[i]}/>;
        })}
      </div>

      {/* Add / Edit Form */}
      {showForm && (
        <Card style={{marginBottom:16}}>
          <CardHeader title={editUser?"Edit User":"Add New User"} actions={<Btn size="sm" ghost onClick={()=>{setShowForm(false);setEditUser(null);}}> Cancel</Btn>}/>
          <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <FormGroup label="Full Name" required><Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Full name"/></FormGroup>
            <FormGroup label="Email" required><Input type="email" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="email@company.com"/></FormGroup>
            <FormGroup label="Employee Code"><Input value={form.empCode} onChange={v=>setForm(f=>({...f,empCode:v}))} placeholder="EMP-0000"/></FormGroup>
            <FormGroup label="Department"><Select value={form.dept} onChange={v=>setForm(f=>({...f,dept:v}))} options={activeMasterOptions("masterDepts", DEPARTMENTS)} placeholder="Select dept"/></FormGroup>
            <FormGroup label="Designation"><Select value={form.designation} onChange={v=>setForm(f=>({...f,designation:v}))} options={DESIGNATIONS} placeholder="Select designation"/></FormGroup>
            <FormGroup label="Role"><Select value={form.role} onChange={v=>setForm(f=>({...f,role:v}))} options={ROLES}/></FormGroup>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={form.active} onChange={e=>setForm(f=>({...f,active:e.target.checked}))} style={{width:14,height:14}}/>
                Active account
              </label>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <Btn onClick={()=>{setShowForm(false);setEditUser(null);}}>Cancel</Btn>
              <Btn variant="primary" onClick={saveUser} loading={saving}>{editUser?"Save Changes":"Create User"}</Btn>
            </div>
          </div>
        </Card>
      )}

      <Card style={{marginBottom:16}}>
        <CardHeader
          title="Bulk Import Employee Database"
          subtitle="Accepted columns: SPOCName, EmailID, DepartmentName, ReportingToName, ReportingToEmail, HODBUHEmail, ManagementEmail, Status"
          actions={<Btn size="sm" onClick={downloadEmployeeTemplate}>Download Template</Btn>}
        />
        <div style={{padding:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <input type="file" accept=".xlsx,.xls,.csv" onChange={importEmployees}
            style={{border:"1px solid var(--line)",borderRadius:"var(--r)",padding:"7px 10px",background:"var(--bg3)",fontSize:12,color:"var(--text2)"}}
          />
          <span style={{fontSize:12,color:"var(--text3)"}}>Existing employees are updated by EmailID. New employees are created as User/Employee accounts.</span>
        </div>
      </Card>

      {/* User Table */}
      <Card style={{marginBottom:16}}>
        <CardHeader title="All Users" actions={<SearchBar value={search} onChange={setSearch} placeholder="Search users"/>}/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["User","Emp Code","Department","Role","Designation","Status","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(u=>{
                const rc = ROLE_COLORS[u.role]||["var(--bg2)","var(--text3)"];
                const isDel = delUser===u.id;
                return (
                  <tr key={u.id} style={{borderBottom:"1px solid var(--line)",background:isDel?"var(--red-bg)":"transparent"}}
                    onMouseEnter={e=>{if(!isDel)e.currentTarget.style.background="var(--bg)"}}
                    onMouseLeave={e=>{if(!isDel)e.currentTarget.style.background="transparent"}}
                  >
                    <td style={{padding:"9px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={u.name}/>
                        <div><div style={{fontSize:13,fontWeight:500}}>{u.name}</div><div style={{fontSize:10,color:"var(--text3)"}}>{u.email}</div></div>
                      </div>
                    </td>
                    <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{u.empCode||""}</td>
                    <td style={{padding:"9px 12px",fontSize:12}}>{u.dept||""}</td>
                    <td style={{padding:"9px 12px"}}><span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10,background:rc[0],color:rc[1]}}>{u.role}</span></td>
                    <td style={{padding:"9px 12px",fontSize:12}}>{u.designation||""}</td>
                    <td style={{padding:"9px 12px"}}><span style={{fontSize:11,color:u.active!==false?"var(--green)":"var(--text3)"}}>{u.active!==false?" Active":" Inactive"}</span></td>
                    <td style={{padding:"9px 12px"}}>
                      {isDel ? (
                        <div style={{display:"flex",gap:5,alignItems:"center"}}>
                          <span style={{fontSize:11,color:"var(--red)",fontWeight:600}}>Delete?</span>
                          <Btn size="sm" variant="danger" onClick={()=>confirmDelete(u.id)}>Yes</Btn>
                          <Btn size="sm" ghost onClick={()=>setDelUser(null)}>No</Btn>
                        </div>
                      ) : (
                        <div style={{display:"flex",gap:4,flexWrap:"nowrap"}}>
                          <Btn size="sm" onClick={()=>openEdit(u)}> Edit</Btn>
                          <Btn size="sm" ghost onClick={()=>toggleActive(u.id)}>{u.active!==false?"Disable":"Enable"}</Btn>
                          {u.id!=="u1" && <Btn size="sm" ghost onClick={()=>toast(`Reset link sent to ${u.email}`,"success")}> Pwd</Btn>}
                          {u.id!=="u1" && <Btn size="sm" variant="danger" onClick={()=>{setDelUser(u.id);setShowForm(false);}}></Btn>}
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
              {filtered.length===0 && <tr><td colSpan={7}><EmptyState icon="" title="No users found" sub="Adjust your search"/></td></tr>}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Permission Matrix */}
      <Card>
        <CardHeader
          title="Role Permission Matrix"
          subtitle="Define what each role can access across the portal"
          actions={
            <div style={{display:"flex",gap:7}}>
              {editMatrix ? (
                <>
                  <Btn size="sm" ghost onClick={resetMatrix}> Reset Defaults</Btn>
                  <Btn size="sm" onClick={cancelMatrixEdit}>Cancel</Btn>
                  <Btn size="sm" variant="primary" onClick={saveMatrix}> Save Matrix</Btn>
                </>
              ) : (
                <Btn size="sm" variant="primary" onClick={startMatrixEdit}> Edit Permissions</Btn>
              )}
            </div>
          }
        />

        {editMatrix && (
          <div style={{padding:"10px 14px",background:"var(--blue-l)",borderBottom:"1px solid var(--line)",fontSize:12,color:"var(--blue)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span> Editing mode: Click any cell to change permission  Add or delete rows  Press Save when done</span>
          </div>
        )}

        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                <th style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textAlign:"left",borderBottom:"1px solid var(--line)",minWidth:180}}>Module / Feature</th>
                {ROLES.map(r=>(
                  <th key={r} style={{padding:"8px 10px",fontSize:10,fontWeight:600,color:"var(--text3)",textAlign:"center",borderBottom:"1px solid var(--line)",textTransform:"uppercase",letterSpacing:".04em",whiteSpace:"nowrap"}}>{r}</th>
                ))}
                {editMatrix && <th style={{padding:"8px 10px",fontSize:10,color:"var(--text3)",textAlign:"center",borderBottom:"1px solid var(--line)"}}>DEL</th>}
              </tr>
            </thead>
            <tbody>
              {(editMatrix ? matrixDraft : matrix).map((row, rowIdx)=>(
                <tr key={rowIdx} style={{borderBottom:"1px solid var(--line)"}}
                  onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"}
                  onMouseLeave={e=>e.currentTarget.style.background=""}
                >
                  {/* Module name */}
                  <td style={{padding:"7px 12px"}}>
                    {editMatrix ? (
                      <Input value={row.module} onChange={v=>updateModule(rowIdx,v)} style={{fontSize:12,padding:"4px 7px"}}/>
                    ) : (
                      <span style={{fontSize:12.5,fontWeight:500}}>{row.module}</span>
                    )}
                  </td>
                  {/* Permission cells */}
                  {row.perms.map((p,colIdx)=>(
                    <td key={colIdx} style={{padding:"7px 10px",textAlign:"center"}}>
                      {editMatrix ? (
                        <select value={p} onChange={e=>updatePerm(rowIdx,colIdx,e.target.value)}
                          style={{fontSize:11,padding:"3px 5px",border:"1px solid var(--line)",borderRadius:"var(--r)",background:"var(--bg3)",color:"var(--text)",textAlign:"center",width:"100%",maxWidth:100,cursor:"pointer"}}
                        >
                          {PERM_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      ) : (
                        <span style={{fontSize:12,color:p===""?"var(--green)":p===""?"var(--line2)":"var(--text3)",fontWeight:p===""?700:400}}>{p}</span>
                      )}
                    </td>
                  ))}
                  {/* Delete row button */}
                  {editMatrix && (
                    <td style={{padding:"7px 10px",textAlign:"center"}}>
                      <button onClick={()=>deleteRow(rowIdx)}
                        style={{background:"var(--red-bg)",border:"1px solid var(--red-bd)",borderRadius:"var(--r)",color:"var(--red)",cursor:"pointer",padding:"2px 7px",fontSize:12,fontWeight:600}}
                        title="Delete this row"
                      ></button>
                    </td>
                  )}
                </tr>
              ))}
              {/* Add new row */}
              {editMatrix && (
                <tr style={{borderTop:"2px solid var(--line)",background:"var(--bg)"}}>
                  <td style={{padding:"8px 12px"}}>
                    <div style={{display:"flex",gap:7}}>
                      <Input value={newModule} onChange={setNewModule} placeholder="New module name" style={{fontSize:12,padding:"4px 7px"}}
                        onKeyDown={e=>e.key==="Enter"&&addRow()}
                      />
                      <Btn size="sm" variant="primary" onClick={addRow}>+ Row</Btn>
                    </div>
                  </td>
                  <td colSpan={ROLES.length+1} style={{padding:"8px 12px",fontSize:11,color:"var(--text3)"}}>
                    New row defaults to "" for all roles. Edit after adding.
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
        {!editMatrix && (
          <div style={{padding:"8px 14px",borderTop:"1px solid var(--line)",fontSize:11,color:"var(--text3)"}}>
             Click <strong>Edit Permissions</strong> to modify access levels for any role and module.
          </div>
        )}
      </Card>
    </div>
  );
}

// PDF GENERATORS
// ============================================================
function generateWarningPDF(violation, issuedBy, toast, letterType="Warning Letter Level-1") {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { toast("PDF library not loaded","error"); return; }
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, ml=22, mr=188, lw=mr-ml;

  // Header
  doc.setFillColor(13,27,42);
  doc.rect(0,0,W,30,"F");
  // Add logo image (white version)
  try { doc.addImage(LOGO_B64,"JPEG",ml,4,60,16); } catch(e) {
    // fallback to text if image fails
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text(COMPANY_NAME.toUpperCase(),W/2,12,{align:"center"});
  }
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7.5);
  doc.text(ISO_CERTS, W/2, 22, {align:"center"});
  doc.setFontSize(7);
  doc.text("Confidential | HR Document | Not for External Distribution", W/2, 27, {align:"center"});

  // Ref line
  const refNo = "HR/WL/"+new Date().getFullYear()+"/"+violation.id.split("-").pop();
  doc.setTextColor(50,50,50);
  doc.setFontSize(8.5);
  doc.setFont("helvetica","normal");
  doc.text(`Ref No: ${refNo}`, ml, 35);
  doc.text(`Date: ${new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"})}`, mr, 35, {align:"right"});

  // Title
  doc.setFont("helvetica","bold");
  doc.setFontSize(13);
  doc.setTextColor(13,27,42);
  const title = letterType.toUpperCase();
  doc.text(title, W/2, 45, {align:"center"});
  doc.setLineWidth(.5);
  doc.setDrawColor(13,27,42);
  const tw = doc.getTextWidth(title);
  doc.line(W/2-tw/2, 47, W/2+tw/2, 47);

  // Employee details box
  doc.setFillColor(244,247,251);
  doc.roundedRect(ml, 52, lw, 38, 2,2,"F");
  doc.setDrawColor(200,212,230);
  doc.setLineWidth(.3);
  doc.roundedRect(ml, 52, lw, 38, 2,2,"S");

  doc.setFont("helvetica","bold");
  doc.setFontSize(8.5);
  doc.setTextColor(13,27,42);
  const fields = [
    ["To", violation.empName || ""],
    ["Employee Code", violation.empCode || ""],
    ["Designation", violation.designation || ""],
    ["Department", violation.dept || ""],
    ["Date of Violation", violation.date || ""],
    ["Case Reference No.", violation.id],
  ];
  const colW = lw/2;
  fields.forEach((f,i)=>{
    const col = i%2; const row = Math.floor(i/2);
    const x = ml+6+col*colW;
    const y = 59+row*12;
    doc.setFont("helvetica","bold");
    doc.setTextColor(80,80,80);
    doc.text(f[0]+":", x, y);
    doc.setFont("helvetica","normal");
    doc.setTextColor(13,27,42);
    doc.text(f[1], x+30, y);
  });

  let y = 97;

  // Body
  const para = (text, indent=0) => {
    doc.setFont("helvetica","normal");
    doc.setFontSize(9.5);
    doc.setTextColor(40,40,40);
    const lines = doc.splitTextToSize(text, lw-indent);
    doc.text(lines, ml+indent, y);
    y += lines.length * 5 + 4;
  };
  const heading = (text) => {
    doc.setFont("helvetica","bold");
    doc.setFontSize(9.5);
    doc.setTextColor(13,27,42);
    doc.text(text, ml, y);
    y += 6;
  };

  heading("Subject: Notice of Process Compliance Violation");
  y += 2;
  para(`Dear ${violation.empName || "Employee"},`);
  para(`This ${letterType} is being formally issued to you following a thorough investigation of a process compliance violation reported on ${violation.date}. The investigation conducted by the designated investigator and approved by the HOD has confirmed that you were found in non-compliance with the established process standards and SOPs applicable to your role.`);

  heading("Nature of Violation:");
  para(`Category: ${violation.category}`, 4);
  para(`SOP / Policy Violated: ${violation.sopViolated||"Company Process Standards"}`, 4);
  para(`Severity Classification: ${violation.severity}`, 4);
  para(`Description: ${violation.description}`, 4);

  heading("Impact & Risk:");
  para(`This violation has been assessed with a risk score of ${violation.riskScore||""}/10 and is categorized as ${violation.severity} severity under the Process Violation Management System (PVMS) governed under ISO 9001:2015, ISO 45001:2018, and applicable quality and safety management standards.`);

  if (violation.repeatViolation) {
    doc.setFillColor(254,232,232);
    doc.roundedRect(ml, y, lw, 12, 1,1,"F");
    doc.setFont("helvetica","bold");
    doc.setFontSize(9);
    doc.setTextColor(185,28,28);
    doc.text("  REPEAT VIOLATION: This is a repeat occurrence. Stricter disciplinary action will apply.", ml+4, y+7.5);
    y += 16;
  }

  heading("Expected Corrective Behaviour:");
  para(`You are hereby formally directed to immediately comply with all applicable SOPs, work instructions, and company policies relevant to your role and department. Any recurrence of similar behaviour may attract more stringent disciplinary action as per the Company's Disciplinary Policy Matrix, including but not limited to suspension, increment hold, or termination of employment.`);

  para(`You are required to submit your written acknowledgement and response to this letter within three (3) working days to your HOD and the HR Department.`);

  // Signatures
  y = Math.max(y, 230);
  doc.setLineWidth(.3);
  doc.setDrawColor(180,180,180);
  const sigW = lw/3;
  ["HOD / Department Head","HR Manager / HR BP","Management (Noted)"].forEach((s,i)=>{
    const x = ml + i*sigW;
    doc.line(x+4, y+14, x+sigW-4, y+14);
    doc.setFont("helvetica","normal");
    doc.setFontSize(7.5);
    doc.setTextColor(100,100,100);
    const name = i===0?(violation.assignedHOD||"HOD"):i===1?((issuedBy||{}).name||"HR Manager"):"GM Operations";
    doc.text(name, x+sigW/2, y+18, {align:"center"});
    doc.text(s, x+sigW/2, y+22, {align:"center"});
  });

  // Footer
  doc.setFillColor(13,27,42);
  doc.rect(0,287,W,10,"F");
  doc.setFont("helvetica","normal");
  doc.setFontSize(7);
  doc.setTextColor(255,255,255);
  doc.text(`${COMPANY_NAME} | PVMS v${APP_VERSION} | Generated: ${new Date().toLocaleString("en-IN")} | ${refNo}`, W/2, 293, {align:"center"});

  const filename = `WarningLetter_${violation.empName?.replace(/\s+/g,"_")}_${violation.id}.pdf`;
  doc.save(filename);
  if(toast) toast("Warning letter PDF downloaded","success");
}

function exportDashboardPDF(violations, users) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) return;
  const doc = new jsPDF();
  const W=210, ml=15;

  doc.setFillColor(13,27,42);
  doc.rect(0,0,W,26,"F");
  try { doc.addImage(LOGO_B64,"JPEG",ml,4,55,14); } catch(e) {
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text(COMPANY_NAME, ml, 11);
  }
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","normal");
  doc.setFontSize(7.5);
  doc.text("Process Violation Management System  Dashboard Report", W/2, 18, {align:"center"});
  doc.setFontSize(7);
  doc.text(`${ISO_CERTS} | ${new Date().toLocaleDateString("en-IN",{dateStyle:"long"})}`, W/2, 24, {align:"center"});

  let y = 30;
  const kpis = [
    ["Total Violations", violations.length],
    ["Open Cases", violations.filter(v=>!["Closed","Rejected"].includes(v.status)).length],
    ["Closed Cases", violations.filter(v=>v.status==="Closed").length],
    ["Critical (Active)", violations.filter(v=>v.severity==="Critical"&&v.status!=="Closed").length],
    ["CAPA Pending", violations.filter(v=>v.status==="CAPA Pending").length],
    ["Repeat Violations", violations.filter(v=>v.repeatViolation).length],
  ];
  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(13,27,42);
  doc.text("Key Performance Indicators", ml, y); y+=8;
  kpis.forEach(([k,v])=>{
    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    doc.setTextColor(50,50,50);
    doc.text(`${k}: ${v}`, ml+4, y); y+=6;
  });
  y+=4;
  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(13,27,42);
  doc.text("Violation Register", ml, y); y+=8;
  const headers = ["Case ID","Date","Employee","Severity","Status"];
  const colW = [38,22,42,22,34];
  headers.forEach((h,i)=>{
    doc.setFont("helvetica","bold");
    doc.setFontSize(8);
    doc.setTextColor(80,80,80);
    doc.text(h, ml+colW.slice(0,i).reduce((a,b)=>a+b,0), y);
  });
  y+=5;
  doc.setLineWidth(.2);
  doc.setDrawColor(200,200,200);
  doc.line(ml,y,195,y); y+=3;
  violations.slice(-15).reverse().forEach(v=>{
    const row=[v.id,v.date,v.empName?.slice(0,18)||"",v.severity,v.status];
    row.forEach((cell,i)=>{
      doc.setFont("helvetica","normal");
      doc.setFontSize(8);
      doc.setTextColor(40,40,40);
      doc.text(String(cell), ml+colW.slice(0,i).reduce((a,b)=>a+b,0), y);
    });
    y+=6;
    if(y>275){doc.addPage();y=20;}
  });
  doc.save(`PVMS_Dashboard_${new Date().toISOString().slice(0,10)}.pdf`);
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [editId, setEditId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [notifications, setNotifications] = useState([]);

  useEffect(() => { seedIfEmpty(); setNotifications(DB.get("notifications",[]) || []); }, []);

  const toast = useCallback((text, type="info") => {
    const id = Date.now();
    setToasts(t=>[...t, {id, text, type}]);
    setTimeout(() => setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  }, []);

  const dismissToast = (id) => setToasts(t=>t.filter(x=>x.id!==id));

  const handleSetPage = useCallback((p) => {
    if (p !== "viewcase" && p !== "newcase") setEditId(null);
    setPage(p);
    window.scrollTo(0,0);
  }, []);

  const handleLogout = () => {
    if (window.confirm("Sign out of PVMS?")) setUser(null);
  };

  if (!user) return (
    <>
      <LoginPage onLogin={setUser}/>
      <ToastContainer toasts={toasts} dismiss={dismissToast}/>
    </>
  );

  const pageProps = { user, toast, setPage:handleSetPage, setEditId, editId };

  const pageMap = {
    dashboard: <DashboardPage {...pageProps}/>,
    cases:     <CasesPage {...pageProps}/>,
    newcase:   <CaseFormPage {...pageProps}/>,
    viewcase:  <ViewCasePage {...pageProps}/>,
    investigation: <InvestigationPage {...pageProps}/>,
    disciplinary:  <DisciplinaryPage {...pageProps}/>,
    warning:       <WarningLettersPage {...pageProps}/>,
    reports:       <ReportsPage {...pageProps}/>,
    employees:     <EmployeesPage {...pageProps}/>,
    masters:       <MasterDataPage {...pageProps}/>,
    email:         <EmailIntegrationPage {...pageProps}/>,
    audit:         <AuditTrailPage {...pageProps}/>,
    users:         <UsersPage {...pageProps}/>,
  };

  return (
    <>
      <div className="portal" style={{display:"flex",height:"100vh",overflow:"hidden"}}>
        <Sidebar active={page} setPage={handleSetPage} user={user} notifCount={notifications.filter(n=>!n.read).length}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          <Topbar page={page} user={user} notifications={notifications} setPage={handleSetPage} onLogout={handleLogout}/>
          <div style={{flex:1,overflowY:"auto",padding:"22px 24px",background:"var(--bg)"}}>
            {pageMap[page] || pageMap.dashboard}
          </div>
        </div>
      </div>
      <ToastContainer toasts={toasts} dismiss={dismissToast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
