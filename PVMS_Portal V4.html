function cacheLogoForPdf(src) {
  const img = new Image();
  img.onload = () => {
    try {
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      LOGO_B64 = canvas.toDataURL("image/png");
    } catch (err) {
      LOGO_B64 = src;
    }
  };
  img.onerror = () => { LOGO_B64 = src; };
  img.src = src;
}

function cacheWhiteLogoForPdf(src) {
  // Use fetch to avoid CORS/tainted canvas issues on production
  fetch(src)
    .then(res => res.blob())
    .then(blob => {
      const reader = new FileReader();
      reader.onloadend = () => {
        // Convert to PNG via canvas for jsPDF compatibility (webp not supported)
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            LOGO_WHITE_B64 = canvas.toDataURL("image/png");
          } catch(e) {
            LOGO_WHITE_B64 = reader.result;
          }
        };
        img.onerror = () => { LOGO_WHITE_B64 = reader.result; };
        img.src = reader.result;
      };
      reader.readAsDataURL(blob);
    })
    .catch(() => { LOGO_WHITE_B64 = null; });
}

function pdfImageFormat(dataUrl) {
  if (String(dataUrl).startsWith("data:image/png")) return "PNG";
  if (String(dataUrl).startsWith("data:image/webp")) return "WEBP";
  return "JPEG";
}

function formatBytes(n) {
  if (!n) return "0 B";
  const u = ["B","KB","MB","GB"];
  let i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(i ? 1 : 0)} ${u[i]}`;
}

function uniqueEmails(values) {
  return [...new Set((values || [])
    .flatMap(v => String(v || "").split(/[;,]/))
    .map(v => v.trim().toLowerCase())
    .filter(Boolean))];
}

function publishNotifications(notifications) {
  DB.set("notifications", notifications);
  if (typeof window !== "undefined") {
    window.dispatchEvent(new CustomEvent("pvms-notifications-updated", { detail: notifications }));
  }
}

function pushAppNotification({ text, type="info", entityId="", page="" }) {
  const current = DB.get("notifications", []) || [];
  const notification = {
    id:`nt-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
    text,
    type,
    entityId,
    page,
    read:false,
    ts:Date.now()
  };
  const next = [notification, ...current].slice(0, 50);
  publishNotifications(next);
  return notification;
}

function activeRegisteredUsers(users) {
  return (users || [])
    .filter(u => u && u.active !== false && u.name)
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
}

function registeredUserOptionLabel(user) {
  const detail = [user.empCode, user.role, user.dept].filter(Boolean).join(" - ");
  return detail ? `${user.name} (${detail})` : user.name;
}

function findCaseEmployee(violation, users) {
  return (users || []).find(u => u.id === violation.empId)
    || (users || []).find(u => (u.email || "").toLowerCase() === (violation.email || "").toLowerCase())
    || (users || []).find(u => u.name === violation.empName);
}

function findCaseHod(violation, employee, users) {
  const hodEmail = String(employee?.hodBuhEmail || "").toLowerCase();
  return (users || []).find(u => u.name === violation.assignedHOD)
    || (users || []).find(u => u.role === "HOD" && u.dept === violation.dept && u.active !== false)
    || (users || []).find(u => (u.email || "").toLowerCase() === hodEmail && u.active !== false);
}

function formatEmailDate(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
}

async function notifyCaseEvent(eventType, violation) {
  try {
    const isClosed = eventType === "Closed";
    pushAppNotification({
      text:isClosed
        ? `Case ${violation.id} closed for ${violation.empName || "employee"}`
        : `New case ${violation.id} registered for ${violation.empName || "employee"}`,
      type:isClosed ? "success" : (violation.severity === "Critical" ? "critical" : "info"),
      entityId:violation.id,
      page:"viewcase"
    });
    const users = DB.get("users", []);
    const emp = findCaseEmployee(violation, users);
    const hod = findCaseHod(violation, emp, users);
    const managementEmails = users
      .filter(u => u.active !== false && u.role === "Management")
      .map(u => u.email);
    const departmentHods = users
      .filter(u => u.active !== false && u.role === "HOD" && u.dept === violation.dept)
      .map(u => u.email);
    const assignedInvestigator = users.find(u => u.name === violation.assignedInvestigator || u.id === violation.assignedInvestigator);
    const primary = uniqueEmails([emp?.email, violation.email]);
    const fallbackPrimary = uniqueEmails([hod?.email, emp?.hodBuhEmail, ...managementEmails]).slice(0, 1);
    const to = primary.length ? primary : fallbackPrimary;
    if (!to.length) return;
    const cc = uniqueEmails([
      ...departmentHods,
      emp?.reportingToEmail,
      emp?.hodBuhEmail,
      emp?.managementEmail,
      hod?.email,
      assignedInvestigator?.email,
      ...managementEmails,
    ]).filter(email => !to.includes(email));

    const template = getEmailTemplateById(isClosed ? "caseClosed" : "caseRegistered") || {
      subject: isClosed ? "PVMS Case Closed: {{violationId}}" : "New PVMS Case Registered: {{violationId}}",
      body: "Dear {{employeeName}},\n\nPVMS case {{violationId}} has been updated.\n\nRegards,\nPVMS Automation System"
    };
    const variables = {
      userName: emp?.name || violation.empName || "PVMS User",
      employeeName: emp?.name || violation.empName || "Employee",
      violationId: violation.id || "",
      caseId: violation.id || "",
      department: violation.dept || "",
      category: violation.category || "",
      severity: violation.severity || "",
      priority: violation.severity || "",
      status: isClosed ? "Closed" : caseStatusLabel(violation.status || "Open"),
      incidentDate: formatEmailDate(violation.date),
      dueDate: formatEmailDate(violation.dueDate),
      closureDate: formatEmailDate(new Date()),
      assignedHOD: hod?.name || violation.assignedHOD || "Department HOD",
      assignedInvestigator: assignedInvestigator?.name || violation.assignedInvestigator || "",
      caseDescription: violation.description || "",
      portalUrl: getPortalUrl()
    };

    await fetch("/api/email/notification", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ to: to.join(","), cc: cc.join(","), template, variables })
    });
  } catch (err) { console.error("notifyCaseEvent failed", err); }
}

const CASE_WORKFLOW_MANAGER_ROLES = ["Master Admin","Management","HOD","Process Dept Rep"];

function canApproveCaseClosure(user) {
  return CASE_CLOSURE_APPROVER_ROLES.includes(user?.role);
}

function canSubmitCaseClosure(user) {
  return CASE_CLOSURE_REQUESTER_ROLES.includes(user?.role);
}

function canManageCaseWorkflow(user) {
  return CASE_WORKFLOW_MANAGER_ROLES.includes(user?.role);
}

function isClosureRequested(violation) {
  return caseStatusValue(violation?.status) === "Closure Requested";
}

function canRequestClosureForCase(user, violation) {
  const status = caseStatusValue(violation?.status);
  return canSubmitCaseClosure(user) && !["Draft","Closed","Rejected","Archived","Closure Requested"].includes(status);
}

function priorClosureStatus(violation) {
  const prior = caseStatusValue(violation?.statusBeforeClosureRequest || "CAPA Pending");
  return ["Draft","Closed","Rejected","Archived","Closure Requested"].includes(prior) ? "CAPA Pending" : prior;
}

function closureRequestUpdate(violation, user) {
  const status = caseStatusValue(violation?.status);
  return {
    status:"Closure Requested",
    statusBeforeClosureRequest:["Draft","Closed","Rejected","Archived","Closure Requested"].includes(status)
      ? priorClosureStatus(violation)
      : status,
    closureRequestedBy:user?.name || "System",
    closureRequestedAt:Date.now(),
    closureDecision:null,
    updatedBy:user?.name || "System",
    updatedAt:Date.now(),
    auditLog:[...(violation?.auditLog || []), { action:"Closure submitted for approval", by:user?.name || "System", at:Date.now() }]
  };
}

function closureAcceptUpdate(violation, user) {
  return {
    status:"Closed",
    closureDate:new Date().toISOString().slice(0,10),
    closureDecision:"Accepted",
    closureApprovedBy:user?.name || "System",
    closureApprovedAt:Date.now(),
    statusBeforeClosureRequest:null,
    updatedBy:user?.name || "System",
    updatedAt:Date.now(),
    auditLog:[...(violation?.auditLog || []), { action:"Closure accepted; case closed", by:user?.name || "System", at:Date.now() }]
  };
}

function closureRejectUpdate(violation, user) {
  const rollbackStatus = priorClosureStatus(violation);
  return {
    status:rollbackStatus,
    closureDecision:"Rejected",
    closureRejectedBy:user?.name || "System",
    closureRejectedAt:Date.now(),
    statusBeforeClosureRequest:null,
    updatedBy:user?.name || "System",
    updatedAt:Date.now(),
    auditLog:[
      ...(violation?.auditLog || []),
      { action:`Closure rejected; status returned to ${caseStatusLabel(rollbackStatus)}`, by:user?.name || "System", at:Date.now() }
    ]
  };
}

function applyCaseClosureAction(caseId, action, user) {
  const violations = DB.get("violations", []);
  const idx = violations.findIndex(v => v.id === caseId);
  if (idx < 0) throw new Error("Case not found");

  const violation = violations[idx];
  let updates;
  if (action === "submit") {
    if (!canRequestClosureForCase(user, violation)) throw new Error("This case cannot be submitted for closure by the current user");
    updates = closureRequestUpdate(violation, user);
  } else if (action === "accept") {
    if (!canApproveCaseClosure(user)) throw new Error("Only Master Admin or Process Dept Rep can accept closure");
    if (!isClosureRequested(violation)) throw new Error("Closure has not been submitted for approval");
    updates = closureAcceptUpdate(violation, user);
  } else if (action === "reject") {
    if (!canApproveCaseClosure(user)) throw new Error("Only Master Admin or Process Dept Rep can reject closure");
    if (!isClosureRequested(violation)) throw new Error("Closure has not been submitted for approval");
    updates = closureRejectUpdate(violation, user);
  } else {
    throw new Error("Unknown closure action");
  }

  violations[idx] = { ...violation, ...updates };
  DB.set("violations", violations);
  syncComplianceScores(DB.get("users", []), violations);
  return { violations, violation:violations[idx] };
}

function normalizeCaseStatus(status) {
  if (status === "Submitted" || status === "Under Review") return "Open";
  return status || "Open";
}

function caseStatusLabel(status) {
  const normalized = caseStatusValue(status);
  return CASE_STATUS_OPTIONS.find(s => s.value === normalized)?.label || STATUS_CONFIG[normalized]?.label || normalized;
}

function caseStatusValue(status) {
  const raw = String(status || "").trim();
  if (!raw) return "Open";
  const normalized = normalizeCaseStatus(raw);
  if (CASE_STATUS_OPTIONS.some(s => s.value === normalized) || STATUS_CONFIG[normalized]) return normalized;
  const fromOptionLabel = CASE_STATUS_OPTIONS.find(s => s.label === raw);
  if (fromOptionLabel) return fromOptionLabel.value;
  const fromConfigLabel = Object.entries(STATUS_CONFIG).find(([, cfg]) => cfg.label === raw);
  return normalizeCaseStatus(fromConfigLabel?.[0] || raw);
}

function normalizeSeverity(value) {
  const raw = String(value || "").trim();
  if (!raw) return "";
  if (SEVERITY_CONFIG[raw]) return raw;
  const exact = Object.keys(SEVERITY_CONFIG).find(s => s.toLowerCase() === raw.toLowerCase());
  if (exact) return exact;
  return Object.keys(SEVERITY_CONFIG).find(s => raw.toLowerCase().includes(s.toLowerCase())) || "";
}

function isCaseDateOverdue(violation) {
  const status = caseStatusValue(violation?.status);
  return violation?.dueDate && new Date(violation.dueDate) < new Date() && !["Closed","Rejected","Archived"].includes(status);
}

function effectiveCaseStatus(violation) {
  if (violation?.status === "Overdue" || isCaseDateOverdue(violation)) return "Overdue";
  return caseStatusValue(violation?.status);
}

const CASE_WORKFLOW_STEPS = [
  { title:"Case Created", note:"On submission" },
  { title:"HOD Review", note:"Awaiting approval" },
  { title:"Investigation", note:"After HOD approval" },
  { title:"CAPA & Closure", note:"After investigation" },
];

function workflowIndexForCase(violation, isDraftForm=false) {
  const status = caseStatusValue(violation?.status);
  if (isDraftForm || status === "Draft") return violation?.id ? 0 : -1;
  if (status === "Closed") return 4;
  if (["CAPA Pending","Verification Pending","Closure Requested"].includes(status)) return 3;
  if (status === "Under Investigation" || status === "Overdue") return 2;
  if (status === "Open") return 1;
  return violation?.id || violation?.createdAt ? 1 : -1;
}

function WorkflowTracker({ violation, isDraftForm=false }) {
  const progress = workflowIndexForCase(violation, isDraftForm);
  return (
    <div>
      {CASE_WORKFLOW_STEPS.map((step,i)=>{
        const done = progress > i;
        const current = progress === i;
        const pending = progress < i;
        const color = done ? "var(--green)" : current ? "var(--blue)" : "var(--text3)";
        const bg = done ? "var(--green-bg)" : current ? "var(--blue-l)" : "var(--bg2)";
        const bd = done ? "var(--green-bd)" : current ? "var(--blue)" : "var(--line)";
        return (
          <div key={step.title} style={{display:"flex",gap:10,paddingBottom:i<CASE_WORKFLOW_STEPS.length-1?12:0,position:"relative"}}>
            {i<CASE_WORKFLOW_STEPS.length-1&&<div className="workflow-step-line" style={{position:"absolute",left:11,top:22,bottom:0,width:1,background:done?"var(--green-bd)":"var(--line)"}}/>}
            <div className={`workflow-step-dot ${current ? "current" : ""}`} style={{width:22,height:22,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,background:bg,color,border:`1px solid ${bd}`}}>
              {done?<Icon name="check" size={12} color="var(--green)"/>:i+1}
            </div>
            <div style={{paddingTop:2}}>
              <div style={{fontSize:12.5,fontWeight:500,color:pending?"var(--text3)":"var(--text)"}}>{step.title}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>{current ? "Current stage" : step.note}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function insertBeforeRegards(body, line) {
  const value = String(body || "");
  if (value.includes(line)) return value;
  const marker = "\n\nRegards,";
  const index = value.indexOf(marker);
  if (index >= 0) return `${value.slice(0, index)}\n${line}${value.slice(index)}`;
  return `${value}\n\n${line}`;
}

function ensureRequiredEmailTemplateContent(template) {
  const caseDescriptionTemplates = ["caseRegistered", "caseClosed", "due", "escalation", "capaOverdue", "summary"];
  const defaultTemplate = DEFAULT_EMAIL_TEMPLATES.find(t => t.id === template.id);
  if (template.id === "summary" && defaultTemplate && /Dear\s+\{\{\s*userName\s*\}\}/i.test(String(template.body || ""))) {
    return { ...template, subject:defaultTemplate.subject, body:defaultTemplate.body };
  }
  if (template.id === "escalation" && defaultTemplate && (/crossed its due date/i.test(String(template.body || "")) || /\{\{violationId\}\}\s+is overdue/i.test(String(template.subject || "")))) {
    return { ...template, subject:defaultTemplate.subject, body:defaultTemplate.body };
  }
  if (template.id === "due" && defaultTemplate && /Due Date:/i.test(String(template.body || "")) && !/Investigation Due Date:/i.test(String(template.body || ""))) {
    return { ...template, subject:defaultTemplate.subject, body:defaultTemplate.body };
  }
  let body = String(template.body || "");

  if (template.id === "passwordReset" && !body.includes("{{resetLink}}") && defaultTemplate) {
    return { ...template, subject:defaultTemplate.subject, body:defaultTemplate.body };
  }

  if (template.id === "userInvite" && !body.includes("{{temporaryPassword}}") && defaultTemplate) {
    return { ...template, subject:defaultTemplate.subject, body:defaultTemplate.body };
  }

  if (caseDescriptionTemplates.includes(template.id) && !body.includes("{{caseDescription}}")) {
    const line = template.id === "summary"
      ? "Case Description Summary: {{caseDescription}}"
      : "Case Description: {{caseDescription}}";
    body = insertBeforeRegards(body, line);
  }

  if (!body.includes("{{portalUrl}}")) {
    body = insertBeforeRegards(body, "PVMS Portal: {{portalUrl}}");
  }

  return { ...template, body };
}

const DB = {
  // Data is synced from MongoDB to localStorage on load, then writes are pushed back to DB
  serverSyncReady: false,
  enableServerSync: () => { DB.serverSyncReady = true; },
  disableServerSync: () => { DB.serverSyncReady = false; },
  get: (key, def=null) => {
    try {
      const v = localStorage.getItem("pvms2_" + key);
      if (v === null || v === undefined) return def;
      return JSON.parse(v);
    } catch(e) { return def; }
  },
  set: (key, val) => {
    try {
      localStorage.setItem("pvms2_" + key, JSON.stringify(val));
      if (key !== "currentUser" && DB.serverSyncReady) {
        fetch('/api/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, data: val })
        }).catch(err => console.error("DB Sync failed", err));
      }
    } catch(e) { console.error(e); }
  },
  genId: (prefix) => `${prefix}-${new Date().getFullYear()}-${String((DB.get("seq_"+prefix, 0)||0)+1).padStart(4,"0")}`,
  nextSeq: (prefix) => { const n=((DB.get("seq_"+prefix,0)||0)+1); DB.set("seq_"+prefix,n); return n; },
};

function activeMasterOptions(key, fallback) {

function optionsWithCurrent(options, current) {
  const normalized = new Set();
  const result = [];
  [...(options || []), current].forEach(option => {
    const value = String(option || "").trim();
    const key = value.toLowerCase();
    if (value && !normalized.has(key)) {
      normalized.add(key);
      result.push(value);
    }
  });
  return result;
}

async function syncStateFromServer() {
  const res = await fetch('/api/sync');
  if (!res.ok) throw new Error("Unable to sync PVMS data");
  const data = await res.json();
  if (data && typeof data === 'object') {
    const preservedUser = localStorage.getItem("pvms2_currentUser");
    for (const key of Object.keys(data)) {
      if (key === 'currentUser') continue;
      localStorage.setItem("pvms2_" + key, JSON.stringify(data[key]));
    }
    if (preservedUser) localStorage.setItem("pvms2_currentUser", preservedUser);
  }
  return data;
}

function withComplianceScores(users = [], violations = []) {
  const stats = new Map((users || []).filter(isComplianceUser).map(u => [u.id, { count:0, penalty:0 }]));
  (violations || []).filter(isComplianceScoredCase).forEach(violation => {
    const employee = findCaseEmployee(violation, users || []);
    if (!employee || !stats.has(employee.id)) return;
    const stat = stats.get(employee.id);
    stat.count += 1;
    stat.penalty += casePenalty(violation);
  });

  return (users || []).map(user => {
    if (!isComplianceUser(user)) return user;
    const stat = stats.get(user.id) || { count:0, penalty:0 };
    const score = Math.max(0, 100 - stat.penalty);
    const currentScore = Number.isFinite(Number(user.complianceScore)) ? Number(user.complianceScore) : 100;
    const currentCount = Number.isFinite(Number(user.violations)) ? Number(user.violations) : 0;
    if (currentScore === score && currentCount === stat.count) return user;
    return { ...user, complianceScore:score, violations:stat.count };
  });
}

        role:employee?.role || "Case Employee",
        active:employee?.active !== false,
        complianceScore:100,
        violations:0,
        penalty:0,
        cases:[],
        warningCount:0
      });
    }
    return rows.get(key);
  };

  scoredCases.forEach(violation => {
    const employee = findCaseEmployee(violation, users || []);
    const row = ensureRow(violation, employee);
    if (!row) return;
    row.cases.push(violation);
    row.violations += 1;
    row.penalty += casePenalty(violation);
    row.complianceScore = Math.max(0, 100 - row.penalty);
  });

  const activeWarnings = mergedWarningRecords(warnings, violations);
  activeWarnings.forEach(warning => {
    const violation = scoredCases.find(v => v.id === warning.caseId);
    if (!violation) return;
    const employee = (users || []).find(u => u.id === warning.empId) || (violation ? findCaseEmployee(violation, users || []) : null);
    const row = ensureRow(violation, employee);
    if (row) row.warningCount += 1;
  });

  return [...rows.values()].filter(row => row.active !== false);
}

function syncComplianceScores(users = DB.get("users", []), violations = DB.get("violations", []), force = false) {
  const nextUsers = withComplianceScores(users, violations);
  const changed = nextUsers.some((next, index) => next !== users[index]);
  if (force || changed) DB.set("users", nextUsers);
  return nextUsers;
}

function casePenalty(violation) {
  const severity = normalizeSeverity(violation?.severity);
  return Math.abs(SEVERITY_CONFIG[severity]?.score || 0);
}

function departmentComplianceScore(violations = []) {
  const penalty = (violations || [])
    .filter(isComplianceScoredCase)
    .reduce((sum, violation) => sum + casePenalty(violation), 0);
  return Math.max(0, 100 - penalty);
}

function isLegacyDummyRecord(item) {
  if (!item || typeof item !== "object") return false;
  const marker = String(item.source || item.recordType || item.origin || "").toLowerCase();
  const id = String(item.id || item.caseId || "").toLowerCase();
  return item.isDummy === true || item.dummy === true || item.demo === true || marker === "demo" || marker === "dummy" || /^demo[-_]/.test(id) || /^dummy[-_]/.test(id);
}

function removeLegacyDummyEntries() {
  let changed = false;
  ["users","violations","warnings","auditLogs","notifications"].forEach(key => {
    const list = DB.get(key, []);
    if (!Array.isArray(list)) return;
    const next = list.filter(item => !isLegacyDummyRecord(item));
    if (next.length !== list.length) {
      DB.set(key, next);
      changed = true;
    }
  });
  return changed;
}

function attachmentPreviewType(attachment) {
  const url = String(attachment?.url || attachment?.secureUrl || attachment?.attachmentDataUrl || "");
  const name = String(attachment?.name || attachment?.fileName || attachment?.attachmentName || "");
  const type = String(attachment?.type || attachment?.fileType || "").toLowerCase();
  const mime = String(attachment?.mimeType || "").toLowerCase();
  const value = `${url} ${name} ${mime}`.toLowerCase();
  if (type === "image" || mime.startsWith("image/") || /^data:image\//.test(url) || /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(value)) return "image";
  if (type === "video" || mime.startsWith("video/") || /^data:video\//.test(url) || /\.(mp4|webm|mov|m4v)(\?|#|$)/i.test(value)) return "video";
  if (mime === "application/pdf" || /^data:application\/pdf/i.test(url) || /\.pdf(\?|#|$)/i.test(value)) return "pdf";
  return "document";
}

  const title = attachment.name || attachment.fileName || attachment.attachmentName || "Attachment";
  const kind = attachmentPreviewType(attachment);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,.58)",zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{width:"min(980px,96vw)",height:"min(760px,92vh)",background:"#FFFFFF",borderRadius:"var(--r2)",boxShadow:"var(--sh2)",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{title}</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>{attachment.label || (kind === "pdf" ? "PDF Preview" : kind.charAt(0).toUpperCase() + kind.slice(1))}</div>
          </div>
          <button onClick={onClose} title="Close" style={{width:32,height:32,border:"1px solid var(--line)",borderRadius:"var(--r)",background:"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--text2)"}}>
            <Icon name="x" size={16}/>
          </button>
        </div>
        <div style={{flex:1,minHeight:0,background:"var(--bg2)",display:"flex",alignItems:"center",justifyContent:"center",padding:kind==="image"||kind==="video"?18:0}}>
          {!previewUrl ? (
            <EmptyState icon="file" title="Preview unavailable" sub="Attachment link is unavailable"/>
          ) : kind === "image" ? (
            <img src={previewUrl} alt={title} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:"var(--r)",background:"#fff",boxShadow:"var(--sh)"}}/>
          ) : kind === "video" ? (
            <video src={previewUrl} controls style={{maxWidth:"100%",maxHeight:"100%",background:"#000",borderRadius:"var(--r)"}}/>
          ) : (
            <iframe title={title} src={previewUrl} style={{width:"100%",height:"100%",border:0,background:"#FFFFFF"}}/>
          )}
        </div>
      </div>
    </div>
  );
}

function LoginPage({ onLogin, resetToken="", resetEmail="", onResetComplete=()=>{} }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPwd, setShowPwd] = useState(false);
  const [loading, setLoading] = useState(false);
  const [resetLoading, setResetLoading] = useState(false);
  const [error, setError] = useState("");
  const [resetMessage, setResetMessage] = useState("");
  const [resetEmailInput, setResetEmailInput] = useState(resetEmail || "");
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [resetComplete, setResetComplete] = useState(false);

  useEffect(() => {
    setResetEmailInput(resetEmail || "");
  }, [resetEmail]);

  const handle = async () => {
    setError(""); setResetMessage(""); setLoading(true);
    try {
      await syncStateFromServer().catch(err => console.warn("Login sync skipped:", err));
      // Always seed before login so users table is populated
      seedIfEmpty();
      syncComplianceScores();
      const users = DB.get("users", []);
      const user = users.find(u => (u.email || "").toLowerCase() === email.trim().toLowerCase());

      if (!user) { setError("User account not found in database."); setLoading(false); return; }

      const validPasswords = passwordCandidatesForUser(user);
      if (!validPasswords.includes(password)) { setError("Invalid password."); setLoading(false); return; }

      const logs = DB.get("auditLogs", []);
      logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"LOGIN", entity:"-", detail:"Successful login", ip:"192.168.1."+Math.floor(Math.random()*50+10) });
      DB.set("auditLogs", logs);
      DB.set("currentUser", user);
      onLogin(user);
    } catch (err) {
      setError(err.message || "Unable to sign in.");
    } finally {
      setLoading(false);
    }
  };

  const forgotPassword = async () => {
    setError(""); setResetMessage("");
    const cleanEmail = email.trim().toLowerCase();
    if (!cleanEmail) { setError("Enter your email address first."); return; }
    setResetLoading(true);
    try {
      await requestPasswordResetEmail(cleanEmail, "Forgot Password");
      setResetMessage("If this email is registered, password reset instructions have been sent.");
    } catch (err) {
      setError(err.message || "Unable to send password reset email.");
    } finally {
      setResetLoading(false);
    }
  };

  const submitNewPassword = async () => {
    setError(""); setResetMessage("");
    const cleanEmail = resetEmailInput.trim().toLowerCase();
    if (!cleanEmail) { setError("Enter your email address."); return; }
    if (newPassword.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (newPassword !== confirmPassword) { setError("New password and confirm password do not match."); return; }
    setResetLoading(true);
    try {
      await completePasswordReset({ email:cleanEmail, token:resetToken, password:newPassword });
      await syncStateFromServer().catch(err => console.warn("Post-reset sync skipped:", err));
      setResetComplete(true);
      setResetMessage("Password reset successfully. Please sign in with your new password.");
      setNewPassword(""); setConfirmPassword("");
    } catch (err) {
      setError(err.message || "Unable to reset password.");
    } finally {
      setResetLoading(false);
    }
  };

  if (resetToken) {
    return (
      <div style={{minHeight:"100vh",background:"#F9FAFB",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{width:"100%",maxWidth:420}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <img src={LOGO_DARK_SRC} alt="ONEPWS Logo" style={{width:"100%",maxWidth:280,height:"auto",marginBottom:14}}/>
            <p style={{fontSize:13,color:"#374151",marginTop:4,fontWeight:500}}>Process Violation Management System</p>
            <p style={{fontSize:10.5,color:"#6B7280",marginTop:3,letterSpacing:".03em"}}>{ISO_CERTS}</p>
          </div>
          <div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:14,boxShadow:"0 4px 24px rgba(0,0,0,0.08)",padding:32}}>
            <h2 style={{fontSize:16,fontWeight:600,color:"#1F2937",marginBottom:20}}>Reset your password</h2>
            {error && <div style={{background:"var(--red-bg)",border:"1px solid var(--red-bd)",borderRadius:"var(--r)",padding:"8px 12px",color:"var(--red)",fontSize:13,marginBottom:16}}>{error}</div>}
            {resetMessage && <div style={{background:"var(--green-bg)",border:"1px solid var(--green-bd)",borderRadius:"var(--r)",padding:"8px 12px",color:"var(--green)",fontSize:13,marginBottom:16}}>{resetMessage}</div>}
            {resetComplete ? (
              <Btn variant="primary" onClick={onResetComplete} style={{width:"100%",justifyContent:"center",padding:"9px 0",fontSize:14}}>Back to Sign In</Btn>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <FormGroup label="Email Address" required>
                  <Input type="email" value={resetEmailInput} onChange={setResetEmailInput} placeholder="your@email.com"/>
                </FormGroup>
                <FormGroup label="New Password" required>
                  <Input type="password" value={newPassword} onChange={setNewPassword} placeholder="Minimum 8 characters"/>
                </FormGroup>
                <FormGroup label="Confirm Password" required>
                  <Input type="password" value={confirmPassword} onChange={setConfirmPassword} placeholder="Re-enter new password"/>
                </FormGroup>
                <Btn variant="primary" onClick={submitNewPassword} loading={resetLoading} style={{width:"100%",justifyContent:"center",padding:"9px 0",fontSize:14}}>Reset Password</Btn>
                <button onClick={onResetComplete} style={{background:"transparent",border:"none",color:"var(--text3)",fontSize:12,fontWeight:600,cursor:"pointer",padding:0}}>Back to sign in</button>
              </div>
            )}
          </div>
          <p style={{textAlign:"center",color:"#6B7280",fontSize:11,marginTop:16}}>{ISO_CERTS}</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#F9FAFB",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src={LOGO_DARK_SRC} alt="ONEPWS Logo" style={{width:"100%",maxWidth:280,height:"auto",marginBottom:14}}/>
          <p style={{fontSize:13,color:"#374151",marginTop:4,fontWeight:500}}>Process Violation Management System</p>
          <p style={{fontSize:10.5,color:"#6B7280",marginTop:3,letterSpacing:".03em"}}>{ISO_CERTS}</p>
        </div>

        {/* Card */}
        <div style={{background:"#FFFFFF",border:"1px solid #E5E7EB",borderRadius:14,boxShadow:"0 4px 24px rgba(0,0,0,0.08)",padding:32}}>
          <h2 style={{fontSize:16,fontWeight:600,color:"#1F2937",marginBottom:20}}>Sign in to your account</h2>

          {error && <div style={{background:"var(--red-bg)",border:"1px solid var(--red-bd)",borderRadius:"var(--r)",padding:"8px 12px",color:"var(--red)",fontSize:13,marginBottom:16}}>{error}</div>}
          {resetMessage && <div style={{background:"var(--green-bg)",border:"1px solid var(--green-bd)",borderRadius:"var(--r)",padding:"8px 12px",color:"var(--green)",fontSize:13,marginBottom:16}}>{resetMessage}</div>}

          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <FormGroup label="Email Address" required>
              <Input type="email" value={email} onChange={setEmail} placeholder="your@email.com"/>
            </FormGroup>
            <FormGroup label="Password" required>
              <div style={{position:"relative"}}>
                <Input type={showPwd?"text":"password"} value={password} onChange={setPassword} placeholder="" style={{paddingRight:36}}/>
                <button onClick={()=>setShowPwd(!showPwd)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:14}}>{showPwd?"Hide":"Show"}</button>
              </div>
            </FormGroup>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:-6}}>
              <button onClick={forgotPassword} disabled={resetLoading}
                style={{background:"transparent",border:"none",color:"var(--blue)",fontSize:12,fontWeight:600,cursor:resetLoading?"wait":"pointer",padding:0}}
              >{resetLoading ? "Sending reset email..." : "Forgot password?"}</button>
            </div>
            <Btn variant="primary" onClick={handle} loading={loading} style={{width:"100%",justifyContent:"center",padding:"9px 0",fontSize:14}}>Sign In</Btn>
          </div></div>

        <p style={{textAlign:"center",color:"#6B7280",fontSize:11,marginTop:16}}>{ISO_CERTS}</p>
      </div>
    </div>
  );
}

function Topbar({ page, user, notifications, setPage, setEditId, onLogout, onNotificationsChange }) {
  const [showNotif, setShowNotif] = useState(false);
  const [notifs, setNotifs] = useState(notifications);
  const unread = notifs.filter(n=>!n.read).length;
  const BREADCRUMBS = {
    dashboard:[["PVMS","dashboard"],["Dashboard","dashboard"]],
    cases:[["PVMS","dashboard"],["Case Management","cases"],["All Cases","cases"]],
    viewcase:[["PVMS","dashboard"],["Case Management","cases"],["All Cases","cases"],["Case Details","viewcase"]],
    newcase:[["PVMS","dashboard"],["Case Management","cases"],["Register Violation","newcase"]],
    investigation:[["PVMS","dashboard"],["Case Management","cases"],["Investigation & CAPA","investigation"]],
    disciplinary:[["PVMS","dashboard"],["Disciplinary","disciplinary"],["Disciplinary Actions","disciplinary"]],
    warning:[["PVMS","dashboard"],["Disciplinary","disciplinary"],["Warning Letters","warning"]],
    reports:[["PVMS","dashboard"],["Analytics","reports"],["Reports & MIS","reports"]],
    employees:[["PVMS","dashboard"],["Analytics","reports"],["Employee Compliance","employees"]],
    medialibrary:[["PVMS","dashboard"],["Administration","masters"],["Media Library","medialibrary"]],
    masters:[["PVMS","dashboard"],["Administration","masters"],["Master Data","masters"]],
    email:[["PVMS","dashboard"],["Administration","masters"],["Email Integration","email"]],
    audit:[["PVMS","dashboard"],["Administration","masters"],["Audit Trail","audit"]],
    users:[["PVMS","dashboard"],["Administration","masters"],["User Management","users"]]
  };
  const bc = BREADCRUMBS[page] || [["PVMS","dashboard"]];

  useEffect(() => {
    setNotifs(notifications || []);
  }, [notifications]);

  const markAll = () => {
    const updated = notifs.map(n=>({...n,read:true}));
    setNotifs(updated);
    publishNotifications(updated);
    onNotificationsChange?.(updated);
  };

  const openNotification = (notification) => {
    const updated = notifs.map(n=>n.id===notification.id ? {...n,read:true} : n);
    setNotifs(updated);
    publishNotifications(updated);
    onNotificationsChange?.(updated);
    if (notification.entityId) setEditId?.(notification.entityId);
    if (notification.page) setPage(notification.page);
    setShowNotif(false);
  };

  return (
    <div style={{background:"#FFFFFF",borderBottom:"1px solid #E5E7EB",padding:"0 20px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"relative",zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6B7280"}}>
        {bc.map(([s,target],i)=>(
          <span key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            {i>0&&<span style={{color:"#D1D5DB",display:"flex"}}><Icon name="chevron-right" size={12}/></span>}
            <button
              onClick={()=>i!==bc.length-1 && target && setPage(target)}
              disabled={i===bc.length-1 || !target}
              style={{background:"none",border:"none",padding:0,color:i===bc.length-1?"#1F2937":"#6B7280",fontWeight:i===bc.length-1?500:400,cursor:i===bc.length-1?"default":"pointer",fontSize:12}}
            >{s}</button>
          </span>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Btn onClick={()=>setPage("newcase")} variant="primary" size="sm" icon={<Icon name="plus" size={14} color="#fff"/>}>New Case</Btn>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowNotif(!showNotif)} style={{width:34,height:34,border:"1px solid var(--line)",borderRadius:"var(--r)",background:"var(--bg3)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,position:"relative",color:"var(--text3)"}}>
            <Icon name="bell" size={16}/>
            {unread>0 && <span style={{position:"absolute",top:4,right:4,width:9,height:9,background:"var(--red)",borderRadius:"50%",border:"2px solid var(--bg3)"}}/>}
          </button>
          {showNotif && (
            <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,width:320,background:"var(--bg3)",border:"1px solid var(--line)",borderRadius:"var(--r2)",boxShadow:"var(--sh2)",zIndex:200}} onClick={e=>e.stopPropagation()}>
              <div style={{padding:"12px 14px",borderBottom:"1px solid var(--line)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:600,fontSize:13}}>Notifications {unread>0&&<span style={{fontSize:11,background:"var(--red-bg)",color:"var(--red)",padding:"1px 5px",borderRadius:8}}>+{unread}</span>}</span>
                <button onClick={markAll} style={{fontSize:11,color:"var(--blue)",background:"none",border:"none",cursor:"pointer"}}>Mark all read</button>
              </div>
              {notifs.length === 0 && (
                <div style={{padding:"18px 14px",fontSize:12,color:"var(--text3)",textAlign:"center"}}>No notifications</div>
              )}
              {notifs.slice(0,6).map(n=>(
                <div key={n.id} onClick={()=>openNotification(n)} style={{padding:"10px 14px",borderBottom:"1px solid var(--line)",background:n.read?"var(--bg3)":"var(--blue-l)",display:"flex",gap:10,alignItems:"flex-start",cursor:"pointer"}}>
                  <span style={{fontSize:14,display:"flex"}}><Icon name={n.type==="critical"?"alert":n.type==="warning"?"alert-circle":n.type==="success"?"check-circle":"info"} size={16} color={n.type==="critical"?"var(--red)":n.type==="warning"?"#D97706":n.type==="success"?"var(--green)":"var(--blue)"}/></span>
                  <div><div style={{fontSize:12,color:"var(--text)",fontWeight:n.read?400:500}}>{n.text}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{new Date(n.ts).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"})}</div></div>
                </div>
              ))}
              <div style={{padding:"8px 14px",fontSize:11,color:"var(--text3)",textAlign:"center"}}>End of notifications</div>
            </div>
          )}
        </div>
        <button onClick={onLogout} style={{fontSize:12,color:"var(--text3)",background:"none",border:"1px solid var(--line)",borderRadius:"var(--r)",padding:"5px 10px",cursor:"pointer"}}>Sign Out</button>
        {showNotif && <div style={{position:"fixed",inset:0,zIndex:150}} onClick={()=>setShowNotif(false)}/>}
      </div>
    </div>
  );
}

function DashboardPage({ user, setPage }) {
  const violations = DB.get("violations",[]);
  const users = withComplianceScores(DB.get("users",[]), violations);

  const total = violations.length;
  const open = violations.filter(v=>!["Closed","Rejected"].includes(caseStatusValue(v.status))).length;
  const closed = violations.filter(v=>caseStatusValue(v.status)==="Closed").length;
  const overdue = violations.filter(v=>{
    if(["Closed","Rejected"].includes(caseStatusValue(v.status))) return false;
    return v.dueDate && new Date(v.dueDate) < new Date();
  }).length;
  const critical = violations.filter(v=>normalizeSeverity(v.severity)==="Critical"&&caseStatusValue(v.status)!=="Closed").length;
  const repeats = violations.filter(v=>v.repeatViolation).length;
  const capaPending = violations.filter(v=>["CAPA Pending","Verification Pending","Closure Requested"].includes(caseStatusValue(v.status))).length;
  const complianceUsers = users.filter(isComplianceUser);
  const avgScore = complianceUsers.reduce((a,b)=>a+b.complianceScore,0) / Math.max(complianceUsers.length,1);

  const deptCounts = {};
  DEPARTMENTS.forEach(d=>{deptCounts[d]=violations.filter(v=>v.dept===d).length});
  const maxDept = Math.max(...Object.values(deptCounts),1);

  const catCounts = {};
  violations.forEach(v=>{catCounts[v.category]=(catCounts[v.category]||0)+1});
  const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const sevCounts = {Minor:0,Moderate:0,Major:0,Critical:0};
  violations.forEach(v=>{
    const severity = normalizeSeverity(v.severity);
    if(sevCounts[severity]!==undefined) sevCounts[severity]++;
  });

  const monthCounts = Array(6).fill(0);
  const now = new Date();
  violations.forEach(v=>{
    const diff = (now - new Date(v.date)) / (1000*60*60*24*30);
    if(diff >= 0 && diff < 6) monthCounts[5-Math.floor(diff)]++;
  });

  const monthLabels = Array(6).fill(0).map((_,i)=>{
    const d = new Date();
    d.setMonth(d.getMonth()-(5-i));
    return d.toLocaleString("default",{month:"short"});
  });
  const currentMonthCount = monthCounts[5] || 0;
  const previousMonthCount = monthCounts[4] || 0;
  const totalTrend = previousMonthCount
    ? `${Math.abs(Math.round(((currentMonthCount - previousMonthCount) / previousMonthCount) * 100))}%`
    : `${currentMonthCount} new`;
  const totalTrendDir = currentMonthCount >= previousMonthCount ? "up" : "down";

  const recentCases = violations.slice(-5).reverse();

  return (
    <div>
      <PageHeader title="Compliance Overview"
        sub={`Real-time analytics  ${ISO_CERTS}`}
        actions={
          <>
            <Btn size="sm" icon={<Icon name="download" size={14}/>} onClick={()=>exportDashboardPDF(violations, users)}>Export PDF</Btn>
            <Btn variant="primary" size="sm" onClick={()=>setPage("newcase")} icon={<Icon name="plus" size={14} color="#fff"/>}>Register Case</Btn>
          </>
        }
      />

      {/* KPI Row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <KpiCard label="Total Violations" value={total} color="var(--blue)" trend={totalTrend} trendDir={totalTrendDir} sub="vs previous month"/>
        <KpiCard label="Open Cases" value={open} color="var(--red)" trend={`${open} active`} trendDir="up"/>
        <KpiCard label="Overdue Investigation" value={overdue} color="#D97706" sub="past investigation due date"/>
        <KpiCard label="Closed Cases" value={closed} color="var(--green)" sub={`${Math.round(closed/Math.max(total,1)*100)}% closure rate`}/>
        <KpiCard label="Critical (Active)" value={critical} color="var(--red)" sub="require immediate action"/>
        <KpiCard label="Repeat Violations" value={repeats} color="#EA580C" sub="across all depts"/>
        <KpiCard label="CAPA Pending" value={capaPending} color="var(--purple)" sub="actions pending"/>
        <KpiCard label="Org Avg Score" value={Math.round(avgScore)} color="var(--cyan)" sub="compliance score"/>
      </div>

      {/* Row 2 */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
        {/* Dept bar chart */}
        <Card>
          <CardHeader title="Department-wise Violations" actions={<Btn size="sm" ghost onClick={()=>setPage("reports")}>Full Report </Btn>}/>
          <div style={{padding:16}}>
            {DEPARTMENTS.map(d=>(
              <div key={d} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{fontSize:12,color:"var(--text2)",width:160,flexShrink:0,textAlign:"right"}}>{d}</div>
                <div style={{flex:1,height:8,background:"var(--bg2)",borderRadius:4,overflow:"hidden"}}>
                  <div className="progress-fill" style={{width:`${deptCounts[d]/maxDept*100}%`,background:"var(--blue)",borderRadius:4}}/>
                </div>
                <div style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--text3)",width:24,textAlign:"right"}}>{deptCounts[d]}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Severity donut */}
        <Card>
          <CardHeader title="By Severity"/>
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {Object.entries(sevCounts).map(([s,c])=>(
              <div key={s} style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:SEVERITY_CONFIG[s].color,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13}}>{s}</span>
                <div style={{width:80,height:6,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}}>
                  <div className="progress-fill" style={{width:`${c/Math.max(total,1)*100}%`,background:SEVERITY_CONFIG[s].color}}/>
                </div>
                <span style={{fontSize:12,fontFamily:"var(--mono)",color:"var(--text3)",width:20,textAlign:"right"}}>{c}</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid var(--line)",paddingTop:10,fontSize:12,color:"var(--text3)"}}>
              Risk deductions: Minor 2  Moderate 5  Major 15  Critical 40
            </div>
          </div>
        </Card>
      </div>

      {/* Row 3 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        {/* Monthly bar */}
        <Card>
          <CardHeader title="6-Month Trend"/>
          <div style={{padding:16}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:8,height:100}}>
              {monthCounts.map((v,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:600,color:v ? "var(--text2)" : "var(--text3)",height:12}}>{v}</div>
                  <div style={{width:"100%",height:`${Math.max(v/Math.max(...monthCounts,1)*80,4)}px`,background:i===5?"var(--blue)":"var(--line2)",borderRadius:"3px 3px 0 0",transition:"height .4s",minHeight:4}}/>
                  <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{monthLabels[i]}</div>
                </div>
              ))}
            </div>
          </div>
        </Card>

        {/* Top categories */}
        <Card>
          <CardHeader title="Top Violation Categories"/>
          <div style={{padding:16}}>
            {topCats.map(([cat,cnt],i)=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                <span style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--text3)",width:14}}>{i+1}</span>
                <span style={{flex:1,fontSize:12,color:"var(--text2)"}}>{cat}</span>
                <div style={{width:80,height:6,background:"var(--bg2)",borderRadius:3,overflow:"hidden"}}>
                  <div className="progress-fill" style={{width:`${cnt/Math.max(topCats[0][1],1)*100}%`,background:"var(--blue)",borderRadius:3}}/>
                </div>
                <span style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--text3)",width:20,textAlign:"right"}}>{cnt}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* Recent Cases */}
      <Card>
        <CardHeader title="Recent Cases" actions={<Btn size="sm" ghost onClick={()=>setPage("cases")}>View All </Btn>}/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["Case ID","Date","Employee","Department","Category","Severity","Status"].map(h=>(
                  <th key={h} style={{padding:"8px 14px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {recentCases.map(v=>(
                <tr key={v.id} style={{borderBottom:"1px solid var(--line)",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{padding:"10px 14px",fontFamily:"var(--mono)",fontSize:11,color:"var(--blue)",fontWeight:500}}>{v.id}</td>
                  <td style={{padding:"10px 14px",fontSize:11,color:"var(--text3)"}}>{v.date}</td>
                  <td style={{padding:"10px 14px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><Avatar name={v.empName}/><span style={{fontSize:12.5}}>{v.empName}</span></div></td>
                  <td style={{padding:"10px 14px",fontSize:12,color:"var(--text3)"}}>{v.dept}</td>
                  <td style={{padding:"10px 14px"}}><span style={{fontSize:11,background:"var(--bg2)",color:"var(--text2)",padding:"2px 7px",borderRadius:4,border:"1px solid var(--line)"}}>{v.category}</span></td>
                  <td style={{padding:"10px 14px"}}><Badge severity={v.severity}/></td>
                  <td style={{padding:"10px 14px"}}><Badge status={v.status}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function CasesPage({ user, setPage, setEditId, toast }) {
  const [violations, setViolations] = useState(DB.get("violations",[]));
  const [search, setSearch] = useState("");
  const [filterDept, setFilterDept] = useState("");
  const [filterSev, setFilterSev] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [filterTab, setFilterTab] = useState("All");
  const [page, setPageNum] = useState(1);
  const PER = 8;

  const tabs = [
    {key:"All",label:"All",count:violations.length},
    {key:"Open",label:"Open"},
    {key:"Under Investigation",label:"Investigating"},
    {key:"CAPA Pending",label:"CAPA Pending"},
    {key:"Closure Requested",label:"Closure Requested"},
    {key:"Overdue",label:"Overdue"},
    {key:"Closed",label:"Closed"},
  ];

  let filtered = violations.filter(v => {
    if (filterTab === "Overdue") {
      const ov = effectiveCaseStatus(v) === "Overdue";
      if (!ov) return false;
    } else if (filterTab !== "All") {
      if (caseStatusValue(v.status) !== filterTab) return false;
    }
    if (filterDept && v.dept !== filterDept) return false;
    if (filterSev && v.severity !== filterSev) return false;
    if (filterStatus && v.status !== filterStatus) return false;
    if (search) {
      const q = search.toLowerCase();
      return v.id.toLowerCase().includes(q) || v.empName.toLowerCase().includes(q) || v.category.toLowerCase().includes(q) || v.dept.toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>b.caseNo-a.caseNo);

  const paged = filtered.slice((page-1)*PER, page*PER);

  const canAdvanceCase = canManageCaseWorkflow(user);
  const canDeleteCase = user.role === "Master Admin";

  const updateStatus = (id, status) => {
    const vs = DB.get("violations",[]);
    const idx = vs.findIndex(v=>v.id===id);
    if (idx >= 0) {
      const nextStatus = caseStatusValue(status);
      if (["Closed","Closure Requested"].includes(nextStatus)) {
        toast("Use the closure submit/accept workflow for closure actions", "error");
        return;
      }
      vs[idx].status = nextStatus;
      vs[idx].auditLog = vs[idx].auditLog || [];
      vs[idx].auditLog.push({ action:`Status changed to ${caseStatusLabel(nextStatus)}`, by:user.name, at:Date.now() });
      DB.set("violations", vs);
      syncComplianceScores(DB.get("users",[]), vs);
      setViolations([...vs]);
      toast(`Case ${id} status updated to ${caseStatusLabel(nextStatus)}`, "success");
    }
  };

  const handleClosureAction = (id, action) => {
    try {
      const result = applyCaseClosureAction(id, action, user);
      setViolations([...result.violations]);
      if (action === "submit") toast(`Case ${id} submitted for closure`, "success");
      if (action === "accept") {
        toast(`Closure accepted for case ${id}`, "success");
        notifyCaseEvent("Closed", result.violation);
      }
      if (action === "reject") toast(`Closure rejected for case ${id}`, "success");
    } catch (err) {
      toast(err.message || "Unable to update closure", "error");
    }
  };

  const deleteCase = (id) => {
    if (!canDeleteCase) { toast("Only Master Admin can delete cases", "error"); return; }
    if (!window.confirm(`Permanently delete case ${id}? This cannot be undone.`)) return;
    const vs = DB.get("violations",[]);
    const target = vs.find(v=>v.id===id);
    const next = vs.filter(v=>v.id!==id);
    DB.set("violations", next);
    DB.set("warnings", DB.get("warnings",[]).filter(w=>w.caseId!==id));
    syncComplianceScores(DB.get("users",[]), next);
    setViolations([...next]);
    const logs = DB.get("auditLogs", []);
    logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"CASE_DELETED", entity:id, detail:`Deleted case for ${target?.empName || "unknown employee"}`, ip:"local" });
    DB.set("auditLogs", logs);
    toast(`Case ${id} deleted`, "success");
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["Case ID","Date","Employee","Emp Code","Dept","Category","Severity","Status","HOD","Investigation Due Date","Repeat","Risk Score"]];
    filtered.forEach(v=>rows.push([v.id,v.date,v.empName,v.empCode,v.dept,v.category,v.severity,v.status,v.assignedHOD||"",v.dueDate||"",v.repeatViolation?"Yes":"No",v.riskScore]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Cases");
    XLSX.writeFile(wb, "PVMS_Cases_Export.xlsx");
    toast("Excel export ready", "success");
  };

  return (
    <div>
      <PageHeader title="All Cases" sub={`${violations.length} total violations  ${violations.filter(v=>!["Closed","Rejected","Archived"].includes(caseStatusValue(v.status))).length} open`}
        actions={
          <>
            <Btn size="sm" icon={<Icon name="download" size={14}/>} onClick={exportExcel}>Export Excel</Btn>
            <Btn variant="primary" size="sm" onClick={()=>setPage("newcase")} icon={<Icon name="plus" size={14} color="#fff"/>}>New Case</Btn>
          </>
        }
      />

      <Tabs tabs={tabs} active={filterTab} onChange={t=>{setFilterTab(t);setPageNum(1)}}/>

      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:14}}>
        <SearchBar value={search} onChange={v=>{setSearch(v);setPageNum(1)}} placeholder="Search case ID, employee, category"/>
        <Select value={filterDept} onChange={v=>{setFilterDept(v);setPageNum(1)}} options={activeMasterOptions("masterDepts", DEPARTMENTS)} placeholder="All Departments" style={{flex:"none",width:"auto"}}/>
        <Select value={filterSev} onChange={v=>{setFilterSev(v);setPageNum(1)}} options={["Minor","Moderate","Major","Critical"]} placeholder="All Severity" style={{flex:"none",width:"auto"}}/>
        {(search||filterDept||filterSev) && <Btn size="sm" ghost onClick={()=>{setSearch("");setFilterDept("");setFilterSev("");}}>Clear</Btn>}
        <span style={{fontSize:12,color:"var(--text3)",marginLeft:"auto"}}>{filtered.length} results</span>
      </div>

      <Card>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["Case ID","Date","Employee","Dept","Category","Severity","Repeat","Status","Investigation Due Date","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {paged.length === 0 && (
                <tr><td colSpan={10}><EmptyState icon="inbox" title="No cases found" sub="Try changing your search or filters"/></td></tr>
              )}
              {paged.map(v=>{
                const statusForDisplay = effectiveCaseStatus(v);
                return (
                  <tr key={v.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--blue)",fontWeight:500,whiteSpace:"nowrap"}}>{v.id}</td>
                    <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{v.date}</td>
                    <td style={{padding:"9px 12px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><Avatar name={v.empName}/><div><div style={{fontSize:12.5,fontWeight:500}}>{v.empName}</div><div style={{fontSize:10,color:"var(--text3)"}}>{v.empCode}</div></div></div></td>
                    <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{v.dept}</td>
                    <td style={{padding:"9px 12px"}}><span style={{fontSize:11,background:"var(--bg2)",color:"var(--text2)",padding:"2px 6px",borderRadius:4,border:"1px solid var(--line)",whiteSpace:"nowrap"}}>{v.category}</span></td>
                    <td style={{padding:"9px 12px"}}><Badge severity={v.severity}/></td>
                    <td style={{padding:"9px 12px",textAlign:"center"}}>{v.repeatViolation&&<span style={{fontSize:11,background:"var(--red-bg)",color:"var(--red)",padding:"2px 6px",borderRadius:4,fontWeight:500}}> Repeat</span>}</td>
                    <td style={{padding:"9px 12px"}}><Badge status={statusForDisplay}/></td>
                    <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:statusForDisplay==="Overdue"?"var(--red)":"var(--text3)",whiteSpace:"nowrap"}}>{v.dueDate||""}</td>
                    <td style={{padding:"9px 12px"}}>
                      <div style={{display:"flex",gap:4,flexWrap:"nowrap"}}>
                        {canAdvanceCase && caseStatusValue(v.status)==="Open" && <Btn size="sm" variant="success" onClick={()=>updateStatus(v.id,"Under Investigation")}>Investigate</Btn>}
                        {canRequestClosureForCase(user, v) && <Btn size="sm" variant="success" onClick={()=>handleClosureAction(v.id,"submit")}>Submit for Closure</Btn>}
                        {canApproveCaseClosure(user) && isClosureRequested(v) && <Btn size="sm" variant="success" onClick={()=>handleClosureAction(v.id,"accept")}>Accept</Btn>}
                        {canApproveCaseClosure(user) && isClosureRequested(v) && <Btn size="sm" variant="danger" onClick={()=>handleClosureAction(v.id,"reject")}>Reject</Btn>}
                        <Btn size="sm" ghost onClick={()=>{setEditId(v.id);setPage("viewcase")}}>View</Btn>
                        {canDeleteCase && <Btn size="sm" variant="danger" onClick={()=>deleteCase(v.id)} icon={<Icon name="trash" size={12}/>}>Delete</Btn>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <Pagination total={filtered.length} page={page} perPage={PER} onChange={setPageNum}/>
      </Card>
    </div>
  );
}
