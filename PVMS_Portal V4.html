              <Btn size="sm" icon={<Icon name="copy" size={14}/>} onClick={() => copyUrl(preview.secureUrl)}>Copy URL</Btn>
              <Btn size="sm" icon={<Icon name="download" size={14}/>} onClick={() => window.open(preview.secureUrl, "_blank")}>Download</Btn>
              <Btn size="sm" icon={<Icon name="edit" size={14}/>} onClick={() => { setRenameId(String(preview._id)); setRenameVal(preview.fileName); }}>Rename</Btn>
              <Btn size="sm" variant="danger" icon={<Icon name="trash" size={14}/>} onClick={async () => {
                if (!window.confirm("Delete this file?")) return;
                try {
                  await mediaApi("/" + preview._id, { method: "DELETE" });
                  toast("Deleted", "success");
                  setPreview(null);
                  loadMedia();
                } catch (e) { toast(e.message, "error"); }
              }}>Delete</Btn>
            </div>
          </div>
        </div>
      )}

      {renameId && (
        <div style={{position:"fixed",inset:0,background:"rgba(13,27,42,.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={() => setRenameId(null)}>
          <div style={{background:"var(--bg3)",padding:24,borderRadius:"var(--r2)",width:360}} onClick={e => e.stopPropagation()}>
            <div style={{fontWeight:600,marginBottom:12}}>Rename file</div>
            <Input value={renameVal} onChange={setRenameVal}/>
            <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
              <Btn size="sm" onClick={() => setRenameId(null)}>Cancel</Btn>
              <Btn size="sm" variant="primary" onClick={saveRename}>Save</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const resetParams = new URLSearchParams(typeof window !== "undefined" ? window.location.search : "");
  const [dbLoaded, setDbLoaded] = useState(false);
  const [user, setUser] = useState(() => DB.get("currentUser", null));
  const [page, setPage] = useState("dashboard");
  const [editId, setEditId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [resetToken, setResetToken] = useState(() => resetParams.get("resetToken") || "");
  const [resetEmail, setResetEmail] = useState(() => resetParams.get("email") || "");

  useEffect(() => {
    syncStateFromServer().then(() => {
      DB.enableServerSync();
      seedIfEmpty();
      removeLegacyDummyEntries();
      reconcileWarningLetters();
      syncComplianceScores();
      setNotifications(DB.get("notifications",[]) || []);
      // Re-read user from localStorage after sync in case user data was updated
      const syncedUser = DB.get("currentUser", null);
      if (syncedUser) setUser(syncedUser);
      setDbLoaded(true);
    }).catch(err => {
      console.error("Failed to sync from DB", err);
      DB.disableServerSync();
      seedIfEmpty();
      removeLegacyDummyEntries();
      reconcileWarningLetters();
      syncComplianceScores();
      setNotifications(DB.get("notifications",[]) || []);
      setDbLoaded(true);
    });

    cacheLogoForPdf(LOGO_SRC);
    cacheWhiteLogoForPdf(LOGO_WHITE_SRC);
  }, []);

  useEffect(() => {
    const syncNotifications = (event) => {
      setNotifications(event.detail || DB.get("notifications",[]) || []);
    };
    window.addEventListener("pvms-notifications-updated", syncNotifications);
    return () => window.removeEventListener("pvms-notifications-updated", syncNotifications);
  }, []);

  const toast = useCallback((text, type="info") => {
    const id = Date.now();
    setToasts(t=>[...t, {id, text, type}]);
    setTimeout(() => setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  }, []);

  const dismissToast = (id) => setToasts(t=>t.filter(x=>x.id!==id));

  const handleSetPage = useCallback((p) => {
    if (p !== "viewcase" && p !== "newcase") setEditId(null);
    setPage(p);
    window.scrollTo(0,0);
  }, []);

  const handleLogout = () => {
    if (window.confirm("Sign out of PVMS?")) { setUser(null); DB.set("currentUser", null); }
  };

  const clearResetLink = useCallback(() => {
    if (typeof window !== "undefined" && window.history?.replaceState) {
      const url = new URL(window.location.href);
      url.searchParams.delete("resetToken");
      url.searchParams.delete("email");
      window.history.replaceState({}, "", `${url.pathname}${url.search}${url.hash}`);
    }
    setResetToken("");
    setResetEmail("");
    setUser(null);
  }, []);

  if (!dbLoaded) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner dark"></div></div>;

  if (resetToken) return (
    <>
      <LoginPage onLogin={setUser} resetToken={resetToken} resetEmail={resetEmail} onResetComplete={clearResetLink}/>
      <ToastContainer toasts={toasts} dismiss={dismissToast}/>
    </>
  );

  if (!user) return (
    <>
      <LoginPage onLogin={setUser}/>
      <ToastContainer toasts={toasts} dismiss={dismissToast}/>
    </>
  );

  const pageProps = { user, toast, setPage:handleSetPage, setEditId, editId };

  const pageMap = {
    dashboard: <DashboardPage {...pageProps}/>,
    cases:     <CasesPage {...pageProps}/>,
    newcase:   <CaseFormPage {...pageProps}/>,
    viewcase:  <ViewCasePage {...pageProps}/>,
    investigation: <InvestigationPage {...pageProps}/>,
    disciplinary:  <DisciplinaryPage {...pageProps}/>,
    warning:       <WarningLettersPage {...pageProps}/>,
    reports:       <ReportsPage {...pageProps}/>,
    employees:     <EmployeesPage {...pageProps}/>,
    masters:       <MasterDataPage {...pageProps}/>,
    email:         <EmailIntegrationPage {...pageProps}/>,
    audit:         <AuditTrailPage {...pageProps}/>,
    users:         <UsersPage {...pageProps}/>,
    medialibrary:  <MediaLibraryPage {...pageProps}/>,
  };

  return (
    <>
      <div className="portal" style={{display:"flex",height:"100vh",overflow:"hidden",background:"#F9FAFB"}}>
        <Sidebar active={page} setPage={handleSetPage} user={user} notifCount={notifications.filter(n=>!n.read).length}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          <Topbar page={page} user={user} notifications={notifications} setPage={handleSetPage} setEditId={setEditId} onLogout={handleLogout} onNotificationsChange={setNotifications}/>
          <div style={{flex:1,overflowY:"auto",padding:"22px 24px",background:"#F9FAFB"}}>
            {pageMap[page] || pageMap.dashboard}
          </div>
        </div>
      </div>
      <ToastContainer toasts={toasts} dismiss={dismissToast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
