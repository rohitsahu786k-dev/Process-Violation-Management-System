function CaseFormPage({ user, toast, setPage, editId }) {
  const isEdit = !!editId;
  const existing = isEdit ? DB.get("violations",[]).find(v=>v.id===editId) : null;

  const [form, setForm] = useState({
    date: new Date().toISOString().slice(0,10),
    dept: "", empName:"", empCode:"", designation:"",
    productGroups:[], category:"", severity:"Minor",
    description:"", sopViolated:"", rootCause:"",
    immediateAction:"", cctvRef:"", witnesses:"",
    riskScore:"", repeatViolation:false,
    assignedInvestigator:"", assignedHOD:"",
    dueDate:"", notes:"",
    ...(existing||{}),
  });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [repeatAlert, setRepeatAlert] = useState(null);
  const [evidence, setEvidence] = useState(existing?.evidence || []);
  const [uploadingEvidence, setUploadingEvidence] = useState(false);
  const evidenceRef = useRef(null);
  const [fiveWhy, setFiveWhy] = useState(existing?.fiveWhy?.length ? existing.fiveWhy : ["","","","",""]);
  const [newCapa, setNewCapa] = useState({type:"Corrective",description:"",ownerId:"",owner:"",ownerEmail:"",dueDate:"",status:"Open"});
  const [showCapaForm, setShowCapaForm] = useState(false);
  const [investigatorRemarks, setInvestigatorRemarks] = useState(existing?.investigatorRemarks || "");

  const users = DB.get("users",[]);
  const activeMasters = (key, fallback) => (DB.get(key) || fallback.map((name,i)=>({id:key+i,name,active:true}))).filter(x=>x.active!==false).map(x=>x.name);
  const activeDepts = activeMasters("masterDepts", DEPARTMENTS);
  const activeCats = activeMasters("masterCats", VIOLATION_CATEGORIES);
  const activeRCs = activeMasters("masterRCs", ROOT_CAUSE_CATEGORIES);
  const hods = users.filter(u=>(u.role==="HOD"||u.role==="Master Admin") && u.active !== false);
  const employees = users
    .filter(isCaseEmployeeUser)
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const canManageCaseStatus = isEdit && canManageCaseWorkflow(user);
  const canEditRcaCapa = isEdit && ["Master Admin","HOD","Management"].includes(user.role);
  const registeredUsers = activeRegisteredUsers(users);
  const registeredUserOptions = registeredUsers.map(u => ({ value:u.id, label:registeredUserOptionLabel(u) }));
  const availableCapaStatuses = capaStatusOptionsForUser(user);

  const set = (k, v) => setForm(f=>({...f,[k]:v}));

  const checkRepeat = (empId) => {
    const violations = DB.get("violations",[]);
    const prev = violations.filter(v=>v.empId===empId);
    if (prev.length > 0) {
      setRepeatAlert({ count:prev.length, last:prev[prev.length-1] });
      set("repeatViolation", true);
    } else {
      setRepeatAlert(null);
      set("repeatViolation", false);
    }
  };

  const selectEmployee = (empId) => {
    if (empId === "other") {
      setRepeatAlert(null);
      setForm(f=>({...f, empId:"other", empName:"", empCode:"", designation:"", repeatViolation:false}));
      return;
    }
    if (!empId) {
      setRepeatAlert(null);
      setForm(f=>({...f, empId:"", empName:"", empCode:"", designation:""}));
      return;
    }
    const emp = users.find(u=>u.id===empId);
    if (emp) {
      set("empId", emp.id); set("empName", emp.name); set("empCode", emp.empCode);
      set("designation", emp.designation); set("dept", emp.dept);
      const hod = hods.find(h=>h.dept===emp.dept);
      if (hod) set("assignedHOD", hod.name);
      checkRepeat(emp.id);
    }
  };

  const validate = () => {
    const e = {};
    if (!form.date) e.date = "Required";
    if (!form.dept) e.dept = "Required";
    if (!form.empName) e.empName = "Required";
    if (!form.category) e.category = "Required";
    if (!form.severity) e.severity = "Required";
    if (!form.description || form.description.length < 10) e.description = "Please provide a detailed description (min 10 chars)";
    if (!form.rootCause) e.rootCause = "Required";
    const risk = Number(form.riskScore);
    if (!form.riskScore) e.riskScore = "Required";
    else if (!Number.isInteger(risk) || risk < 1 || risk > 10) e.riskScore = "Enter a whole number from 1 to 10";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (isDraft) => {
    if (!isDraft && !validate()) { toast("Please fill all required fields", "error"); return; }
    setSaving(true);
    setTimeout(() => {
      const violations = DB.get("violations",[]);
      const cleanForm = { ...form, riskScore: form.riskScore ? Number(form.riskScore) : "", ...(isEdit ? { fiveWhy, investigatorRemarks } : {}) };
      if (isEdit) {
        const idx = violations.findIndex(v=>v.id===editId);
        violations[idx] = { ...violations[idx], ...cleanForm, evidence, updatedBy:user.name, updatedAt:Date.now() };
        DB.set("violations", violations);
        syncComplianceScores(DB.get("users",[]), violations);
        toast(`Case ${editId} updated`, "success");
      } else {
        const caseNo = DB.nextSeq("VMS");
        const id = `VMS-${new Date().getFullYear()}-${String(caseNo).padStart(4,"0")}`;
        const newCase = { id, caseNo, ...cleanForm, evidence,
          status: isDraft ? "Draft" : "Open",
          createdBy: user.id, createdAt: Date.now(),
          capaActions:[], fiveWhy:[], auditLog:[{action:"Case Created",by:user.name,at:Date.now()}]
        };
        violations.push(newCase);
        DB.set("violations", violations);
        syncComplianceScores(DB.get("users",[]), violations);
        toast(isDraft ? "Draft saved" : `Case ${id} submitted for review`, "success");
        if (!isDraft) {
          notifyCaseEvent("Registered", newCase);
        }
      }
      setSaving(false);
      setPage("cases");
    }, 600);
  };

  const changeEditStatus = (status) => {
    if (!canManageCaseStatus) return;
    const normalized = caseStatusValue(status);
    if (["Closed","Closure Requested"].includes(normalized)) {
      toast("Use the closure submit/accept workflow for closure actions", "error");
      return;
    }
    const violations = DB.get("violations",[]);
    const idx = violations.findIndex(v=>v.id===editId);
    if (idx < 0) { toast("Case not found", "error"); return; }
    const auditLog = [...(violations[idx].auditLog || []), { action:`Status changed to ${caseStatusLabel(normalized)}`, by:user.name, at:Date.now() }];
    violations[idx] = { ...violations[idx], status: normalized, auditLog, updatedBy:user.name, updatedAt:Date.now() };
    DB.set("violations", violations);
    syncComplianceScores(DB.get("users",[]), violations);
    setForm(f=>({...f,status:normalized,auditLog}));
    toast(`Case status changed to ${caseStatusLabel(normalized)}`, "success");
  };

  const handleEditClosureAction = (action) => {
    try {
      const result = applyCaseClosureAction(editId, action, user);
      const updated = result.violation;
      setForm(f=>({...f,...updated}));
      if (action === "submit") toast(`Case ${editId} submitted for closure`, "success");
      if (action === "accept") {
        toast(`Closure accepted for case ${editId}`, "success");
        notifyCaseEvent("Closed", updated);
      }
      if (action === "reject") toast(`Closure rejected for case ${editId}`, "success");
    } catch (err) {
      toast(err.message || "Unable to update closure", "error");
    }
  };

  const persistEditCaseUpdates = (updates, successMessage) => {
    if (!isEdit) return;
    const violations = DB.get("violations",[]);
    const idx = violations.findIndex(v=>v.id===editId);
    if (idx < 0) { toast("Case not found", "error"); return; }
    const next = { ...violations[idx], ...updates, updatedBy:user.name, updatedAt:Date.now() };
    violations[idx] = next;
    DB.set("violations", violations);
    syncComplianceScores(DB.get("users",[]), violations);
    setForm(f=>({...f,...updates}));
    if (successMessage) toast(successMessage, "success");
  };

  const saveEditFiveWhy = () => {
    persistEditCaseUpdates({fiveWhy, investigatorRemarks}, "5-Why analysis saved");
  };

  const selectEditCapaOwner = (ownerId) => {
    const owner = registeredUsers.find(u => u.id === ownerId);
    setNewCapa(f => ({
      ...f,
      ownerId,
      owner: owner?.name || "",
      ownerEmail: owner?.email || ""
    }));
  };

  const formatEditCapaOwner = (ca) => {
    const owner = users.find(u => u.id === ca.ownerId) || users.find(u => u.name === ca.owner);
    return owner ? registeredUserOptionLabel(owner) : (ca.owner || "Unassigned");
  };

  const addEditCapa = () => {
    if (!newCapa.description) { toast("Please describe the CAPA action","error"); return; }
    if (!hasCapaOwner(newCapa)) { toast("Please assign the CAPA action owner","error"); return; }
    if (!newCapa.dueDate) { toast("Please select the CAPA target due date","error"); return; }
    if (!canSelectCapaStatus(user, newCapa.status)) { toast("Only Master Admin can select Completed or Verified CAPA status","error"); return; }
    const action = {...newCapa, id:"ca"+Date.now()};
    const updated = [...(form.capaActions||[]), action];
    const shouldAdvanceStatus = !["CAPA Pending","Verification Pending","Closure Requested","Closed"].includes(caseStatusValue(form.status));
    persistEditCaseUpdates({
      capaActions:updated,
      ...(shouldAdvanceStatus ? {
        status:"CAPA Pending",
        auditLog:[...(form.auditLog||[]), { action:"CAPA initiated", by:user.name, at:Date.now() }]
      } : {})
    }, "CAPA action added");
    setNewCapa({type:"Corrective",description:"",ownerId:"",owner:"",ownerEmail:"",dueDate:"",status:"Open"});
    setShowCapaForm(false);
  };

  const changeEditCapaStatus = (index, status) => {
    if (!canSelectCapaStatus(user, status)) { toast("Only Master Admin can select Completed or Verified CAPA status","error"); return; }
    const updated = [...(form.capaActions||[])];
    updated[index] = {...updated[index],status};
    persistEditCaseUpdates({capaActions:updated}, "CAPA status updated");
  };

  const changeEditCapaOwner = (index, ownerId) => {
    const owner = registeredUsers.find(u => u.id === ownerId);
    const updated = [...(form.capaActions || [])];
    updated[index] = {
      ...updated[index],
      ownerId,
      owner: owner?.name || "",
      ownerEmail: owner?.email || ""
    };
    persistEditCaseUpdates({capaActions:updated}, "CAPA owner updated");
  };

  const changeEditCapaDueDate = (index, dueDate) => {
    const updated = [...(form.capaActions || [])];
    updated[index] = {...updated[index], dueDate};
    persistEditCaseUpdates({capaActions:updated}, "CAPA target date updated");
  };

  const toggleProductGroup = (g) => {
    const cur = form.productGroups || [];
    set("productGroups", cur.includes(g) ? cur.filter(x=>x!==g) : [...cur, g]);
  };

  return (
    <div>
      <PageHeader title={isEdit?"Edit Case":"Register New Violation"} sub={isEdit?`Editing ${editId}`:"Fields marked * are mandatory  Case ID auto-generated on submission"}
        actions={
          <>
            {canManageCaseStatus && (
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",maxWidth:680}}>
                {CASE_STATUS_OPTIONS.map(s=>(
                  <Btn key={s.value} size="sm" variant={caseStatusValue(form.status)===s.value?"primary":s.value==="Closed"?"success":s.value==="Overdue"?"danger":"default"}
                    onClick={()=>changeEditStatus(s.value)}
                  >{s.label}</Btn>
                ))}
              </div>
            )}
            {isEdit && canRequestClosureForCase(user, form) && <Btn size="sm" variant="success" onClick={()=>handleEditClosureAction("submit")}>Submit for Closure</Btn>}
            {isEdit && canApproveCaseClosure(user) && isClosureRequested(form) && <Btn size="sm" variant="success" onClick={()=>handleEditClosureAction("accept")}>Accept Closure</Btn>}
            {isEdit && canApproveCaseClosure(user) && isClosureRequested(form) && <Btn size="sm" variant="danger" onClick={()=>handleEditClosureAction("reject")}>Reject Closure</Btn>}
            <Btn size="sm" onClick={()=>setPage("cases")}>Cancel</Btn>
            {!isEdit && <Btn size="sm" onClick={()=>submit(true)} loading={saving}>Save Draft</Btn>}
            <Btn variant="primary" size="sm" onClick={()=>submit(false)} loading={saving}>{isEdit?"Save Changes":"Submit for Approval"}</Btn>
          </>
        }
      />

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
        {/* LEFT */}
        <div>
          <Card style={{marginBottom:16}}>
            <CardHeader title="Case Information" actions={!isEdit&&<span style={{fontSize:11,fontFamily:"var(--mono)",color:"var(--text3)",background:"var(--bg2)",padding:"2px 8px",borderRadius:4}}>ID: Auto-generated</span>}/>
            <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FormGroup label="Date of Incident" required error={errors.date}>
                <Input type="date" value={form.date} onChange={v=>set("date",v)}/>
              </FormGroup>
              <FormGroup label="Department" required error={errors.dept}>
                <Select value={form.dept} onChange={v=>set("dept",v)} options={activeDepts} placeholder="Select department"/>
              </FormGroup>
              <FormGroup label="Employee Name" required error={errors.empName}>
                <Select value={form.empId||""} onChange={selectEmployee} options={[...employees.map(e=>({value:e.id,label:employeeOptionLabel(e)})),{value:"other",label:"Other / External"}]} placeholder="Search employee"/>
                {form.empId === "other" && (
                  <Input value={form.empName} onChange={v=>set("empName",v)} placeholder="Enter external employee name" style={{marginTop:8}}/>
                )}
              </FormGroup>
              <FormGroup label="Employee Code">
                <Input value={form.empCode} onChange={v=>set("empCode",v)} placeholder="Auto-filled on selection"/>
              </FormGroup>
              <FormGroup label="Designation">
                <Input value={form.designation} onChange={v=>set("designation",v)} placeholder="Auto-filled on selection"/>
              </FormGroup>
              <FormGroup label="Product Group(s)">
                <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"6px 0"}}>
                  {PRODUCT_GROUPS.map(g=>{
                    const sel = (form.productGroups||[]).includes(g);
                    return <button key={g} onClick={()=>toggleProductGroup(g)} style={{padding:"3px 10px",borderRadius:10,border:`1px solid ${sel?"var(--blue)":"var(--line)"}`,background:sel?"var(--blue-l)":"var(--bg)",color:sel?"var(--blue)":"var(--text3)",fontSize:11,fontWeight:500,cursor:"pointer",transition:"all .15s"}}>{g}</button>;
                  })}
                </div>
              </FormGroup>
            </div>
          </Card>

          <Card style={{marginBottom:16}}>
            <CardHeader title="Violation Details"/>
            <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FormGroup label="Violation Category" required error={errors.category}>
                <Select value={form.category} onChange={v=>set("category",v)} options={activeCats} placeholder="Select category"/>
              </FormGroup>
              <FormGroup label="SOP / Policy Violated">
                <Input value={form.sopViolated} onChange={v=>set("sopViolated",v)} placeholder="e.g. SOP-QMS-007 Clause 4.2"/>
              </FormGroup>
              <div style={{gridColumn:"1/-1"}}>
                <FormGroup label="Incident Description" required error={errors.description}>
                  <Textarea value={form.description} onChange={v=>set("description",v)} placeholder="Describe the process compliance violation in detail" rows={4}/>
                </FormGroup>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <FormGroup label="Severity Level" required error={errors.severity}>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",paddingTop:4}}>
                    {["Minor","Moderate","Major","Critical"].map(s=>{
                      const cfg = SEVERITY_CONFIG[s];
                      const sel = form.severity===s;
                      return <button key={s} onClick={()=>set("severity",s)} style={{padding:"5px 16px",borderRadius:10,border:`1px solid ${sel?cfg.bd:vars("--line")}`,background:sel?cfg.bg:"var(--bg)",color:sel?cfg.color:"var(--text3)",fontWeight:sel?600:400,fontSize:12,cursor:"pointer",transition:"all .15s"}}>{s}</button>;
                    })}
                  </div>
                  {form.severity && <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>Score deduction: <strong style={{color:SEVERITY_CONFIG[form.severity].color}}>{SEVERITY_CONFIG[form.severity].score} pts</strong></div>}
                </FormGroup>
              </div>
              <FormGroup label="Root Cause Category" required error={errors.rootCause}>
                <Select value={form.rootCause} onChange={v=>set("rootCause",v)} options={activeRCs} placeholder="Select root cause"/>
              </FormGroup>
              <FormGroup label="Risk Score (1-10)" required error={errors.riskScore}>
                <Input type="number" value={form.riskScore} onChange={v=>set("riskScore",v)} min="1" max="10" placeholder="1 lowest, 10 highest"/>
              </FormGroup>
              <FormGroup label="Immediate Action Taken">
                <Textarea value={form.immediateAction} onChange={v=>set("immediateAction",v)} placeholder="Describe action taken immediately after incident" rows={2}/>
              </FormGroup>
              <FormGroup label="CCTV Reference">
                <Input value={form.cctvRef} onChange={v=>set("cctvRef",v)} placeholder="Camera ID / Timestamp (if applicable)"/>
              </FormGroup>
              <FormGroup label="Witness Details">
                <Input value={form.witnesses} onChange={v=>set("witnesses",v)} placeholder="Name and designation of witness(es)"/>
              </FormGroup>
              <FormGroup label="Additional Notes">
                <Textarea value={form.notes} onChange={v=>set("notes",v)} placeholder="Any additional context" rows={2}/>
              </FormGroup>
            </div>
          </Card>

          {canEditRcaCapa && (
            <>
              <Card style={{marginBottom:16}}>
                <CardHeader title="5-Why Root Cause Analysis"
                  actions={<Btn size="sm" variant="primary" onClick={saveEditFiveWhy}>Save</Btn>}
                />
                <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
                  {fiveWhy.map((w,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:"var(--blue-l)",color:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:5}}>W{i+1}</div>
                      <Textarea value={w} onChange={v=>{const n=[...fiveWhy];n[i]=v;setFiveWhy(n)}} placeholder={`Why ${i+1}: ${["Why did the violation occur?","Why was the SOP not followed?","Why was awareness/training insufficient?","Why was this not caught by the system?","Why does the root gap exist?"][i]}`} rows={1} autoResize/>
                    </div>
                  ))}
                  <FormGroup label="Investigator Remarks / Final Root Cause">
                    <Textarea value={investigatorRemarks} onChange={setInvestigatorRemarks} placeholder="Final determination of root cause and investigator's summary" rows={3} autoResize/>
                  </FormGroup>
                </div>
              </Card>

              <Card style={{marginBottom:16}}>
                <CardHeader title="CAPA Actions"
                  actions={<Btn size="sm" variant="primary" onClick={()=>setShowCapaForm(!showCapaForm)}>+ Add Action</Btn>}
                />
                {showCapaForm && (
                  <div style={{padding:14,borderBottom:"1px solid var(--line)",background:"var(--bg)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <FormGroup label="Type"><Select value={newCapa.type} onChange={v=>setNewCapa(f=>({...f,type:v}))} options={["Corrective","Preventive","System","HR Action"]} placeholder="Select type"/></FormGroup>
                      <FormGroup label="Owner" required><Select value={newCapa.ownerId || ""} onChange={selectEditCapaOwner} options={registeredUserOptions} placeholder="Assign to"/></FormGroup>
                      <div style={{gridColumn:"1/-1"}}><FormGroup label="Description" required><Textarea value={newCapa.description} onChange={v=>setNewCapa(f=>({...f,description:v}))} placeholder="Describe the corrective/preventive action" rows={2}/></FormGroup></div>
                      <FormGroup label="Target Due Date" required><Input type="date" value={newCapa.dueDate} onChange={v=>setNewCapa(f=>({...f,dueDate:v}))}/></FormGroup>
                      <FormGroup label="Status"><Select value={newCapa.status} onChange={v=>setNewCapa(f=>({...f,status:v}))} options={availableCapaStatuses}/></FormGroup>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"flex-end"}}>
                      <Btn size="sm" onClick={()=>setShowCapaForm(false)}>Cancel</Btn>
                      <Btn size="sm" variant="primary" onClick={addEditCapa}>Add Action</Btn>
                    </div>
                  </div>
                )}
                <div style={{padding:form.capaActions?.length?0:14}}>
                  {!form.capaActions?.length && <EmptyState icon="inbox" title="No CAPA actions yet" sub="Add corrective and preventive actions"/>}
                  {form.capaActions?.map((ca,i)=>(
                    <div key={ca.id} style={{padding:"12px 16px",borderBottom:i<form.capaActions.length-1?"1px solid var(--line)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,fontWeight:600,background:"var(--bg2)",color:"var(--text2)",padding:"2px 7px",borderRadius:4}}>{ca.type}</span>
                            <span style={{fontSize:11,color:capaStatusColor(ca.status, user),fontWeight:500}}>{visibleCapaStatus(ca.status, user)}</span>
                          </div>
                          <div style={{fontSize:13,color:"var(--text)",marginBottom:4,lineHeight:1.5,overflowWrap:"anywhere"}}>{ca.description}</div>
                          <div style={{display:"grid",gridTemplateColumns:"minmax(180px,1fr) minmax(140px,160px)",gap:8,marginTop:8,maxWidth:520}}>
                            <FormGroup label="Owner">
                              <Select value={ca.ownerId || ""} onChange={v=>changeEditCapaOwner(i,v)} options={registeredUserOptions} placeholder="Assign to"/>
                            </FormGroup>
                            <FormGroup label="Target Due Date">
                              <Input type="date" value={ca.dueDate || ""} onChange={v=>changeEditCapaDueDate(i,v)}/>
                            </FormGroup>
                          </div>
                        </div>
                        {canSelectCapaStatus(user, ca.status) && <Select value={ca.status} onChange={v=>changeEditCapaStatus(i,v)} options={availableCapaStatuses} style={{width:130,flexShrink:0}}/>}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            </>
          )}
        </div>

        {/* RIGHT */}
        <div>
          {/* Repeat Alert */}
          {repeatAlert && (
            <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-bd)",borderRadius:"var(--r2)",padding:"12px 14px",marginBottom:14,fontSize:12,color:"var(--amber)"}}>
              <div style={{fontWeight:600,marginBottom:4}}> Repeat Violation Alert</div>
              <div>{form.empName} has <strong>{repeatAlert.count}</strong> prior violation(s) on record.</div>
              <div style={{marginTop:4,fontSize:11,color:"var(--amber)"}}>Last: {repeatAlert.last.id}  {repeatAlert.last.severity}  {repeatAlert.last.date}</div>
              <div style={{marginTop:6,fontWeight:600,fontSize:11,color:"var(--red)"}}>Suggested action: {getDisciplinaryMatrix()[form.severity]?.[Math.min(repeatAlert.count,3)]||"Escalate"}</div>
            </div>
          )}

          <Card style={{marginBottom:14}}>
            <CardHeader title="Repeat Violation"/>
            <div style={{padding:14}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
                <input type="checkbox" checked={form.repeatViolation} onChange={e=>set("repeatViolation",e.target.checked)} style={{width:15,height:15}}/>
                Mark as repeat violation
              </label>
            </div>
          </Card>

          <Card style={{marginBottom:14}}>
            <CardHeader title="Assignment"/>
            <div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
              <FormGroup label="Assigned HOD">
                <Select value={form.assignedHOD} onChange={v=>set("assignedHOD",v)} options={hods.map(h=>h.name)} placeholder="Auto-assign by dept"/>
              </FormGroup>
              <FormGroup label="Assigned Investigator">
                <Select value={form.assignedInvestigator} onChange={v=>set("assignedInvestigator",v)} options={hods.map(h=>h.name)} placeholder="Select investigator"/>
              </FormGroup>
              <FormGroup label="Investigation Due Date">
                <Input type="date" value={form.dueDate} onChange={v=>set("dueDate",v)}/>
              </FormGroup>
            </div>
          </Card>

          <Card style={{marginBottom:14}}>
            <CardHeader title="Evidence Upload"/>
            <div style={{padding:14}}>
              <input ref={evidenceRef} type="file" multiple accept="image/*,video/*,.pdf" style={{display:"none"}}
                onChange={async e => {
                  const files = e.target.files;
                  if (!files?.length) return;
                  setUploadingEvidence(true);
                  const fd = new FormData();
                  Array.from(files).forEach(f => fd.append("files", f));
                  fd.append("uploadedBy", user.name);
                  fd.append("folder", "pvms/reports");
                  fd.append("tags", JSON.stringify(["pvms","evidence","case"]));
                  try {
                    const res = await fetch("/api/media/upload", { method:"POST", body: fd });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "Upload failed");
                    const uploaded = (data.uploaded || []).map(u => ({ id: u._id || u.id, name: u.fileName, url: u.secureUrl, type: u.fileType }));
                    setEvidence(ev => [...ev, ...uploaded]);
                    toast(`Uploaded ${uploaded.length} file(s)`, "success");
                  } catch (err) { toast(err.message, "error"); }
                  finally { setUploadingEvidence(false); e.target.value = ""; }
                }}/>
              <div style={{border:"1.5px dashed var(--line2)",borderRadius:"var(--r2)",padding:18,textAlign:"center",color:"var(--text3)",cursor:uploadingEvidence?"wait":"pointer",opacity:uploadingEvidence?.7:1}}
                onClick={() => !uploadingEvidence && evidenceRef.current?.click()}>
                <div style={{marginBottom:6,display:"flex",justifyContent:"center"}}><Icon name="upload" size={28} color="var(--blue)"/></div>
                <div style={{fontSize:12,fontWeight:500,color:"var(--text2)"}}>{uploadingEvidence ? "Uploading to Cloudinary..." : "Drop files or click to upload"}</div>
                <div style={{fontSize:11,marginTop:2}}>PDF, JPEG, PNG, MP4 — stored in Cloudinary</div>
              </div>
              {evidence.length > 0 && (
                <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
                  {evidence.map((ev, i) => (
                    <div key={ev.id || i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,padding:"6px 8px",background:"var(--bg)",borderRadius:"var(--r)"}}>
                      <Icon name={ev.type === "video" ? "video" : ev.type === "image" ? "image" : "file"} size={14}/>
                      <a href={ev.url} target="_blank" rel="noreferrer" style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--blue)"}}>{ev.name}</a>
                      <button onClick={() => setEvidence(e => e.filter((_, j) => j !== i))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)"}}><Icon name="x" size={14}/></button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </Card>

          <Card>
            <CardHeader title="Workflow"/>
            <div style={{padding:14}}>
              <WorkflowTracker violation={form} isDraftForm={!isEdit && !form.status}/>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}
function vars(v){return v}

// ============================================================
// VIEW CASE PAGE
// ============================================================
function ViewCasePage({ user, toast, setPage, editId }) {
  const [violations, setViolations] = useState(DB.get("violations",[]));
  const violation = violations.find(v=>v.id===editId);

  if (!violation) return <EmptyState icon="folder" title="Case not found" sub="This case may have been removed"/>;

  const [fiveWhy, setFiveWhy] = useState(violation.fiveWhy?.length ? violation.fiveWhy : ["","","","",""]);
  const [newCapa, setNewCapa] = useState({type:"Corrective",description:"",ownerId:"",owner:"",ownerEmail:"",dueDate:"",status:"Open"});
  const [showCapaForm, setShowCapaForm] = useState(false);
  const [investigatorRemarks, setInvestigatorRemarks] = useState(violation.investigatorRemarks||"");
  const [letterPreview, setLetterPreview] = useState(null);
  const [attachmentPreview, setAttachmentPreview] = useState(null);

  const canEdit = ["Master Admin","HOD","Management"].includes(user.role);
  const canManageStatus = canManageCaseWorkflow(user);
  const users = DB.get("users",[]);
  const activeMasters = (key, fallback) => (DB.get(key) || fallback.map((name,i)=>({id:key+i,name,active:true}))).filter(x=>x.active!==false).map(x=>x.name);
  const activeDepts = activeMasters("masterDepts", DEPARTMENTS);
  const activeCats = activeMasters("masterCats", VIOLATION_CATEGORIES);
  const activeRCs = activeMasters("masterRCs", ROOT_CAUSE_CATEGORIES);
  const hods = users.filter(u=>u.role==="HOD"||u.role==="Master Admin");
  const registeredUsers = activeRegisteredUsers(users);
  const registeredUserOptions = registeredUsers.map(u => ({ value:u.id, label:registeredUserOptionLabel(u) }));
  const availableCapaStatuses = capaStatusOptionsForUser(user);
  const caseWarnings = caseWarningRecords(violation);
  const hasWarningLetter = caseWarnings.length > 0 || violation.warningIssued || !!violation.warningLetterId;

  const updateCase = (updates) => {
    const vs = DB.get("violations",[]);
    const idx = vs.findIndex(v=>v.id===editId);
    if (idx>=0) {
      vs[idx] = {...vs[idx],...updates};
      DB.set("violations",vs);
      syncComplianceScores(DB.get("users",[]), vs);
      setViolations([...vs]);
    }
  };

  const saveFiveWhy = () => {
    updateCase({fiveWhy, investigatorRemarks});
    toast("5-Why analysis saved","success");
  };

  const addCapa = () => {
    if (!newCapa.description) { toast("Please describe the CAPA action","error"); return; }
    if (!hasCapaOwner(newCapa)) { toast("Please assign the CAPA action owner","error"); return; }
    if (!newCapa.dueDate) { toast("Please select the CAPA target due date","error"); return; }
    if (!canSelectCapaStatus(user, newCapa.status)) { toast("Only Master Admin can select Completed or Verified CAPA status","error"); return; }
    const action = {...newCapa, id:"ca"+Date.now()};
    const updated = [...(violation.capaActions||[]), action];
    const shouldAdvanceStatus = !["CAPA Pending","Verification Pending","Closure Requested","Closed"].includes(caseStatusValue(violation.status));
    updateCase({
      capaActions:updated,
      ...(shouldAdvanceStatus ? {
        status:"CAPA Pending",
        auditLog:[...(violation.auditLog||[]), { action:"CAPA initiated", by:user.name, at:Date.now() }]
      } : {})
    });
    setNewCapa({type:"Corrective",description:"",ownerId:"",owner:"",ownerEmail:"",dueDate:"",status:"Open"});
    setShowCapaForm(false);
    toast("CAPA action added","success");
  };

  const changeStatus = (status) => {
    const normalized = caseStatusValue(status);
    if (["Closed","Closure Requested"].includes(normalized)) {
      toast("Use the closure submit/accept workflow for closure actions", "error");
      return;
    }
    const log = [...(violation.auditLog||[]), {action:`Status changed to ${caseStatusLabel(normalized)}`,by:user.name,at:Date.now()}];
    updateCase({status: normalized, auditLog:log});
    toast(`Case status changed to ${caseStatusLabel(normalized)}`,"success");
  };

  const handleViewClosureAction = (action) => {
    try {
      const result = applyCaseClosureAction(violation.id, action, user);
      setViolations([...result.violations]);
      if (action === "submit") toast(`Case ${violation.id} submitted for closure`, "success");
      if (action === "accept") {
        toast(`Closure accepted for case ${violation.id}`, "success");
        notifyCaseEvent("Closed", result.violation);
      }
      if (action === "reject") toast(`Closure rejected for case ${violation.id}`, "success");
    } catch (err) {
      toast(err.message || "Unable to update closure", "error");
    }
  };

  const selectCapaOwner = (ownerId) => {
    const owner = registeredUsers.find(u => u.id === ownerId);
    setNewCapa(f => ({
      ...f,
      ownerId,
      owner: owner?.name || "",
      ownerEmail: owner?.email || ""
    }));
  };

  const formatCapaOwner = (ca) => {
    const owner = users.find(u => u.id === ca.ownerId) || users.find(u => u.name === ca.owner);
    return owner ? registeredUserOptionLabel(owner) : (ca.owner || "Unassigned");
  };

  const changeViewCapaStatus = (index, status) => {
    if (!canSelectCapaStatus(user, status)) { toast("Only Master Admin can select Completed or Verified CAPA status","error"); return; }
    const updated = [...(violation.capaActions || [])];
    updated[index] = {...updated[index],status};
    updateCase({capaActions:updated});
  };

  const changeViewCapaOwner = (index, ownerId) => {
    const owner = registeredUsers.find(u => u.id === ownerId);
    const updated = [...(violation.capaActions || [])];
    updated[index] = {
      ...updated[index],
      ownerId,
      owner: owner?.name || "",
      ownerEmail: owner?.email || ""
    };
    updateCase({capaActions:updated});
    toast("CAPA owner updated","success");
  };

  const changeViewCapaDueDate = (index, dueDate) => {
    const updated = [...(violation.capaActions || [])];
    updated[index] = {...updated[index], dueDate};
    updateCase({capaActions:updated});
    toast("CAPA target date updated","success");
  };

  const sev = SEVERITY_CONFIG[normalizeSeverity(violation.severity)]||{};
  const warningIdsInEvidence = new Set((violation.evidence || []).map(ev => ev.warningId).filter(Boolean));
  const caseAttachments = [
    ...(violation.evidence || []).map(ev => {
      // Ensure warning-letter evidence items always have a usable URL
      if ((ev.source === "warning-letter" || ev.warningId) && !ev.url) {
        const w = caseWarnings.find(cw => cw.id === ev.warningId);
        if (w && w.attachmentDataUrl) return { ...ev, url: w.attachmentDataUrl, label: "Warning Letter" };
      }
      return { ...ev, label: ev.source === "warning-letter" ? "Warning Letter" : "Evidence" };
    }),
    ...caseWarnings
      .filter(w => !warningIdsInEvidence.has(w.id))
      .map(w => ({ ...warningToEvidenceAttachment(w), label:"Warning Letter" }))
  ];

  const openWarningPreview = (warning) => {
    const prepared = prepareWarningPreview(warning, DB.get("violations", []), user, toast);
    if (!prepared) return;
    setLetterPreview(prepared);
    setViolations([...DB.get("violations",[])]);
  };

  const openCaseAttachment = (attachment) => {
    if (attachment.source === "warning-letter" || attachment.warningId) {
      const warning = DB.get("warnings", []).find(w => w.id === attachment.warningId) || caseWarnings.find(w => w.id === attachment.warningId);
      if (warning) openWarningPreview(warning);
      return;
    }
    if (attachment.url) setAttachmentPreview(attachment);
    else toast("Attachment link is unavailable", "error");
  };

  return (
    <div>
      <PageHeader
        title={violation.id}
        sub={`${violation.category}  ${violation.dept}  ${violation.date}`}
        actions={
          <>
            <Btn size="sm" onClick={()=>setPage("cases")}> Back</Btn>
            {canManageStatus && (
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                {CASE_STATUS_OPTIONS.map(s=>(
                  <Btn key={s.value} size="sm" variant={effectiveCaseStatus(violation)===s.value?"primary":s.value==="Closed"?"success":s.value==="Overdue"?"danger":"default"}
                    onClick={()=>changeStatus(s.value)}
                  >{s.label}</Btn>
                ))}
              </div>
            )}
            {canRequestClosureForCase(user, violation) && <Btn size="sm" variant="success" onClick={()=>handleViewClosureAction("submit")}>Submit for Closure</Btn>}
            {canApproveCaseClosure(user) && isClosureRequested(violation) && <Btn size="sm" variant="success" onClick={()=>handleViewClosureAction("accept")}>Accept Closure</Btn>}
            {canApproveCaseClosure(user) && isClosureRequested(violation) && <Btn size="sm" variant="danger" onClick={()=>handleViewClosureAction("reject")}>Reject Closure</Btn>}
            {canEdit && <Btn size="sm" onClick={()=>{setPage("newcase")}} variant="default">Edit</Btn>}
            {user.role === "Master Admin" && hasWarningLetter && (
              <Btn size="sm" variant="danger" onClick={() => {
                if (!window.confirm(`Revoke all warning letters for case ${violation.id}? This will remove the warning letter(s) and roll back the case status.`)) return;
                const result = revokeWarningLettersForCase(violation, user);
                setViolations([...result.violations]);
                const logs = DB.get("auditLogs", []);
                logs.unshift({ id: "al" + Date.now(), ts: Date.now(), user: user.name, role: user.role, action: "WARNING_REVOKED", entity: violation.id, detail: `Revoked ${result.revokedWarnings.length} warning letter(s) for ${violation.empName || "unknown"}`, ip: "local" });
                DB.set("auditLogs", logs);
                toast(`Warning letter revoked and status rolled back to ${caseStatusLabel(result.rollbackStatus)}`, "success");
              }} icon={<Icon name="x-circle" size={12}/>}>Revoke Warning Letter</Btn>
            )}
            {user.role === "Master Admin" && hasWarningLetter && (
              <Btn size="sm" variant="danger" onClick={() => {
                if (!window.confirm(`Permanently delete warning letter(s) for case ${violation.id}? Case status will not be rolled back.`)) return;
                const result = deleteWarningLettersForCase(violation, user);
                setViolations([...result.violations]);
                const logs = DB.get("auditLogs", []);
                logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"WARNING_DELETED", entity:violation.id, detail:`Deleted ${result.deletedWarnings.length} warning letter(s) for ${violation.empName || "unknown"}`, ip:"local" });
                DB.set("auditLogs", logs);
                toast(`Warning letter deleted for case ${violation.id}`, "success");
              }} icon={<Icon name="trash" size={12}/>}>Delete Warning Letter</Btn>
            )}
            {user.role === "Master Admin" && (
              <Btn size="sm" variant="danger" onClick={() => {
                if (window.confirm("Permanently delete case " + violation.id + "? This cannot be undone.")) {
                  const vs = DB.get("violations",[]);
                  const next = vs.filter(v=>v.id!==violation.id);
                  DB.set("violations", next);
                  DB.set("warnings", DB.get("warnings",[]).filter(w=>w.caseId!==violation.id));
                  syncComplianceScores(DB.get("users",[]), next);
                  const logs = DB.get("auditLogs", []);
                  logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"CASE_DELETED", entity:violation.id, detail:`Deleted case for ${violation.empName || "unknown employee"}`, ip:"local" });
                  DB.set("auditLogs", logs);
                  toast(`Case ${violation.id} deleted`, "success");
                  setPage("cases");
                }
              }} icon={<Icon name="trash" size={12}/>}>Delete</Btn>
            )}
          </>
        }
      />

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
        <div>
          {/* Details */}
          <Card style={{marginBottom:16}}>
            <CardHeader title="Case Details"
              actions={<>
                <Badge severity={violation.severity}/>
                <Badge status={effectiveCaseStatus(violation)}/>
                {violation.repeatViolation && <span style={{fontSize:11,background:"var(--red-bg)",color:"var(--red)",padding:"2px 8px",borderRadius:10,fontWeight:600}}> Repeat</span>}
              </>}
            />
            <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                ["Employee",<div style={{display:"flex",alignItems:"center",gap:7}}><Avatar name={violation.empName}/><div><div style={{fontWeight:500}}>{violation.empName}</div><div style={{fontSize:11,color:"var(--text3)"}}>{violation.empCode}  {violation.designation}</div></div></div>],
                ["Department",violation.dept],
                ["Date",violation.date],
                ["Category",violation.category],
                ["SOP Violated",violation.sopViolated||""],
                ["Root Cause",violation.rootCause],
                ["Risk Score",violation.riskScore ? <span style={{fontFamily:"var(--mono)",fontWeight:600,color:violation.riskScore>=8?"var(--red)":violation.riskScore>=5?"var(--amber)":"var(--green)"}}>{violation.riskScore}/10</span>:""],
                ["Investigation Due Date",<span style={{color:violation.dueDate&&new Date(violation.dueDate)<new Date()&&caseStatusValue(violation.status)!=="Closed"?"var(--red)":"var(--text)"}}>{violation.dueDate||""}</span>],
                ["Product Groups",(violation.productGroups||[]).join(", ")||""],
                ["Assigned HOD",violation.assignedHOD||""],
              ].map(([k,v])=>(
                <div key={k}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:3}}>{k}</div><div style={{fontSize:13,color:"var(--text)"}}>{v}</div></div>
              ))}
              <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>Description</div><div style={{fontSize:13,color:"var(--text)",background:"var(--bg)",padding:10,borderRadius:"var(--r)",lineHeight:1.6,border:"1px solid var(--line)"}}>{violation.description}</div></div>
              {violation.immediateAction && <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>Immediate Action Taken</div><div style={{fontSize:13,color:"var(--text)",background:"var(--green-bg)",padding:10,borderRadius:"var(--r)",border:"1px solid var(--green-bd)"}}>{violation.immediateAction}</div></div>}
              {violation.witnesses && <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:4}}>Witnesses</div><div style={{fontSize:13,color:"var(--text)"}}>{violation.witnesses}</div></div>}
            </div>
          </Card>

          {/* 5-Why */}
          <Card style={{marginBottom:16}}>
            <CardHeader title="5-Why Root Cause Analysis"
              actions={canEdit&&<Btn size="sm" variant="primary" onClick={saveFiveWhy}>Save</Btn>}
            />
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
              {fiveWhy.map((w,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"var(--blue-l)",color:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:5}}>W{i+1}</div>
                  <Textarea value={w} onChange={v=>{const n=[...fiveWhy];n[i]=v;setFiveWhy(n)}} placeholder={`Why ${i+1}: ${["Why did the violation occur?","Why was the SOP not followed?","Why was awareness/training insufficient?","Why was this not caught by the system?","Why does the root gap exist?"][i]}`} rows={1} autoResize/>
                </div>
              ))}
              <FormGroup label="Investigator Remarks / Final Root Cause">
                <Textarea value={investigatorRemarks} onChange={setInvestigatorRemarks} placeholder="Final determination of root cause and investigator's summary" rows={3} autoResize/>
              </FormGroup>
            </div>
          </Card>

          {/* CAPA */}
          <Card>
            <CardHeader title="CAPA Actions"
              actions={canEdit&&<Btn size="sm" variant="primary" onClick={()=>setShowCapaForm(!showCapaForm)}>+ Add Action</Btn>}
            />
            {showCapaForm && (
              <div style={{padding:14,borderBottom:"1px solid var(--line)",background:"var(--bg)"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <FormGroup label="Type"><Select value={newCapa.type} onChange={v=>setNewCapa(f=>({...f,type:v}))} options={["Corrective","Preventive","System","HR Action"]} placeholder="Select type"/></FormGroup>
                  <FormGroup label="Owner" required><Select value={newCapa.ownerId || ""} onChange={selectCapaOwner} options={registeredUserOptions} placeholder="Assign to"/></FormGroup>
                  <div style={{gridColumn:"1/-1"}}><FormGroup label="Description" required><Textarea value={newCapa.description} onChange={v=>setNewCapa(f=>({...f,description:v}))} placeholder="Describe the corrective/preventive action" rows={2}/></FormGroup></div>
                  <FormGroup label="Target Due Date" required><Input type="date" value={newCapa.dueDate} onChange={v=>setNewCapa(f=>({...f,dueDate:v}))}/></FormGroup>
                  <FormGroup label="Status"><Select value={newCapa.status} onChange={v=>setNewCapa(f=>({...f,status:v}))} options={availableCapaStatuses}/></FormGroup>
                </div>
                <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"flex-end"}}>
                  <Btn size="sm" onClick={()=>setShowCapaForm(false)}>Cancel</Btn>
                  <Btn size="sm" variant="primary" onClick={addCapa}>Add Action</Btn>
                </div>
              </div>
            )}
            <div style={{padding:violation.capaActions?.length?0:14}}>
              {!violation.capaActions?.length && <EmptyState icon="inbox" title="No CAPA actions yet" sub="Add corrective and preventive actions"/>}
              {violation.capaActions?.map((ca,i)=>(
                <div key={ca.id} style={{padding:"12px 16px",borderBottom:i<violation.capaActions.length-1?"1px solid var(--line)":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:600,background:"var(--bg2)",color:"var(--text2)",padding:"2px 7px",borderRadius:4}}>{ca.type}</span>
                        <span style={{fontSize:11,color:capaStatusColor(ca.status, user),fontWeight:500}}>{visibleCapaStatus(ca.status, user)}</span>
                      </div>
                      <div style={{fontSize:13,color:"var(--text)",marginBottom:4,lineHeight:1.5,overflowWrap:"anywhere"}}>{ca.description}</div>
                      {canEdit ? (
                        <div style={{display:"grid",gridTemplateColumns:"minmax(180px,1fr) minmax(140px,160px)",gap:8,marginTop:8,maxWidth:520}}>
                          <FormGroup label="Owner">
                            <Select value={ca.ownerId || ""} onChange={v=>changeViewCapaOwner(i,v)} options={registeredUserOptions} placeholder="Assign to"/>
                          </FormGroup>
                          <FormGroup label="Target Due Date">
                            <Input type="date" value={ca.dueDate || ""} onChange={v=>changeViewCapaDueDate(i,v)}/>
                          </FormGroup>
                        </div>
                      ) : (
                        <div style={{fontSize:11,color:"var(--text3)"}}>Owner: {formatCapaOwner(ca)}  Target: {ca.dueDate||""}</div>
                      )}
                    </div>
                    {canEdit && canSelectCapaStatus(user, ca.status) && (
                      <Select value={ca.status} onChange={v=>changeViewCapaStatus(i,v)} options={availableCapaStatuses} style={{width:130,flexShrink:0}}/>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>

        {/* RIGHT */}
        <div>
          {/* Timeline */}
          <Card style={{marginBottom:14}}>
            <CardHeader title="Case Timeline"/>
            <div style={{padding:14}}>
              {(violation.auditLog||[{action:"Case Created",by:violation.createdBy||"System",at:violation.createdAt}]).map((entry,i,arr)=>(
                <div key={i} style={{display:"flex",gap:10,paddingBottom:i<arr.length-1?12:0,position:"relative"}}>
                  {i<arr.length-1 && <div style={{position:"absolute",left:11,top:22,bottom:0,width:1,background:"var(--line)"}}/>}
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,background:"var(--blue-l)",color:"var(--blue)",fontWeight:600}}>{i+1}</div>
                  <div style={{paddingTop:2}}><div style={{fontSize:12,fontWeight:500}}>{entry.action}</div><div style={{fontSize:11,color:"var(--text3)"}}>{entry.by}  {entry.at ? new Date(entry.at).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"}) : ""}</div></div>
                </div>
              ))}
            </div>
          </Card>

          <Card style={{marginBottom:14}}>
            <CardHeader title="Workflow"/>
            <div style={{padding:14}}>
              <WorkflowTracker violation={violation}/>
            </div>
          </Card>

          <Card style={{marginBottom:14}}>
            <CardHeader title="Attachments"/>
            <div style={{padding:caseAttachments.length?10:0}}>
              {!caseAttachments.length && <EmptyState icon="inbox" title="No attachments" sub="Evidence and warning letters will appear here"/>}
              {caseAttachments.map((att,i)=>(
                <div key={att.id || att.warningId || i} style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between",padding:"7px 8px",borderBottom:i<caseAttachments.length-1?"1px solid var(--line)":"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                    <Icon name={att.type === "video" ? "video" : att.type === "image" ? "image" : "file"} size={14}/>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{att.name || att.attachmentName || "Attachment"}</div>
                      <div style={{fontSize:10,color:"var(--text3)"}}>{att.label || "Attachment"}</div>
                    </div>
                  </div>
                  <Btn size="sm" ghost onClick={()=>openCaseAttachment(att)} icon={<Icon name="eye" size={12}/>}>View</Btn>
                </div>
              ))}
            </div>
          </Card>

          {/* Disciplinary Suggestion */}
          <Card style={{marginBottom:14}}>
            <CardHeader title="Disciplinary Recommendation"/>
            <div style={{padding:14}}>
              {(() => {
                const emp = DB.get("users",[]).find(u=>u.id===violation.empId);
                const prevCount = DB.get("violations",[]).filter(v=>v.empId===violation.empId&&v.id!==violation.id&&caseStatusValue(v.status)==="Closed").length;
                const action = getDisciplinaryMatrix()[normalizeSeverity(violation.severity)]?.[Math.min(prevCount,3)];
                return (
                  <div>
                    <div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>Based on severity ({violation.severity}) and prior violations ({prevCount}):</div>
                    <div style={{background:sev.bg,border:`1px solid ${sev.bd}`,borderRadius:"var(--r)",padding:"8px 12px",color:sev.color,fontWeight:600,fontSize:13,marginBottom:8}}>{action||"Refer to HR"}</div>
                    {emp && <div style={{fontSize:11,color:"var(--text3)"}}>Employee compliance score: <strong style={{color:emp.complianceScore>70?"var(--green)":emp.complianceScore>50?"var(--amber)":"var(--red)"}}>{emp.complianceScore}/100</strong></div>}
                  </div>
                );
              })()}
            </div>
          </Card>

          {/* Generate Warning */}
          {(canEdit || caseWarnings.length > 0) && (
            <Card>
              <CardHeader title="Warning Letter"/>
              <div style={{padding:14}}>
                {canEdit && (
                  <>
                    <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>Generate a formal warning letter for this violation.</div>
                    <Btn variant="primary" style={{width:"100%",justifyContent:"center"}} onClick={()=>{
                      const violations = DB.get("violations",[]);
                      const v = violations.find(x=>x.id===editId);
                      const newWarning = v && issueWarningLetter(v, user, toast, "Warning Letter Level-1", "HOD + HR Manager", { download:false });
                      if(newWarning) {
                        setLetterPreview(newWarning);
                        setViolations([...DB.get("violations",[])]);
                      }
                    }}> Generate & Attach Warning Letter</Btn>
                  </>
                )}
                {caseWarnings.length > 0 && (
                  <div style={{marginTop:canEdit?12:0,borderTop:canEdit?"1px solid var(--line)":"none",paddingTop:canEdit?10:0}}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:8}}>Attachments</div>
                    {caseWarnings.map(w=>(
                      <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--line)"}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{w.letterType}</div>
                          <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{w.id}  {w.letterDate}</div>
                        </div>
                        <Btn size="sm" ghost onClick={()=>openWarningPreview(w)} icon={<Icon name="eye" size={12}/>}>View</Btn>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </Card>
          )}
        </div>
      </div>
      <WarningLetterModal letter={letterPreview} onClose={()=>setLetterPreview(null)}/>

function WarningLettersPage({ user, toast, setPage, setEditId }) {
  const [warnings, setWarnings] = useState(()=>reconcileWarningLetters().warnings);
  const [showNew, setShowNew] = useState(false);
  const [selectedCase, setSelectedCase] = useState("");
  const [letterType, setLetterType] = useState("Warning Letter Level-1");
  const [issuer, setIssuer] = useState("HOD + HR Manager");
  const [letterPreview, setLetterPreview] = useState(null);

  const allViolations = DB.get("violations",[]);
  const availableCases = allViolations.filter(v=>caseStatusValue(v.status)!=="Draft" && caseStatusValue(v.status)!=="Rejected");

  const generateLetter = () => {
    const violation = allViolations.find(v=>v.id===selectedCase);
    if (!violation) { toast("Please select a case","error"); return; }
    const newW = issueWarningLetter(violation, user, toast, letterType, issuer, { download:false });
    if (!newW) return;
    setWarnings([...reconcileWarningLetters().warnings]);
    setLetterPreview(newW);
    setShowNew(false);
  };

  const openWarningPreview = (warning) => {
    const prepared = prepareWarningPreview(warning, allViolations, user, toast);
    if (!prepared) return;
    setWarnings([...reconcileWarningLetters().warnings]);
    setLetterPreview(prepared);
  };

  const downloadWarning = (warning) => {
    const prepared = prepareWarningPreview(warning, allViolations, user, toast);
    if (!prepared) return;
    setWarnings([...reconcileWarningLetters().warnings]);
    downloadDataUrl(prepared.attachmentDataUrl, prepared.attachmentName || `${prepared.id}.pdf`);
  };

  const deleteWarning = (warning) => {
    if (user.role !== "Master Admin") { toast("Only Master Admin can delete warning letters", "error"); return; }
    if (!window.confirm(`Permanently delete warning letter ${warning.id}? Case status will not be rolled back.`)) return;
    const violation = DB.get("violations", []).find(v => v.id === warning.caseId);
    if (!violation) { toast("Linked case not found", "error"); return; }
    const result = deleteWarningLettersForCase(violation, user, warning.id);
    const logs = DB.get("auditLogs", []);
    logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"WARNING_DELETED", entity:warning.caseId, detail:`Deleted warning letter ${warning.id} for ${warning.empName || "unknown"}`, ip:"local" });
    DB.set("auditLogs", logs);
    setWarnings([...reconcileWarningLetters().warnings]);
    setLetterPreview(prev => prev?.id === warning.id ? null : prev);
    toast(result.deletedWarnings.length ? "Warning letter deleted" : "Warning letter already removed", "success");
  };

  return (
    <div>
      <PageHeader title="Warning Letters" sub={`${warnings.length} letters issued  Professional PDF generation`}
        actions={
          <>
            <Btn variant="primary" size="sm" onClick={()=>setShowNew(!showNew)}> Generate New Letter</Btn>

      />

      {showNew && (
        <Card style={{marginBottom:16}}>
          <CardHeader title="Generate Warning Letter"/>
          <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <FormGroup label="Case Reference" required>
              <Select value={selectedCase} onChange={setSelectedCase} options={availableCases.map(v=>({value:v.id,label:`${v.id}  ${v.empName} (${v.severity})`}))} placeholder="Select case"/>
            </FormGroup>
            <FormGroup label="Letter Type">
              <Select value={letterType} onChange={setLetterType} options={["Warning Letter Level-1","Warning Letter Level-2","Final Warning Letter","Show-Cause Notice","Increment Hold Notice"]}/>
            </FormGroup>
            <FormGroup label="Issuing Authority">
              <Select value={issuer} onChange={setIssuer} options={["HOD + HR Manager","GM Operations","CHRO + HOD","Management Committee"]}/>
            </FormGroup>
            <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
              <Btn variant="primary" onClick={generateLetter}> Generate & Preview</Btn>
              <Btn onClick={()=>setShowNew(false)}>Cancel</Btn>
            </div>
          </div>
        </Card>
      )}

      <Card>
        <CardHeader title="Issued Warning Letters"/>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg)"}}>
                {["Letter ID","Date","Employee","Dept","Case Ref","Type","Severity","Status","Actions"].map(h=>(
                  <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {warnings.length===0 && <tr><td colSpan={9}><EmptyState icon="inbox" title="No warning letters yet" sub="Generate letters from cases above"/></td></tr>}
              {warnings.map(w=>(
                <tr key={w.id} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--purple)",fontWeight:500}}>{w.id}</td>
                  <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)"}}>{w.letterDate}</td>
                  <td style={{padding:"9px 12px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><Avatar name={w.empName}/><div><div style={{fontSize:12.5,fontWeight:500}}>{w.empName}</div><div style={{fontSize:10,color:"var(--text3)"}}>{w.empCode}</div></div></div></td>
                  <td style={{padding:"9px 12px",fontSize:11,color:"var(--text3)"}}>{w.dept}</td>
                  <td style={{padding:"9px 12px",fontFamily:"var(--mono)",fontSize:11,color:"var(--blue)"}}>{w.caseId}</td>
                  <td style={{padding:"9px 12px",fontSize:12}}>{w.letterType}</td>

function ReportsPage({ user, toast, setPage }) {
  const violations = DB.get("violations",[]);
  const warnings = reconcileWarningLetters({ persist:false }).warnings;
  const caseImportRef = useRef(null);
  const reportDepartments = [...new Set([
    ...activeMasterOptions("masterDepts", DEPARTMENTS),
    ...violations.map(v=>v.dept).filter(Boolean)
  ])];

  const deptStats = reportDepartments.map(d=>{
    const vs = violations.filter(v=>v.dept===d);
    const closed = vs.filter(v=>caseStatusValue(v.status)==="Closed").length;
    const open = vs.filter(v=>!["Closed","Rejected"].includes(caseStatusValue(v.status))).length;
    const ov = vs.filter(v=>v.dueDate&&new Date(v.dueDate)<new Date()&&!["Closed","Rejected"].includes(caseStatusValue(v.status))).length;
    const scoredCases = vs.filter(isComplianceScoredCase);
    const deduction = scoredCases.reduce((sum, violation) => sum + casePenalty(violation), 0);
    const severityCounts = scoredCases.reduce((acc, violation) => {
      const severity = normalizeSeverity(violation.severity) || "Unmapped";
      acc[severity] = (acc[severity] || 0) + 1;
      return acc;
    }, {});
    const deductionBreakdown = Object.entries(severityCounts)
      .filter(([, count]) => count > 0)
      .map(([severity, count]) => `${severity}: ${count}`)
      .join("  ");
    return { dept:d, total:vs.length, closed, open, overdue:ov, deduction, deductionBreakdown, score:departmentComplianceScore(vs) };
  });

  const exportMIS = () => {
    const wb = XLSX.utils.book_new();
    const summary = [["PVMS Monthly MIS Report",COMPANY_NAME],[`Generated: ${new Date().toLocaleDateString("en-IN")}`,``],[""],["Department","Total","Open","Closed","Overdue","Risk Deduction","Deduction Breakdown","Score"],...deptStats.map(d=>[d.dept,d.total,d.open,d.closed,d.overdue,d.deduction,d.deductionBreakdown,d.score]),[""],["All Violations"],["Case ID","Date","Employee","Dept","Category","Severity","Status"],...violations.map(v=>[v.id,v.date,v.empName,v.dept,v.category,v.severity,caseStatusLabel(v.status)])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), "MIS Report");
    XLSX.writeFile(wb, `PVMS_MIS_${new Date().toISOString().slice(0,7)}.xlsx`);
    toast("MIS Excel exported","success");
  };

  const exportBulk = () => {
    if(user.role!=="Master Admin"){toast("Only Master Admin can bulk export","error");return;}
    const wb = XLSX.utils.book_new();
    const vRows=[["Case ID","Date","Employee","Emp Code","Dept","Category","Severity","Status","Repeat","Risk","Investigation Due Date","Description"],...violations.map(v=>[v.id,v.date,v.empName,v.empCode,v.dept,v.category,v.severity,v.status,v.repeatViolation?"Yes":"No",v.riskScore,v.dueDate,v.description])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vRows), "All Cases");
    const uRows=[["Name","Emp Code","Dept","Role","Score","Violations","Active Warnings"],...employeeComplianceRows(DB.get("users",[]), violations, warnings).map(u=>[u.name,u.empCode,u.dept,u.role,u.complianceScore,u.violations,u.warningCount])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(uRows), "Employees");
    const wRows=[["Letter ID","Date","Employee","Dept","Case Ref","Type","Severity"],...warnings.map(w=>[w.id,w.letterDate,w.empName,w.dept,w.caseId,w.letterType,w.severity])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wRows), "Warning Letters");
    XLSX.writeFile(wb, `PVMS_BulkExport_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast("Bulk data export complete","success");
  };

  const downloadTemplate = () => {
    const wb = XLSX.utils.book_new();
    const rows=[["Case ID (leave blank)","Date (YYYY-MM-DD)","Department","Employee Name","Employee Code","Designation","Category","Severity","Description","SOP Violated","Root Cause","Immediate Action","Risk Score (1-10)","Repeat (Yes/No)","Status"],...Array(5).fill(["","","","","","","","Minor","","","","","","No","Open"])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Import Template");
    XLSX.writeFile(wb, "PVMS_Import_Template.xlsx");
    toast("Import template downloaded","success");
  };

  const normalizeImportDate = (value) => {
    if (!value) return new Date().toISOString().slice(0,10);
    if (typeof value === "number" && XLSX.SSF?.parse_date_code) {
      const parsed = XLSX.SSF.parse_date_code(value);
      if (parsed) return `${parsed.y}-${String(parsed.m).padStart(2,"0")}-${String(parsed.d).padStart(2,"0")}`;
    }
    const raw = String(value).trim();
    const date = new Date(raw);
    if (!Number.isNaN(date.getTime())) return date.toISOString().slice(0,10);
    return raw;
  };

  const importCases = async (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    try {
      const buffer = await file.arrayBuffer();
      const wb = XLSX.read(buffer, { type:"array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rawRows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:"" });
      const headerIndex = rawRows.findIndex(row =>
        row.some(cell => String(cell).trim() === "Employee Name") &&
        row.some(cell => String(cell).trim() === "Category")
      );
      if (headerIndex < 0) throw new Error("Import header row not found");
      const headers = rawRows[headerIndex].map(cell => String(cell || "").trim());
      const rows = rawRows.slice(headerIndex + 1).map(row =>
        Object.fromEntries(headers.map((header, index) => [header, row[index] ?? ""]))
      );
      const current = DB.get("violations", []);
      let added = 0, updated = 0;
      rows.forEach((row, index) => {
        const empName = String(row["Employee Name"] || row.Employee || "").trim();
        const category = String(row.Category || row["Violation Category"] || "").trim();
        const description = String(row.Description || row["Incident Description"] || "").trim();
        if (!empName && !category && !description) return;
        const existingId = String(row["Case ID (leave blank)"] || row["Case ID"] || "").trim();
        const existingIndex = existingId ? current.findIndex(v => v.id === existingId) : -1;
        const caseNo = existingIndex >= 0 ? current[existingIndex].caseNo : DB.nextSeq("VMS");
        const id = existingIndex >= 0 ? current[existingIndex].id : (existingId || `VMS-${new Date().getFullYear()}-${String(caseNo).padStart(4,"0")}`);
        const imported = {
          ...(existingIndex >= 0 ? current[existingIndex] : {}),
          id,
          caseNo,
          date: normalizeImportDate(row["Date (YYYY-MM-DD)"] || row.Date),
          dept: String(row.Department || row.Dept || "").trim(),
          empName,
          empCode: String(row["Employee Code"] || row["Emp Code"] || "").trim(),
          designation: String(row.Designation || "").trim(),
          category: category || "Process Non-Adherence",
          severity: normalizeSeverity(row.Severity) || "Minor",
          description,
          sopViolated: String(row["SOP Violated"] || row["SOP / Policy Violated"] || "").trim(),
          rootCause: String(row["Root Cause"] || "").trim(),
          immediateAction: String(row["Immediate Action"] || "").trim(),
          riskScore: Number(row["Risk Score (1-10)"] || row.Risk || 1),
          repeatViolation: /^y(es)?$/i.test(String(row["Repeat (Yes/No)"] || row.Repeat || "")),
          status: caseStatusValue(row.Status || "Open"),
          importedAt: Date.now(),
          updatedAt: Date.now(),
          evidence: existingIndex >= 0 ? (current[existingIndex].evidence || []) : [],
          capaActions: existingIndex >= 0 ? (current[existingIndex].capaActions || []) : [],
          fiveWhy: existingIndex >= 0 ? (current[existingIndex].fiveWhy || []) : [],
          auditLog: [
            ...((existingIndex >= 0 ? current[existingIndex].auditLog : []) || []),
            { action: existingIndex >= 0 ? "Case updated from MIS import" : "Case imported from MIS file", by:user.name, at:Date.now() }
          ]
        };
        if (existingIndex >= 0) {
          current[existingIndex] = imported;
          updated++;
        } else {
          current.push(imported);
          added++;
        }
      });
      DB.set("violations", current);
      syncComplianceScores(DB.get("users",[]), current);
      const logs = DB.get("auditLogs", []);
      logs.unshift({ id:"al"+Date.now(), ts:Date.now(), user:user.name, role:user.role, action:"MIS_CASE_IMPORT", entity:"Reports & MIS", detail:`Imported cases: ${added} added, ${updated} updated`, ip:"local" });
      DB.set("auditLogs", logs);
      toast(`Case import complete: ${added} added, ${updated} updated`, "success");
    } catch (err) {
      toast("Unable to import case file", "error");
    } finally {
      event.target.value = "";
    }
  };

  return (
    <div>
      <PageHeader title="Reports & MIS"
        sub="Monthly Management Information System  ISO compliance reporting"
        actions={
          <>
            <Btn size="sm" onClick={exportMIS} icon={<Icon name="download" size={14}/>}>Export MIS Excel</Btn>
            {user.role==="Master Admin" && <Btn variant="primary" size="sm" onClick={exportBulk} icon={<Icon name="download" size={14} color="#fff"/>}>Bulk Export All Data</Btn>}
          </>
        }
      />

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <KpiCard label="Total Violations" value={violations.length} color="var(--blue)"/>
        <KpiCard label="Closed Cases" value={violations.filter(v=>caseStatusValue(v.status)==="Closed").length} color="var(--green)" sub={`${Math.round(violations.filter(v=>caseStatusValue(v.status)==="Closed").length/Math.max(violations.length,1)*100)}% closure rate`}/>
        <KpiCard label="CAPA Pending" value={violations.filter(v=>caseStatusValue(v.status)==="CAPA Pending").length} color="var(--amber)"/>
        <KpiCard label="Overdue" value={violations.filter(v=>v.dueDate&&new Date(v.dueDate)<new Date()&&!["Closed","Rejected"].includes(caseStatusValue(v.status))).length} color="var(--red)"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
        <Card>
          <CardHeader title="Department Compliance Summary"/>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"var(--bg)"}}>
                  {["Department","Total","Open","Closed","Overdue","Deduction","Score"].map(h=>(
                    <th key={h} style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{h}</th>
                  ))}

              <tbody>
                {deptStats.map(d=>(
                  <tr key={d.dept} style={{borderBottom:"1px solid var(--line)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
